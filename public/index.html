    setTextFmtPanelId(null);
    const idsToToggle = item.groupId
      ? itemsRef.current.filter(i => i.groupId === item.groupId).map(i => i.id)
      : [item.id];
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      // Use the pre-click selection as baseline (onItemPD may have already added itemId).
      const pre = preClickSel.current ?? selRef.current;
      preClickSel.current = null;
      const wasAllPresent = idsToToggle.every(id => pre.includes(id));
      if (wasAllPresent) {
        // Was fully selected → remove the whole group
        const next = selRef.current.filter(id => !idsToToggle.includes(id));
        selRef.current = next; setSel(next);

        // Was not fully selected → ensure all group members are added
        const next = [...new Set([...selRef.current, ...idsToToggle])];

    } else {
      preClickSel.current = null;
      selRef.current = idsToToggle; setSel(idsToToggle);
    }
  };

  const groupItems = () => {
    if (selRef.current.length < 2) return;
    pushUndo();
    const gid = Date.now().toString(36);
    const nit = itemsRef.current.map(i => selRef.current.includes(i.id) ? { ...i, groupId: gid } : i);
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
  };
  const ungroupItems = () => {
    if (!selRef.current.length) return;
    pushUndo();
    const nit = itemsRef.current.map(i => selRef.current.includes(i.id) ? { ...i, groupId: undefined } : i);
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
  };

  const buildExportUrl = (quality) => {
    const maxpx = quality >= 100 ? 16000 : 10000;
    const q = `quality=${quality}&maxpx=${maxpx}`;
    return boardPx
      ? `/api/boards/${pid}/${bid}/export?useBoard=1&${q}`
      : `/api/boards/${pid}/${bid}/export?pad=${activeBoardMeta?.exportPad ?? 60}&${q}`;
  };

  const exportSelection = (quality = 92) => {
    const ids = selRef.current.join(',');
    const p = pidRef.current, b = bidRef.current;
    if (!p || !b || !ids) return;
    const board = boardsRef.current.find(b2 => b2.id === b);
    const pad = boardPxRef.current ? '' : `&pad=${board?.exportPad ?? 60}`;
    const maxpx = quality >= 98 ? 16000 : 10000;
    window.location.href = `/api/boards/${p}/${b}/export?ids=${encodeURIComponent(ids)}${pad}&quality=${quality}&maxpx=${maxpx}`;
  };

  if (!ready) return (
    <div style={{height:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'IBM Plex Mono',fontSize:11,letterSpacing:3,color:'var(--acc)'}}>
      CARGANDO
    </div>
  );

  const activeProject = projects.find(p => p.id === pid);
  const activeBoard   = boards.find(b => b.id === bid);

  // ── INFO PANEL render helper ──────────────────────────────────────────────
  const InfoPanel = () => {
    if (!hoverInfo) return (
      <div className="info-empty">
        {t('infoEmpty1')}<br/>{t('infoEmpty2')}
      </div>
    );
    const { photo, status, thumbSrc, itemW, itemH } = hoverInfo;
    const boardNames = photo?.id ? photoBoardNames(photo.id) : [];
    const rating = photo?.rating || 0;
    const tags = photo?.tags || [];
    const mc = photo?.meanColor;
    const brightness = photo?.brightness;
    let hueLabel = null, hueColor = null;
    if (mc) {
      const { h, s } = rgbToHsl(mc.r, mc.g, mc.b);
      hueColor = `rgb(${mc.r},${mc.g},${mc.b})`;
      if (s < 0.12) {
        hueLabel = lang === 'es' ? 'Neutro' : 'Neutral';
      } else {
        const names = lang === 'es'
          ? ['Rojo','Naranja','Amarillo','Verde','Cian','Azul','Violeta','Magenta']
          : ['Red','Orange','Yellow','Green','Cyan','Blue','Violet','Magenta'];
        const bounds = [20, 45, 70, 155, 190, 265, 290, 340];
        const bucket = bounds.findIndex(b => h < b);
        hueLabel = names[bucket === -1 ? 0 : bucket];
      }
    }
    const brightPct = brightness != null ? Math.round(brightness * 100) : null;
    return (
      <div className="info-panel">
        <img className="info-thumb"
          src={thumbSrc || (pid && photo?.id ? `/photos/${pid}/${photo.id}/thumb` : '')}
          alt=""
          onError={e => e.target.style.opacity = '.2'}
        />
        <div className="info-meta">
          <div className="info-name" title={photo?.name}>{photo?.name || '—'}</div>
          {photo?.w > 0 && (
            <div className="info-row">{t('original')} {photo.w} × {photo.h} px</div>
          )}
          {photo?.size > 0 && (
            <div className="info-row">{fmtSize(photo.size)}</div>
          )}
          {itemW && (
            <>
              <div className="info-row" style={{marginTop:2}}>
                {t('inTableau')} {itemW} × {itemH} px
              </div>
              {boardDpi && boardUnits !== 'px' && (
                <div className="info-phys">
                  ≈ {pxToPhys(itemW, boardDpi, boardUnits)} × {pxToPhys(itemH, boardDpi, boardUnits)}
                  <span style={{color:'var(--muted)',marginLeft:4}}>@ {boardDpi} dpi</span>
                </div>
              )}
            </>
          )}
          <div className="info-rating">
            {rating > 0
              ? [1,2,3,4,5].map(n => <span key={n} className={n <= rating ? 'on' : ''}>★</span>)
              : <span className="none">{lang === 'es' ? 'sin valorar' : 'unrated'}</span>}
          </div>
          {(hueLabel || brightPct != null) && (
            <div className="info-color-row">
              {hueColor && <span className="info-color-swatch" style={{background:hueColor}}/>}
              {hueLabel && <span className="info-color-label">{hueLabel}</span>}
              {brightPct != null && <>
                <div className="info-bright-bar" title={`${brightPct}%`}>
                  <div className="info-bright-bar-fill" style={{left:`${brightPct}%`}}/>
                </div>
                <span className="info-color-label">{brightPct}%</span>
              </>}
            </div>
          )}
          {tags.length > 0 && (
            <div className="info-tag-list">
              {tags.map(tag => <span key={tag} className="info-tag-chip">#{tag}</span>)}
            </div>
          )}
          {photo?.exif && (
            <div className="info-exif">
              {photo.exif.make && <div className="info-exif-make">{photo.exif.make}</div>}
              {photo.exif.model && <div className="info-exif-model">{photo.exif.model}</div>}
              {photo.exif.lens && <div className="info-exif-lens">{photo.exif.lens}</div>}
              <div className="info-exif-cam">
                {photo.exif.focalLength && <span>{photo.exif.focalLength} mm</span>}
                {photo.exif.aperture && <span>f/{photo.exif.aperture}</span>}
                {photo.exif.shutter && <span>{photo.exif.shutter}</span>}
                {photo.exif.iso && <span>ISO {photo.exif.iso}</span>}
              </div>
              {photo.exif.dateTaken && <div className="info-exif-date">{fmtExifDate(photo.exif.dateTaken)}</div>}
            </div>
          )}
          <div className="info-boards">
            {boardNames.length === 0
              ? <div className="ibd-none">{t('notInAnyBoard')}</div>
              : boardNames.map(n => (
                  <span key={n} className={`ibd-tag${n === activeBoard?.name ? ' cur' : ''}`}>{n}</span>
                ))
            }
          </div>
        </div>
      </div>
    );
  };

  // ── CONFIG hint ───────────────────────────────────────────────────────────
  const cfgHint = () => {
    const dpi = parseInt(cfgDpi) || 300;
    if (cfgUnits === 'px') return t('noScaleHint');
    const mm = (25.4 / dpi).toFixed(3);
    const cm = (2.54 / dpi).toFixed(4);
    return t('scaleHint', mm, cm, (dpi/2.54).toFixed(0));
  };

  const LIB_COMPACT = 160;
  const snapLib = (e) => {
    e.stopPropagation();
    const TOPBAR = 46;
    const maxH = Math.floor(window.innerHeight * 0.70);
    const isLarge = libHeightRef.current > window.innerHeight * 0.40;
    const newH = isLarge ? LIB_COMPACT : maxH;
    if (!libOpen) { setLibOpen(true); localStorage.setItem('libOpen', 'true'); }
    const startCanvasH = window.innerHeight - TOPBAR - 5 - libHeightRef.current;
    libHeightRef.current = newH;
    setLibHeight(newH);
    setLibExpanded(!isLarge);
    localStorage.setItem('tb-libh', newH);
    if (startCanvasH > 0 && bidRef.current) {
      const newCanvasH = window.innerHeight - TOPBAR - 5 - newH;
      const newZoom = Math.max(0.25, Math.min(zoomRef.current * newCanvasH / startCanvasH, 2.0));
      zoomRef.current = newZoom; setZoom(newZoom);
      boardZoom.current[bidRef.current] = newZoom;
      localStorage.setItem(`tb-zoom-${bidRef.current}`, String(newZoom));
    }
  };

  const onLibDragOver = (e) => {
    if (!e.dataTransfer.types.includes('Files')) return;
    e.preventDefault(); e.stopPropagation();
    setLibDragOver(true);
  };
  const onLibDragLeave = (e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) { setLibDragOver(false); setLibDragOverSect(null); }
  };
  const onLibDrop = (e) => {
    e.preventDefault(); e.stopPropagation();
    setLibDragOver(false); setLibDragOverSect(null);
    if (!pidRef.current) return;
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadFiles(files);
  };
  const onSectDragOver = (e, sectId) => {
    if (!e.dataTransfer.types.includes('Files')) return;
    e.preventDefault(); e.stopPropagation();
    setLibDragOverSect(sectId); setLibDragOver(false);
  };
  const onSectDragLeave = (e) => {
    if (!e.currentTarget.contains(e.relatedTarget)) setLibDragOverSect(null);
  };
  const onSectDrop = (e, sectId) => {
    e.preventDefault(); e.stopPropagation();
    setLibDragOverSect(null); setLibDragOver(false);
    if (!pidRef.current) return;
    const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
    if (files.length) uploadFiles(files, null, sectId);
  };

  const onSplitterPD = e => {
    e.preventDefault();
    const splitter = e.currentTarget;
    const lib = splitter.nextSibling;
    const startY = e.clientY;
    const startH = libHeightRef.current;
    const startZoom = zoomRef.current;
    const TOPBAR = 46;
    const startCanvasH = window.innerHeight - TOPBAR - 5 - startH;
    splitter.classList.add('active');
    lib.classList.add('resizing');
    const onMove = ev => {
      const dy = startY - ev.clientY;
      const maxH = Math.floor(window.innerHeight * 0.65);
      const newH = Math.max(80, Math.min(startH + dy, maxH));
      libHeightRef.current = newH;
      setLibHeight(newH);
      if (startCanvasH > 0) {
        const newCanvasH = window.innerHeight - TOPBAR - 5 - newH;
        const newZoom = Math.max(0.25, Math.min(startZoom * newCanvasH / startCanvasH, 2.0));
        zoomRef.current = newZoom;
        setZoom(newZoom);
      }
    };
    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      splitter.classList.remove('active');
      lib.classList.remove('resizing');
      const h = libHeightRef.current;
      localStorage.setItem('tb-libh', h);
      if (bidRef.current) {
        boardZoom.current[bidRef.current] = zoomRef.current;
        localStorage.setItem(`tb-zoom-${bidRef.current}`, String(zoomRef.current));
      }
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  return (
    <div className={`app${presentation ? ' presentation' : ''}`} onClick={() => { selRef.current = []; setSel([]); renaming && setRenaming(null); setThemeOpen(false); setPropsPanelId(null); setTextFmtPanelId(null); }}>

      {updateInfo && !updateDismissed && (
        <div className="update-banner">
          <span>&#9733;</span>
          <span>
            {lang === 'es'
              ? `Nueva versión disponible: v${updateInfo.version}`
              : `New version available: v${updateInfo.version}`}
            {updateInfo.downloadUrl && (<> &mdash; <a href={updateInfo.downloadUrl} target="_blank" rel="noreferrer">{lang === 'es' ? 'Descargar' : 'Download'}</a></>)}
          </span>
          <button className="update-banner-close" onClick={() => setUpdateDismissed(true)}>&#215;</button>
        </div>
      )}

      {/* ── TOPBAR ── */}
      <div className="topbar" onClick={e => e.stopPropagation()}>
        <div className="logo">Tableau</div>
        <div className="vsep"/>
        <div className="breadcrumb">
          {activeProject
            ? <>
                <span className="bc-seg">{activeProject.name}</span>
                {activeBoard && <>
                  <span className="bc-arrow">›</span>
                  <span className="bc-seg">{activeBoard.name}</span>
                  {boardDpi && boardUnits !== 'px' && (
                    <span className="bc-dpi">{boardPx ? '⊡ ' : ''}{boardDpi} dpi · {boardUnits}</span>
                  )}
                </>}
              </>
            : <span className="bc-none">{t('noProjHint')}</span>
          }
        </div>
        <div style={{flex:1}}/>
        {bid && <button className="btn" style={{fontSize:9}} onClick={() => setPresentation(true)} title={t('presentationBtn')}>{t('presentationBtn')}</button>}
        {pid && boards.length > 0 && (
          <button className="btn" style={{fontSize:10}} onClick={() => setModal('memoria')} title={t('reportTitle')}>
            {t('report')}
          </button>
        )}
        {bid && <>
          <button className={`btn${showGrid?' acc':''}`}
            style={{fontSize:9,letterSpacing:.3,opacity:(showGrid && gridCellPx*zoom<4)?0.45:1}}
            onClick={e => { if (gridDropOpen) { setGridDropOpen(false); return; } const r = e.currentTarget.getBoundingClientRect(); setGridDropPos({ left: r.left, top: r.bottom + 4 }); setGridDropOpen(true); }}
            title={showGrid && gridCellPx*zoom<4 ? t('gridHiddenZoom') : t('gridToggle')}>
            {t('gridToggle')}{showGrid && snapGrid ? ' ·' : ''}
          </button>
          <button className="btn" style={{fontSize:10}} onClick={() => { loadVersions(); setModal('versions'); }} title={t('versionsTitle')}>
            ⏱
          </button>
          <button className="btn" style={{fontSize:10}} onClick={openBoardConfig} title={t('boardConfig')}>
            {t('config')}
          </button>
          <button className="btn" style={{fontSize:10,gap:5}} title={t('exportJpeg')}
            onClick={e => {
              if (exportDropOpen) { setExportDropOpen(false); return; }
              setGridDropOpen(false);
              const r = e.currentTarget.getBoundingClientRect();
              setExportDropPos({ right: window.innerWidth - r.right, top: r.bottom + 4 });
              setExportDropOpen(true);
            }}>
            <SvgExport/>{t('exportJpeg')} ▾
          </button>
        </>}
        {!sbOpen && (
          <button className="btn" style={{fontSize:10}} onClick={() => setSbOpen(true)}>{t('showPanel')}</button>
        )}
        <div className="theme-picker" onClick={e => e.stopPropagation()}>
          <button className="btn theme-btn" onClick={() => setThemeOpen(o => !o)} title={t('preferences')}>
            <span className="theme-dot" style={{background: THEMES[theme]?.acc}}/>
          </button>
          {themeOpen && (
            <div className="theme-dropdown">
              <div className="pref-sec-hd">{t('themeLabel')}</div>
              {Object.entries(THEMES).map(([id, th]) => (
                <div key={id} className={`theme-opt${theme === id ? ' active' : ''}`}
                  onClick={() => applyTheme(id)}>
                  <div className="theme-swatches">
                    <div className="theme-sw" style={{background: th.bg, border:'1px solid #8884'}}/>
                    <div className="theme-sw" style={{background: th.acc}}/>
                  </div>
                  <span className="theme-opt-label">{th.label}</span>
                  {theme === id && <span style={{color:'var(--acc)',fontSize:11}}>✓</span>}
                </div>
              ))}
              <div className="pref-divider"/>
              <div className="pref-sec-hd">{t('langLabel')}</div>
              {[['es','Español'],['en','English']].map(([id, label]) => (
                <div key={id} className={`theme-opt${lang === id ? ' active' : ''}`}
                  onClick={() => applyLang(id)}>
                  <span style={{fontSize:13,lineHeight:1}}>{id==='es'?'ES':'EN'}</span>
                  <span className="theme-opt-label">{label}</span>
                  {lang === id && <span style={{color:'var(--acc)',fontSize:11}}>✓</span>}
                </div>
              ))}
              <div className="pref-divider"/>
              <div className="pref-sec-hd">{t('libTitle')}</div>
              <div className={`theme-opt${showLibPreview ? ' active' : ''}`}
                onClick={() => { const v = !showLibPreview; setShowLibPreview(v); localStorage.setItem('tb-lib-preview', v); }}>
                <span style={{fontSize:13,lineHeight:1}}>{showLibPreview ? '◉' : '○'}</span>
                <span className="theme-opt-label">{t('libPreviewToggle')}</span>
                {showLibPreview && <span style={{color:'var(--acc)',fontSize:11}}>✓</span>}
              </div>
              <div className="pref-divider"/>
              <div className="pref-sec-hd">{t('aboutLabel')}</div>
              <div className="pref-about" onClick={e => e.stopPropagation()}>
                <span className="pref-about-name">Tableau{appVersion ? ` · v${appVersion}` : ''}</span>
                <span className="pref-about-ver">{t('authorLabel')}: Blas González</span>
                <a className="pref-about-link"
                  href="https://blasgonzalezfotografia.com"
                  target="_blank"
                  rel="noopener noreferrer">
                  blasgonzalezfotografia.com
                </a>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── MAIN ── */}
      {!pid && !projects.length ? (
        <div className="start">
          <div className="start-logo">Tableau</div>
          <div className="start-sub">
            {t('startSub')}<br/>
            {t('startDesc')}
          </div>
          <button className="btn acc" style={{padding:'11px 30px',fontSize:12}}
            onClick={() => { setNameVal(''); setModal('project'); }}>
            {t('createFirstProject')}
          </button>
        </div>
      ) : (
        <div className="main-area">

          {/* ── SIDEBAR ── */}
          {!sbOpen ? (
            <div className="sidebar" style={{width:36,flexShrink:0}} onClick={e => e.stopPropagation()}>
              <div className="sb-toggle-strip" onClick={() => setSbOpen(true)} title={t('openPanel')}>
                <button className="sb-toggle-btn">▶</button>
                <div className="sb-collapsed-label">{t('panelLabel')}</div>
              </div>
            </div>
          ) : (
            <div className="sidebar" onClick={e => e.stopPropagation()}>
              <div className="sb-inner">

                {/* NAV: Projects & Boards */}
                <div className="sb-sec nav">
                  <div className="sb-sec-hd">
                    <span className="sb-sec-title">{t('projBoards')}</span>
                    <button className="sb-sec-btn" title={t('newProject')}
                      onClick={() => { setNameVal(''); setModal('project'); }}>+</button>
                    <button className="sb-sec-btn" title={t('importProjectBtn')}
                      onClick={() => importInputRef.current?.click()}><SvgImport size={12}/></button>
                    <input ref={importInputRef} type="file" accept=".zip" style={{display:'none'}}
                      onChange={e => { handleImportFile(e.target.files[0]); e.target.value = ''; }} />
                    <button className="sb-sec-btn" title={t('collapsePanel')} style={{marginLeft:2}}
                      onClick={() => setSbOpen(false)}>◀</button>
                  </div>
                  <div className="sb-scroll">
                    {projects.length === 0 ? (
                      <div className="nav-empty">
                        {t('noProjectsYet')}<br/>
                        {t('clickToCreate')}
                      </div>
                    ) : projects.map(p => {
                      const isActive = p.id === pid;
                      return (
                        <div key={p.id} className="nproj">
                          <div className={`nproj-row${isActive ? ' active' : ''}`} onClick={() => setPid(p.id)}
                            onContextMenu={e => { e.preventDefault(); e.stopPropagation(); setProjCtxMenu({ id: p.id, x: e.clientX, y: e.clientY }); }}>
                            <span className="nproj-arrow">{isActive ? '▾' : '›'}</span>
                            {renaming?.type === 'project' && renaming.id === p.id ? (
                              <input className="n-rename" autoFocus value={renaming.value}
                                onChange={e => setRenaming(r => ({ ...r, value: e.target.value }))}
                                onKeyDown={e => { if (e.key==='Enter') submitRename(); if (e.key==='Escape') setRenaming(null); }}
                                onBlur={submitRename} onClick={e => e.stopPropagation()}
                              />
                            ) : (
                              <span className="nproj-name" title={p.name} onDoubleClick={e => { e.stopPropagation(); startRename('project', p.id, p.name, e); }}>{p.name}</span>
                            )}
                            <div className="nrow-acts">
                              <button className="nact edit" title={t('exportProjectBtn')} onClick={e => exportProject(p.id, e)}><SvgExport size={11}/></button>
                              <button className="nact edit" title={t('renameBtn')} onClick={e => startRename('project', p.id, p.name, e)}>✎</button>
                              <button className="nact del"  title={t('deleteBtn')}  onClick={e => deleteProject(p.id, e)}>×</button>
                            </div>
                          </div>
                          {isActive && (
                            <div className="nboards">
                              {boards.map(b => (
                                <div key={b.id}
                                  className={`nboard-row${b.id === bid ? ' active' : ''}${boardDragOver === b.id ? ' drag-over' : ''}`}
                                  onClick={() => { setBid(b.id); setRoomView('board'); }}
                                  draggable
                                  onDragStart={e => { e.dataTransfer.effectAllowed = 'move'; setBoardDragId(b.id); }}
                                  onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setBoardDragOver(b.id); }}
                                  onDragLeave={() => setBoardDragOver(null)}
                                  onDrop={e => { e.preventDefault(); setBoardDragOver(null); if (boardDragId) reorderBoards(boardDragId, b.id); setBoardDragId(null); }}
                                  onDragEnd={() => { setBoardDragId(null); setBoardDragOver(null); }}
                                >
                                  <span className="nboard-drag">⠿</span>
                                  <span className="nboard-dash">└</span>
                                  {renaming?.type === 'board' && renaming.id === b.id ? (
                                    <input className="n-rename" autoFocus value={renaming.value}
                                      onChange={e => setRenaming(r => ({ ...r, value: e.target.value }))}
                                      onKeyDown={e => { if (e.key==='Enter') submitRename(); if (e.key==='Escape') setRenaming(null); }}
                                      onBlur={submitRename} onClick={e => e.stopPropagation()}
                                    />
                                  ) : (
                                    <span className="nboard-name" title={b.name} onDoubleClick={e => { e.stopPropagation(); startRename('board', b.id, b.name, e); }}>{b.name}</span>
                                  )}
                                  {!(renaming?.type === 'board' && renaming.id === b.id) && (
                                    <span className="nboard-count">{(allBoardItems[b.id] || []).filter(i => i.type !== 'note' && i.type !== 'text').length || ''}</span>
                                  )}
                                  <div className="nrow-acts">
                                    <button className="nact edit" title={t('renameBtn')}      onClick={e => startRename('board', b.id, b.name, e)}>✎</button>
                                    <button className="nact edit" title={t('duplicateBoard')} onClick={e => duplicateBoard(b.id, e)}>⧉</button>
                                    <button className="nact del"  title={t('deleteBtn')}      onClick={e => deleteBoard(b.id, e)}>×</button>
                                  </div>
                                </div>
                              ))}
                              <div className="nboard-add" onClick={() => { setNameVal(''); setModal('board'); }}>
                                {t('addBoard')}
                              </div>
                              {room !== null && (
                                <div className={`nsala-row${roomView==='room'?' active':''}`}
                                  onClick={() => setRoomView('room')}>
                                  🏛 {roomName || (lang==='es'?'Sala':'Room')}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* INFO */}
                <div className="sb-sec info">
                  <div className="sb-sec-hd">
                    <span className="sb-sec-title">{t('infoTitle')}</span>
                  </div>
                  <InfoPanel/>
                </div>

              </div>
            </div>
          )}

          {/* ── WORKSPACE ── */}
          <div className="workspace">

            {/* ROOM VIEW */}
            {roomView === 'room' && pid && (() => {
              const vb = roomVbox;
              const vbStr = `${vb.x} ${vb.y} ${vb.w} ${vb.h}`;
              const gridLines = [];
              const MINOR = 50, MAJOR = 100;
              for (let x = Math.floor(vb.x/MINOR)*MINOR; x <= vb.x+vb.w; x+=MINOR) {
                const maj = x%MAJOR===0;
                gridLines.push(<line key={`gv${x}`} x1={x} y1={vb.y} x2={x} y2={vb.y+vb.h} stroke={maj?'rgba(128,128,128,.18)':'rgba(128,128,128,.07)'} strokeWidth={maj?.8:.4}/>);
              }
              for (let y = Math.floor(vb.y/MINOR)*MINOR; y <= vb.y+vb.h; y+=MINOR) {
                const maj = y%MAJOR===0;
                gridLines.push(<line key={`gh${y}`} x1={vb.x} y1={y} x2={vb.x+vb.w} y2={y} stroke={maj?'rgba(128,128,128,.18)':'rgba(128,128,128,.07)'} strokeWidth={maj?.8:.4}/>);
              }
              const allVerts = room ? room.vertices : roomTempVerts;
              const svgFontSz = Math.round(vb.w * 0.013);
              return (
                <div className="room-view">
                  <div className="room-svg-wrap">
                    <svg ref={roomSvgRef} viewBox={vbStr}
                      onClick={onRoomSvgClick} onMouseMove={onRoomSvgMM}
                      onDoubleClick={onRoomSvgDblClick}
                      onWheel={onRoomSvgWheel}
                      onPointerDown={onRoomSvgPD}
                      onContextMenu={e=>{
                        if(roomDrawing)return;
                        e.preventDefault();
                        const pt=roomSvgPt(e);
                        setRoomSvgCtx({x:e.clientX,y:e.clientY,svgX:pt.x,svgY:pt.y});
                      }}
                      style={{cursor:roomDrawing?'crosshair':undefined, userSelect:'none'}}>
                      <g>{gridLines}</g>

                      {/* Polygon fill — only for closed rooms */}
                      {room && room.closed !== false && (
                        <polygon points={room.vertices.map(v=>`${v.x},${v.y}`).join(' ')}
                          fill="rgba(100,160,220,.07)" stroke="none"/>
                      )}

                      {/* Saved walls */}
                      {room && room.walls.map(wall => {
                        const v1=room.vertices.find(v=>v.id===wall.v1), v2=room.vertices.find(v=>v.id===wall.v2);
                        if(!v1||!v2) return null;
                        const mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
                        const len=roomWallLen(wall,room.vertices);
                        const linked = wall.boardId && boards.find(b=>b.id===wall.boardId);
                        const hov = roomHovWall === wall.id;
                        return (
                          <g key={wall.id}
                            onMouseEnter={()=>!roomDrawing&&setRoomHovWall(wall.id)}
                            onMouseLeave={()=>setRoomHovWall(null)}>
                            {/* Wide invisible hit area for easier hover */}
                            <line x1={v1.x} y1={v1.y} x2={v2.x} y2={v2.y} stroke="transparent" strokeWidth={svgFontSz*1.4} style={{pointerEvents:'stroke'}}/>
                            <line x1={v1.x} y1={v1.y} x2={v2.x} y2={v2.y}
                              stroke={hov?'var(--acc)':(linked?'var(--acc)':'var(--dim)')}
                              strokeWidth={hov?4:2.5} opacity={hov?1:linked?1:0.7}/>
                            <text x={mx} y={my+svgFontSz*.4} textAnchor="middle" fontSize={svgFontSz*.8}
                              fill={hov?'var(--acc)':'var(--muted)'} style={{pointerEvents:'none'}}>{cmLabel(len)}</text>
                          </g>
                        );
                      })}

                      {/* Temp walls during drawing */}
                      {roomTempVerts.slice(1).map((v,i)=>{
                        const prev=roomTempVerts[i];
                        return <line key={i} x1={prev.x} y1={prev.y} x2={v.x} y2={v.y} stroke="var(--acc)" strokeWidth={2}/>;
                      })}

                      {/* Active segment */}
                      {roomDrawing && roomCursor && roomTempVerts.length>0 && (
                        <line x1={roomTempVerts[roomTempVerts.length-1].x} y1={roomTempVerts[roomTempVerts.length-1].y}
                          x2={roomCursor.x} y2={roomCursor.y}
                          stroke={roomCursor.snapped?'var(--acc)':'var(--dim)'}
                          strokeWidth={1.5} strokeDasharray="8 4"/>
                      )}

                      {/* Temp vertices */}
                      {roomTempVerts.map((v,i)=>(
                        <circle key={v.id} cx={v.x} cy={v.y} r={i===0?svgFontSz*.7:svgFontSz*.45}
                          fill={i===0?'var(--acc)':'var(--text)'} stroke="var(--bg)" strokeWidth={1.5}/>
                      ))}

                      {/* Columns */}
                      {room && (room.columns||[]).map(col=>(
                        <rect key={col.id} x={col.x} y={col.y} width={col.w} height={col.d}
                          fill="var(--text)" opacity={0.65} rx={1}
                          style={{cursor:roomDrawing?'default':'move'}}
                          onPointerDown={e=>onColumnPD(e,col.id)}
                          onContextMenu={e=>{e.preventDefault();e.stopPropagation();setRoomColCtx({id:col.id,x:e.clientX,y:e.clientY});}}/>
                      ))}

                      {/* Saved vertices (draggable, right-click to delete) */}
                      {room && !roomDrawing && room.vertices.map(v=>(
                        <circle key={v.id} cx={v.x} cy={v.y} r={svgFontSz*.55}
                          fill="var(--acc)" stroke="var(--bg)" strokeWidth={1.5}
                          style={{cursor:'move'}} onPointerDown={e=>onRoomVertexPD(e,v.id)}
                          onContextMenu={e=>{e.preventDefault();e.stopPropagation();setRoomVertCtx({id:v.id,x:e.clientX,y:e.clientY});}}/>
                      ))}

                      {/* Cursor dot */}
                      {roomDrawing && roomCursor && (
                        <circle cx={roomCursor.x} cy={roomCursor.y} r={svgFontSz*.4}
                          fill={roomCursor.nearClose||roomCursor.nearExisting?'#4caf50':roomCursor.snapped?'var(--acc)':'var(--dim)'}
                          stroke="var(--bg)" strokeWidth={1.2} style={{pointerEvents:'none'}}/>
                      )}
                    </svg>

                    {/* Toolbar */}
                    <div className="room-toolbar">
                      {!roomDrawing && !room && <button className="btn" onClick={()=>{setRoomDrawing(true);setRoomAppending(false);setRoomTempVerts([]);setRoomCursor(null);}}>
                        {t('salaDraw')}
                      </button>}
                      {!roomDrawing && room && <button className="btn" onClick={()=>{setRoomAppending(true);setRoomDrawing(true);setRoomTempVerts([]);setRoomCursor(null);}}>
                        {t('salaEdit')}
                      </button>}
                      {roomDrawing && <button className="btn" onClick={()=>{setRoomDrawing(false);setRoomAppending(false);setRoomTempVerts([]);setRoomCursor(null);}}>
                        {t('salaCancel')}
                      </button>}
                      {roomDrawing && roomTempVerts.length >= 2 && (
                        <button className="btn" onClick={() => finishOpenPolygon(roomTempVerts, roomAppending)}>
                          {t('salaFinish')}
                        </button>
                      )}
                      {room && !roomDrawing && <button className="btn" onClick={openRoom3D}>{lang==='es'?'Vista 3D':'3D View'}</button>}
                      {room && !roomDrawing && <button className="btn" onClick={exportRoom} title={lang==='es'?'Exportar sala':'Export room'}><SvgExport size={11}/></button>}
                      {!roomDrawing && <button className="btn" onClick={()=>importRoomRef.current?.click()} title={lang==='es'?'Importar sala':'Import room'}><SvgImport size={11}/></button>}
                      <input ref={importRoomRef} type="file" accept=".json" style={{display:'none'}} onChange={importRoom}/>
                      {room && !roomDrawing && <button className="btn danger" onClick={deleteRoom}>{t('salaDelete')}</button>}
                      <span style={{fontSize:9,color:'var(--muted)',marginLeft:4}}>{lang==='es'?'Rueda → zoom · Arrastrar → desplazar':'Wheel → zoom · Drag → pan'}</span>
                    </div>

                    {/* Drawing hint */}
                    {roomDrawing && <div className="room-hint">
                      {roomCursor?.nearClose ? (lang==='es'?'Clic para cerrar la figura':'Click to close') : t('salaDrawHint')}
                      {roomCursor?.snapped && !roomCursor?.nearClose && ` · ${t('salaSnapHint')}`}
                    </div>}
                    {!roomDrawing && !room && <div className="room-hint">{lang==='es'?'Pulsa "Dibujar planta" para empezar':'Click "Draw floor plan" to start'}</div>}
                  </div>

                  {/* Wall panel */}
                  <div className="room-panel">
                    <div className="room-panel-hd" style={{display:'flex',alignItems:'center',gap:6}}>
                      {roomNameEdit ? (
                        <input autoFocus value={roomName} placeholder={lang==='es'?'Nombre de la sala…':'Room name…'}
                          style={{flex:1,background:'var(--input)',border:'1px solid var(--acc)',color:'var(--text)',fontSize:10,padding:'2px 6px',borderRadius:3,fontFamily:'inherit'}}
                          onChange={e=>{setRoomName(e.target.value);}}
                          onKeyDown={e=>{
                            if(e.key==='Enter'||e.key==='Escape'){setRoomNameEdit(false);saveRoom({...roomRef.current,name:roomName.trim()});}
                          }}
                          onBlur={()=>{setRoomNameEdit(false);saveRoom({...roomRef.current,name:roomName.trim()});}}
                          onClick={e=>e.stopPropagation()}/>
                      ) : (
                        <span style={{flex:1,cursor:'text',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                          title={lang==='es'?'Clic para nombrar la sala':'Click to name the room'}
                          onClick={()=>setRoomNameEdit(true)}>
                          {roomName || (lang==='es'?'Sin nombre…':'Unnamed…')}
                        </span>
                      )}
                    </div>
                    <div className="room-panel-hd" style={{fontSize:8,paddingTop:6,paddingBottom:6}}>{t('salaWallsHd')}</div>
                    <div className="room-cfg">
                      <label>{t('salaCeilLbl')}</label>
                      <input type="number" min="100" max="2000" step="10"
                        value={roomCeilH}
                        onChange={e => {
                          const v = Number(e.target.value)||280;
                          setRoomCeilH(v);
                          if (roomRef.current) saveRoom({...roomRef.current, ceilingHeight:v});
                        }}/>
                      <span>{t('salaCeilUnit')}</span>
                    </div>
                    <div className="room-walls">
                      {!room ? (
                        <div className="room-empty">{t('salaNoWalls')}</div>
                      ) : room.walls.map(wall => {
                        const len = roomWallLen(wall, room.vertices);
                        const linkedBoard = wall.boardId ? boards.find(b=>b.id===wall.boardId) : null;
                        const mismatch = linkedBoard && linkedBoard.fixed && linkedBoard.units === 'cm' && Math.abs(linkedBoard.fixedW - len) > 0.5;
                        return (
                          <div key={wall.id} className={`room-wall-row${roomHovWall===wall.id?' hov':''}`}
                            onMouseEnter={()=>setRoomHovWall(wall.id)}
                            onMouseLeave={()=>setRoomHovWall(null)}>
                            {roomRenameWid === wall.id ? (
                              <input className="room-wall-rename" autoFocus value={roomRenameVal}
                                onChange={e=>setRoomRenameVal(e.target.value)}
                                onKeyDown={e=>{
                                  if(e.key==='Enter'){
                                    saveRoom({...roomRef.current,walls:roomRef.current.walls.map(w=>w.id===wall.id?{...w,name:roomRenameVal.trim()||w.name}:w)});
                                    setRoomRenameWid(null);
                                  }
                                  if(e.key==='Escape') setRoomRenameWid(null);
                                }}
                                onBlur={()=>{
                                  saveRoom({...roomRef.current,walls:roomRef.current.walls.map(w=>w.id===wall.id?{...w,name:roomRenameVal.trim()||w.name}:w)});
                                  setRoomRenameWid(null);
                                }}
                                onClick={e=>e.stopPropagation()}/>
                            ) : (
                              <span className="room-wall-name" title={t('salaWallRename')}
                                onDoubleClick={()=>{setRoomRenameWid(wall.id);setRoomRenameVal(wall.name);}}>
                                {wall.name}
                              </span>
                            )}
                            <span className="room-wall-len">{cmLabel(len)}</span>
                            {mismatch && <span className="room-wall-warn" title={t('salaWallMismatch')}>⚠</span>}
                            <input type="color" value={wall.color||'#d0c8bc'}
                              title={lang==='es'?'Color de pared':'Wall color'}
                              style={{width:18,height:18,padding:0,border:'1px solid var(--border2)',borderRadius:2,cursor:'pointer',flexShrink:0}}
                              onChange={e=>saveRoom({...roomRef.current,walls:roomRef.current.walls.map(w=>w.id===wall.id?{...w,color:e.target.value}:w)})}/>
                            {linkedBoard && (
                              <button className="btn" style={{fontSize:9,padding:'1px 5px',flexShrink:0}}
                                title={wall.flipSide?(lang==='es'?'Fotos al dorso (clic para cambiar)':'Photos on back (click to flip)'):(lang==='es'?'Fotos al frente (clic para cambiar)':'Photos on front (click to flip)')}
                                onClick={()=>saveRoom({...roomRef.current,walls:roomRef.current.walls.map(w=>w.id===wall.id?{...w,flipSide:!w.flipSide}:w)})}>
                                {wall.flipSide?'◁':'▷'}
                              </button>
                            )}
                            {mismatch && (
                              <button className="btn" style={{fontSize:8,padding:'2px 6px',color:'#e87528',borderColor:'#e87528'}}
                                onClick={()=>syncWallBoard(wall, linkedBoard)}>
                                {t('salaWallSync')}
                              </button>
                            )}
                            {linkedBoard ? (
                              <button className="btn" style={{fontSize:8,padding:'2px 6px',color:'var(--acc)',borderColor:'var(--acc-dim)'}}
                                onClick={()=>{setBid(linkedBoard.id);bidRef.current=linkedBoard.id;setRoomView('board');}}>
                                {t('salaWallBoard')}
                              </button>
                            ) : (
                              <button className="btn" style={{fontSize:8,padding:'2px 6px'}}
                                onClick={()=>createRoomBoard(wall.id)}>
                                {t('salaCreateBoard')}
                              </button>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* 3D VIEW */}
            {roomView === '3d' && pid && room && (
              <div className="room-view">
                <div className="room-svg-wrap" style={{background:'#1e1e1e', position:'relative'}}>
                  <canvas ref={room3DCanvasRef} style={{display:'block', width:'100%', height:'100%'}}/>
                  <div className="room-toolbar room-toolbar-3d">
                    <button className="btn" onClick={() => setRoomView('room')}>← {lang==='es'?'Planta':'Floor plan'}</button>
                    <button className="btn" onClick={() => reset3DViewRef.current?.()}>{lang==='es'?'Centrar':'Reset view'}</button>
                    <button className="btn" onClick={() => snapshot3DRef.current?.()}>{lang==='es'?'Capturar':'Snapshot'}</button>
                  </div>
                </div>
                <div className="room-panel">
                  <div className="room-panel-hd">{lang==='es'?'VISTA 3D':'3D VIEW'}</div>
                  <div style={{fontSize:10, color:'var(--muted)', padding:'10px 12px', lineHeight:1.7, whiteSpace:'pre-line'}}>
                    {lang==='es'
                      ? 'Arrastra izq. → orbitar\nBotón der. → desplazar\nRueda → zoom suave'
                      : 'Left drag → orbit\nRight drag → pan\nWheel → smooth zoom'}
                  </div>
                </div>
              </div>
            )}

            {/* CANVAS */}
            <div ref={wrapRef} className={`canvas-wrap${libExpanded ? ' lib-expanded' : ''}`}
              style={{...(boardPx ? { background: '#1e1e1e', padding: BOARD_PAD } : {}), ...((roomView==='room'||roomView==='3d')?{display:'none'}:{})}}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(false); }}
              onDrop={onCanvasDrop}
            >
              {dragOver && <div className="canvas-drop-hint">{t('dropHint')}</div>}
              {sel.length >= 1 && (
                <div className="align-bar" onClick={e => e.stopPropagation()}>
                  <span className="abt-label">{sel.length}</span>
                  {sel.length >= 2 && <>
                    <div className="align-bar-sep"/>
                    <button className="abt" title={t('alLeft')}   onClick={() => alignItems('left')}><SvgAlignL/></button>
                    <button className="abt" title={t('alCH')}     onClick={() => alignItems('ch')}><SvgAlignCH/></button>
                    <button className="abt" title={t('alRight')}  onClick={() => alignItems('right')}><SvgAlignR/></button>
                    <div className="align-bar-sep"/>
                    <button className="abt" title={t('alTop')}    onClick={() => alignItems('top')}><SvgAlignT/></button>
                    <button className="abt" title={t('alCV')}     onClick={() => alignItems('cv')}><SvgAlignCV/></button>
                    <button className="abt" title={t('alBottom')} onClick={() => alignItems('bottom')}><SvgAlignB/></button>
                    {sel.length >= 3 && <>
                      <div className="align-bar-sep"/>
                      <button className="abt" title={t('distH')}  onClick={() => alignItems('dh')}><SvgDistH/></button>
                      <button className="abt" title={t('distV')}  onClick={() => alignItems('dv')}><SvgDistV/></button>
                    </>}
                    <div className="align-bar-sep"/>
                    <button className="abt" title={t('eqWidth')}  onClick={() => alignItems('eqw')}><SvgEqW/></button>
                    {sel.length === 2 && <>
                      <div className="align-bar-sep"/>
                      <button className="abt" title={t('swapPos')} onClick={swapItems} style={{fontSize:16}}>⇄</button>
                    </>}
                  </>}
                  <div className="align-bar-sep"/>
                  <button className="abt" title={t('exportSelJpeg')} onClick={exportSelection}><SvgExport/></button>
                  {copyBoardInput === null ? (
                    <button className="abt" style={{fontSize:12}} title={lang==='es'?'Copiar selección a nuevo tablero':'Copy selection to new board'}
                      onClick={() => setCopyBoardInput('')}>⊞</button>
                  ) : (
                    <>
                      <input autoFocus className="inp" style={{width:110,fontSize:9,padding:'2px 5px'}}
                        placeholder={t('boardNamePh')}
                        value={copyBoardInput}
                        onChange={e => setCopyBoardInput(e.target.value)}
                        onKeyDown={e => { if (e.key==='Enter') copySelectionToNewBoard(copyBoardInput); if (e.key==='Escape') setCopyBoardInput(null); }}
                        onClick={e => e.stopPropagation()}
                        onPointerDown={e => e.stopPropagation()}
                      />
                      <button className="abt" style={{color:'var(--acc)'}} onClick={() => copySelectionToNewBoard(copyBoardInput)}>✓</button>
                      <button className="abt" onClick={() => setCopyBoardInput(null)}>✕</button>
                    </>
                  )}
                  {sel.length >= 2 && (
                    <button className="abt" title={t('groupItems')} onClick={groupItems}><SvgGroup/></button>
                  )}
                  {sel.some(id => items.find(i => i.id === id)?.groupId) && (
                    <button className="abt" title={t('ungroupItems')} onClick={ungroupItems}><SvgUngroup/></button>
                  )}
                  <div className="align-bar-sep"/>
                  <button className="abt" style={{color:'var(--dim)',fontSize:14}} title={t('clearSel')}
                    onClick={() => { selRef.current = []; setSel([]); setCopyBoardInput(null); }}>×</button>
                </div>
              )}
              {(() => {
                const gridColor = boardPx ? 'rgba(0,0,0,0.09)' : 'var(--grid)';
              return (
              <div className="canvas" style={{
                zoom,
                '--canvas-zoom': zoom,
                backgroundImage: (showGrid && gridCellPx * zoom >= 4)
                  ? `linear-gradient(${gridColor} 1px,transparent 1px),linear-gradient(90deg,${gridColor} 1px,transparent 1px)`
                  : 'none',
                backgroundSize: `${gridCellPx}px ${gridCellPx}px`,
                ...(boardPx ? {
                  width: boardPx.w, height: boardPx.h,
                  minWidth: boardPx.w, minHeight: boardPx.h,
                  backgroundColor: '#fff',
                  boxShadow: '0 8px 48px rgba(0,0,0,.7)',
                  overflow: 'hidden',
                } : {})
              }} onClick={e => { if (wasDragged.current) { wasDragged.current = false; e.stopPropagation(); return; } selRef.current = []; setSel([]); setCanvasCtx(null); }}
              onContextMenu={e => {
                if (!bid || presentation) return;
                e.preventDefault();
                const wrapEl = wrapRef.current;
                const rect = wrapEl.getBoundingClientRect();
                const cx = Math.round((e.clientX - rect.left + wrapEl.scrollLeft) / zoom);
                const cy = Math.round((e.clientY - rect.top  + wrapEl.scrollTop)  / zoom);
                setCanvasCtx({ x: Math.min(e.clientX, window.innerWidth - 160), y: Math.min(e.clientY, window.innerHeight - 90), cx, cy });
              }}>
                {lasso && <div className="lasso" style={{left:lasso.x1,top:lasso.y1,width:Math.max(0,lasso.x2-lasso.x1),height:Math.max(0,lasso.y2-lasso.y1)}}/>}
                {snapGuides.v.map((g, i) => <div key={`sgv${i}`} style={{position:'absolute',left:g.pos,top:g.from,width:1/zoom,height:g.to-g.from,background:g.color||'var(--acc)',opacity:.85,pointerEvents:'none',zIndex:9999}}/>)}
                {snapGuides.h.map((g, i) => <div key={`sgh${i}`} style={{position:'absolute',left:g.from,top:g.pos,width:g.to-g.from,height:1/zoom,background:g.color||'var(--acc)',opacity:.85,pointerEvents:'none',zIndex:9999}}/>)}
                {!bid && (
                  <div className="hint">
                    <em>{t('noBoard')}</em>
                    {t('createBoardHint')}
                  </div>
                )}
                {bid && items.length === 0 && (
                  <div className="hint">
                    <em>{t('emptyBoard')}</em>
                    {t('dragHint1')}<br/>
                    {t('dragHint2')}<br/>
                    {t('dragHint3')}
                  </div>
                )}

                {[...items].sort((a, b) => (a.z||0)-(b.z||0)).map(item => {
                  if (item.type === 'zone') {
                    const zClr = ZONE_COLOR_VALS[item.color] || ZONE_COLOR_VALS.blue;
                    return (
                      <div key={item.id} className={`zitem${sel.includes(item.id)?' sel':''}${sel[0]===item.id?' anchor':''}`}
                        style={{ position:'absolute', left: item.x, top: item.y, width: item.w, height: item.h || 320, zIndex: item.z || -1 }}
                        onPointerDown={e => onItemPD(e, item.id)}
                        onClick={e => handleItemClick(e, item)}
                        onContextMenu={e => openCtxMenu(e, item.id)}
                      >
                        <div className="bitem-bar" onPointerDown={e => e.stopPropagation()} style={item.y * zoom < 40 ? {bottom:'auto',top:'100%'} : undefined}>
                          <button className="ibc del" title={t('deleteBtn')} onClick={e => { e.stopPropagation(); deleteItem(item.id); }}>×</button>
                        </div>
                        <div className="zitem-body" style={{background: zClr.fill, border:`2px dashed ${zClr.border}`}}>
                          <input className="zitem-label" value={item.label||''} placeholder={t('zoneLabelPh')}
                            style={{color: zClr.text}}
                            onChange={e => { const nit = itemsRef.current.map(i => i.id === item.id ? {...i, label: e.target.value} : i); setItems(nit); itemsRef.current = nit; }}
                            onFocus={pushUndo}
                            onBlur={() => saveItemsNow(itemsRef.current)}
                            onPointerDown={e => e.stopPropagation()}
                            onClick={e => e.stopPropagation()}
                          />
                        </div>
                        <div className="zrh nw" onPointerDown={e => onResizeZonePD(e, item.id, 'nw')}/>
                        <div className="zrh ne" onPointerDown={e => onResizeZonePD(e, item.id, 'ne')}/>
                        <div className="zrh sw" onPointerDown={e => onResizeZonePD(e, item.id, 'sw')}/>
                        <div className="zrh se" onPointerDown={e => onResizeZonePD(e, item.id, 'se')}/>
                        <div className="zrh n" onPointerDown={e => onResizeZonePD(e, item.id, 'n')}/>
                        <div className="zrh s" onPointerDown={e => onResizeZonePD(e, item.id, 's')}/>
                        <div className="zrh e" onPointerDown={e => onResizeZonePD(e, item.id, 'e')}/>
                        <div className="zrh w" onPointerDown={e => onResizeZonePD(e, item.id, 'w')}/>
                      </div>

                    </div>

                  const photo = photos.find(p => p.id === item.photoId);

                  // naturalW/H: pre-rotation image dimensions at item.w scale

                    ? (photo ? Math.round(item.w * photo.w / photo.h) : item.w)
                    : item.w;
                  const naturalH = isSwapped
                    ? item.w
                    : (photo ? Math.round(item.w * photo.h / photo.w) : item.w);
                  // displayH: actual height the item occupies on canvas
                  const displayH = isSwapped ? naturalW : naturalH;

                : photoSort === 'color'
                ? [...photos].sort((a, b) => {
                    const ac = a.meanColor, bc = b.meanColor;
                    if (!ac && !bc) return 0;
                    if (!ac) return 1;
                    if (!bc) return -1;
                    const aH = rgbToHsl(ac.r, ac.g, ac.b);
                    const bH = rgbToHsl(bc.r, bc.g, bc.b);
                    const aN = aH.s < 0.1;
                    const bN = bH.s < 0.1;
                    if (aN && bN) return aH.l - bH.l;
                    if (aN) return 1;
                    if (bN) return -1;
                    return aH.h - bH.h;
                  })
                : photoSort === 'brightness'
                ? [...photos].sort((a, b) => (a.brightness ?? 0.5) - (b.brightness ?? 0.5))
                : photoSort === 'rating'
                ? [...photos].sort((a, b) => (b.rating || 0) - (a.rating || 0))
                : photos;

              return (
              <div className={`library${libDragOver ? ' lib-drop-active' : ''}`} style={{height: libH}} onClick={e => e.stopPropagation()}>

                  <span className="lib-title">{t('libTitle')}</span>
                  <span className="lib-count">{displayedPhotos.length < photos.length ? `${displayedPhotos.length}/${photos.length}` : photos.length}</span>
                  <span className="lib-spacer"/>

                    <input className="lib-search" type="text" placeholder={t('libSearchPh')}
                      value={libSearch} onClick={e => e.stopPropagation()}
                      onChange={e => setLibSearch(e.target.value)}/>
                    <button className={`lib-filter${photoFilter === 'pending' ? ' active' : ''}`} onClick={toggleFilter} title={t('filterPending')}>⊘ {t('filterPending')}</button>
                    {(rejectedCount > 0 || rejectedFilter !== false) && (
                      <button className={`lib-filter${rejectedFilter !== false ? ' active danger' : ''}`}
                        onClick={e => { e.stopPropagation(); setRejectedFilter(f => f === false ? true : f === true ? null : false); }}
                        title={rejectedFilter === true ? t('filterRejectedHide') : t('filterRejected')}>
                        ✕ {t('filterRejected')}{rejectedCount > 0 && <span style={{marginLeft:3,opacity:.7}}>{rejectedCount}</span>}
                      </button>
                    )}
                    <div className="lib-star-filter" title={t('ratingFilterHint')}>
                      {[1,2,3,4,5].map(n => (
                        <button key={n} className={ratingFilter >= n ? 'lit' : ''} onClick={e => toggleStarFilter(n, e)}>★</button>
                      ))}
                    </div>
                    <button className={`tag-filter-btn${tagFilter.length > 0 ? ' active' : ''}`}
                      onClick={e => { e.stopPropagation(); setTagFilterPop(v => !v); }}
                      title={t('tagFilterBtn')}>
                      # {t('tagFilterBtn')}{tagFilter.length > 0 && <span className="tag-filter-badge">{tagFilter.length}</span>}
                    </button>
                    <select className="lib-sort" value={photoSort}
                      onClick={e => e.stopPropagation()}
                      onChange={e => { const v = e.target.value; setPhotoSort(v); localStorage.setItem('photoSort', v); }}>

        const selPhotos = libSel.map(id => photos.find(p => p.id === id)).filter(Boolean);

          ? Math.max(0, Math.round((bPx.w - gapPx * (cols + 1)) / cols))
          : (activeBoardMeta?.defaultW || 300);
        let fitsAll = true, fitsCount = N;
        if (bPx && cellW > 0) {
          let count = 0, y = gapPx;
          const rows = Math.ceil(N / cols);
          for (let r = 0; r < rows; r++) {
            let maxH = 0;
            for (let c = 0; c < cols; c++) {
              const idx = r * cols + c;
              if (idx >= N) break;
              const ph = selPhotos[idx];
              const h = Math.round(cellW * ph.h / ph.w);
              if (h > maxH) maxH = h;
            }
            if (y + maxH + gapPx <= bPx.h) { count += Math.min(cols, N - r * cols); y += maxH + gapPx; }
            else break;
          }
          fitsCount = count; fitsAll = count >= N;

      {dupModal && (
        <div className="overlay" onClick={() => setDupModal(null)}>
          <div className="modal" style={{maxWidth:360}} onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('dupTitle')}</div>
            <div className="modal-sub">{t('dupDesc', dupModal.duplicates.length)}</div>
            <div style={{maxHeight:180,overflowY:'auto',margin:'8px 0',display:'flex',flexDirection:'column',gap:3}}>
              {dupModal.duplicates.map(f => (
                <div key={f.name} style={{fontSize:10,color:'var(--text)',fontFamily:"'IBM Plex Mono',monospace",padding:'3px 8px',background:'var(--surf)',letterSpacing:'.2px'}}>{f.name}</div>
              ))}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:4}}>
              <button className="btn acc" style={{fontSize:10,padding:'8px 0'}}
                onClick={() => { const m=dupModal; setDupModal(null); doUpload(m.imageFiles,'replace',m.dropPos,m.sectionId); }}>
                {t('dupReplace')}
              </button>
              <button className="btn" style={{fontSize:10,padding:'8px 0'}}
                onClick={() => { const m=dupModal; setDupModal(null); doUpload(m.imageFiles,'skip',m.dropPos,m.sectionId); }}>
                {t('dupSkip')}
              </button>
              <button className="btn" style={{fontSize:10,padding:'8px 0'}}
                onClick={() => { const m=dupModal; setDupModal(null); doUpload(m.imageFiles,'add',m.dropPos,m.sectionId); }}>
                {t('dupAdd')}
              </button>
            </div>
          </div>
        </div>
      )}

      {modal === 'versions' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" style={{minWidth:340,maxWidth:440}} onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('versionsTitle')}</div>
            <div className="modal-sub">{activeBoardMeta?.name}</div>
            <button className="btn acc" style={{fontSize:10,width:'100%',padding:'8px 0'}} onClick={saveVersion}>
              + {t('saveVersion')}
            </button>
            {versions.length === 0 ? (
              <div style={{fontSize:9,color:'var(--muted)',textAlign:'center',padding:'16px 0'}}>{t('noVersions')}</div>
            ) : (
              <div className="ver-list">
                {versions.map(v => (
                  <div key={v.ts} className="ver-row">
                    <div style={{flex:1}}>
                      <div className="ver-ts">{fmtTs(v.ts)}</div>
                      <div className="ver-count">{t('versionItems', v.itemCount)}</div>
                    </div>
                    <button className="btn" style={{fontSize:9,padding:'3px 8px'}} onClick={() => restoreVersion(v.ts)}>{t('restoreVersion')}</button>
                    <button className="btn" style={{fontSize:9,padding:'3px 7px',color:'var(--danger,#e05)'}} onClick={() => deleteVersion(v.ts)}>×</button>
                  </div>
                ))}
              </div>
            )}
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('close')}</button>
            </div>
          </div>
        </div>
      )}

      {modal === 'memoria' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal mem-modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('reportTitle')}</div>
            <div className="modal-sub">{activeProject?.name}</div>
            <div className="mem-scroll">
              {/* ── Información del proyecto ── */}
              <div className="mem-info-block">
                <div className="mem-info-hd">{t('exInfoHd')}</div>
                <input className="mem-info-input" placeholder={t('exTitlePh')}
                  value={memDraft.exTitle}
                  onChange={e => setMemDraft(d => ({ ...d, exTitle: e.target.value }))}
                  onBlur={e => saveProjectInfo({ exTitle: e.target.value })}/>
                <input className="mem-info-input" placeholder={t('exSubtitlePh')}
                  value={memDraft.subtitle}
                  onChange={e => setMemDraft(d => ({ ...d, subtitle: e.target.value }))}
                  onBlur={e => saveProjectInfo({ subtitle: e.target.value })}/>
              </div>

              {/* ── Secciones libres ── */}
              <div className="mem-info-hd" style={{marginBottom:8}}>{t('customSectionsHd')}</div>
              {memDraft.memSections.map(sec => (
                <div key={sec.id} className="mem-free-section">
                  <div className="mem-free-hd">
                    <input className="mem-free-title" placeholder={t('sectionTitlePh')}
                      value={sec.title}
                      onChange={e => updateMemSection(sec.id, 'title', e.target.value)}
                      onBlur={() => saveProjectInfo({ memSections: memDraft.memSections })}/>
                    <button className="mem-free-del" onClick={() => removeMemSection(sec.id)}>×</button>
                  </div>
                  <textarea className="mem-free-body" placeholder={t('sectionBodyPh')}
                    value={sec.body}
                    onChange={e => updateMemSection(sec.id, 'body', e.target.value)}
                    onBlur={() => saveProjectInfo({ memSections: memDraft.memSections })}/>
                </div>
              ))}
              <button className="mem-add-section-btn" onClick={addMemSection}>{t('addSection')}</button>

              {/* ── Tableros y piezas ── */}
              <div className="mem-boards-sep">{t('boardsSectionHd')}</div>
              {boards.length === 0 ? (
                <div style={{color:'var(--muted)',fontSize:10,padding:'8px 0'}}>{t('noBoardsInProject')}</div>
              ) : boards.map(board => {
                const boardIt = allBoardItems[board.id] || [];
                const dpi = board.dpi || null;
                const units = board.units || 'px';
                const hasPhys = dpi && units !== 'px';
                return (
                  <div key={board.id} className="mem-board" style={board.inMemory === false ? {opacity:.4} : undefined}>
                    <div className="mem-board-hd">
                      <span className="mem-board-name">{board.name}</span>
                      <span className="mem-board-cfg" style={hasPhys ? {} : {color:'var(--muted)'}}>
                        {hasPhys ? `${dpi} dpi · ${units}` : t('noPhysScale')}
                      </span>
                      <span style={{marginLeft:'auto'}}>
                        <button className="btn" style={{fontSize:8,padding:'2px 7px',color: board.inMemory===false?'var(--muted)':'var(--acc)',borderColor: board.inMemory===false?'var(--border)':'var(--acc-dim)'}}
                          onClick={() => toggleBoardInMemory(board.id, board.inMemory)}>
                          {board.inMemory === false ? t('boardExMemory') : t('boardInMemory')}
                        </button>
                      </span>
                    </div>
                    {boardIt.length === 0 ? (
                      <div className="mem-board-empty">{t('emptyBoardMem')}</div>
                    ) : (() => {
                      const bPx = getBoardPx(board);
                      const textItems = boardIt.filter(i => i.type === 'text');
                      const photoItems = boardIt.filter(i => i.type !== 'note' && i.type !== 'text' && i.type !== 'zone').map(item => {
                        const photo = photos.find(p => p.id === item.photoId);
                        const rot = item.rot || 0; const freeRot = item.freeRot || 0;
                        const isSwapped = rot % 180 !== 0;
                        const naturalW = isSwapped ? (photo ? Math.round(item.w * photo.w / photo.h) : item.w) : item.w;
                        const naturalH = isSwapped ? item.w : (photo ? Math.round(item.w * photo.h / photo.w) : item.w);
                        const displayH = isSwapped ? naturalW : naturalH;
                        const offX = Math.round((item.w - naturalW) / 2);
                        const offY = Math.round((displayH - naturalH) / 2);
                        const ar = freeRot * Math.PI / 180;
                        const cos = Math.abs(Math.cos(ar)); const sin = Math.abs(Math.sin(ar));
                        const bbW = cos * item.w + sin * displayH; const bbH = sin * item.w + cos * displayH;
                        const cx = item.x + item.w / 2; const cy = item.y + displayH / 2;
                        return { ...item, naturalW, naturalH, displayH, offX, offY, vL: cx - bbW/2, vT: cy - bbH/2, vW: bbW, vH: bbH };
                      });
                      const allBoundsM = [...photoItems, ...textItems.map(i => ({ vL: i.x, vT: i.y, vW: i.w, vH: i.h || 130 }))];
                      const minX = bPx ? 0 : (allBoundsM.length ? Math.min(...allBoundsM.map(i => i.vL)) : 0);
                      const minY = bPx ? 0 : (allBoundsM.length ? Math.min(...allBoundsM.map(i => i.vT)) : 0);
                      const bW = bPx?.w ?? (allBoundsM.length ? Math.max(...allBoundsM.map(i => i.vL + i.vW)) - minX : 0);
                      const bH = bPx?.h ?? (allBoundsM.length ? Math.max(...allBoundsM.map(i => i.vT + i.vH)) - minY : 0);
                      const sc = bW && bH ? Math.min(560 / bW, 200 / bH, 1) : 1;
                      const pW = Math.round(bW * sc);
                      const pH = Math.round(bH * sc);
                      return (
                        <React.Fragment>
                          {bW > 0 && bH > 0 && (
                            <div className="mem-preview-wrap">
                              <div className="mem-preview" style={{
                                width: pW, height: pH,
                                background: bPx ? '#f5f5f5' : 'var(--deep)',
                                border: bPx ? '1px solid var(--border2)' : '1px dashed var(--border2)',
                              }}>
                                {photoItems.map(item => {
                                  const rot = item.rot || 0; const freeRot = item.freeRot || 0;
                                  const fPx = item.frame > 0 ? Math.max(1, Math.round(physToPx(item.frame, dpi, units) * sc)) : 0;
                                  const frameStyle = fPx > 0 ? { outline: `${fPx}px solid #c8c8c8` } : {};
                                  const iL = Math.round((item.x - minX) * sc); const iT = Math.round((item.y - minY) * sc);
                                  const iW = Math.round(item.w * sc); const iH = Math.round(item.displayH * sc);
                                  return (
                                    <div key={item.id} style={{ position:'absolute', left:iL, top:iT, width:iW, height:iH, overflow:'hidden', ...(freeRot?{transform:`rotate(${freeRot}deg)`,transformOrigin:'center'}:{}), ...frameStyle }}>
                                      <img src={`/photos/${pid}/${item.photoId}/thumb`} alt="" style={{ position:'absolute', left:Math.round(item.offX*sc), top:Math.round(item.offY*sc), width:Math.round(item.naturalW*sc), height:Math.round(item.naturalH*sc), objectFit:'cover', ...((rot||item.flipH||item.flipV)?{transform:`rotate(${rot}deg) scaleX(${item.flipH?-1:1}) scaleY(${item.flipV?-1:1})`,transformOrigin:'center'}:{}) }} />
                                    </div>
                                  );
                                })}
                                {textItems.map(item => {
                                  const fontMap = { serif:'Georgia,serif', sans:'Arial,sans-serif', display:'Impact,sans-serif', mono:'Courier New,monospace' };
                                  const alignMap = { left:'flex-start', center:'center', right:'flex-end' };
                                  const rot = item.freeRot || 0;
                                  return (
                                    <div key={item.id} style={{ position:'absolute', left:Math.round((item.x-minX)*sc), top:Math.round((item.y-minY)*sc), width:Math.round(item.w*sc), height:Math.round((item.h||130)*sc), fontSize:Math.max(6,Math.round((item.fontSize||26)*sc)), fontFamily:fontMap[item.fontFamily||'serif']||'Georgia,serif', textAlign:item.textAlign||'center', color:item.textColor||'var(--text)', display:'flex', alignItems:'center', justifyContent:alignMap[item.textAlign||'center']||'center', padding:Math.round(4*sc), overflow:'hidden', boxSizing:'border-box', ...(rot?{transform:`rotate(${rot}deg)`,transformOrigin:'center'}:{}) }}>
                                      {item.text || ''}
                                    </div>
                                  );
                                })}
                              </div>
                              <div className="mem-preview-dim">{dimLabel(bW, bH, dpi, units)}</div>
                            </div>
                          )}
                          {boardIt.filter(i => i.type !== 'note' && i.type !== 'text').map((item, idx) => {
                            const photo = photos.find(p => p.id === item.photoId);
                            const h = photo
                              ? ((item.rot || 0) % 180 !== 0
                                ? Math.round(item.w * photo.w / photo.h)
                                : Math.round(item.w * photo.h / photo.w))
                              : item.w;
                            const dimStr = dimLabel(item.w, h, dpi, units, item.frame);
                            return (
                              <div key={item.id} className="mem-item">
                                <div className="mem-idx">{idx + 1}.</div>
                                <img className="mem-thumb" src={`/photos/${pid}/${item.photoId}/thumb`} alt="" />
                                <div className="mem-info">
                                  <div className="mem-iname">{photo?.name || item.photoId}</div>
                                  <div className="mem-dims">
                                    {dimStr}
                                    {(item.frame > 0) && <span style={{color:'var(--muted)',marginLeft:6,fontSize:8}}>({t('frameNote', item.frame, hasPhys ? units : 'px')})</span>}
                                  </div>
                                  {item.label && <div className="mem-lbl">"{item.label}"</div>}
                                </div>
                              </div>
                            );
                          })}
                          {boardIt.filter(i => i.type === 'note' && i.inMemory).length > 0 && (
                            <>
                              <div className="mem-notes-hd">{t('notesSectionTitle')}</div>
                              {boardIt.filter(i => i.type === 'note' && i.inMemory).map(item => (
                                <div key={item.id} className="mem-note-item">
                                  {item.title && <div className="mem-note-title">{item.title}</div>}
                                  <div className="mem-note-text">{item.text || ''}</div>
                                  {item.link && (
                                    <div style={{marginTop:5}}>
                                      <a className="mem-note-link" href={item.link.url} target="_blank" rel="noreferrer"
                                        onClick={e => e.stopPropagation()}>
                                        {item.link.title || item.link.domain}
                                      </a>
                                      {item.link.title && <span className="mem-note-link-domain">{item.link.domain}</span>}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </>
                          )}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:9,color:'var(--muted)',lineHeight:1.8}}>
              {t('reportConfigNote')}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
              <input type="checkbox" id="mem-inc-hdr" checked={memIncludeHeader}
                onChange={e => setMemIncludeHeader(e.target.checked)}
                style={{accentColor:'var(--acc)',cursor:'pointer'}}/>
              <label htmlFor="mem-inc-hdr" style={{fontSize:9,color:'var(--dim)',cursor:'pointer',letterSpacing:.3}}>{t('memIncludeInfo')}</label>
            </div>
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('close')}</button>
              <button className="btn acc" onClick={printMemoria}>{t('printPdf')}</button>
            </div>
          </div>
        </div>
      )}

      {labelEditId && (() => {
        const editItem = items.find(i => i.id === labelEditId);
        if (!editItem) return null;
        const editPhoto = photos.find(p => p.id === editItem.photoId);
        const sizeKey = `lbl-popup-size-${labelEditId}`;
        const savedSize = JSON.parse(localStorage.getItem(sizeKey) || 'null');
        let popupEl = null;
        const saveSize = () => { if (popupEl) localStorage.setItem(sizeKey, JSON.stringify({w: popupEl.offsetWidth, h: popupEl.offsetHeight})); };
        const closeLabelEdit = () => { saveSize(); saveLabel(); setLabelEditId(null); };
        const discardLabelEdit = () => {
          saveSize();
          const u = itemsRef.current.map(i => i.id === labelEditId ? {...i, label: labelEditOrigRef.current} : i);
          itemsRef.current = u; setItems(u); saveItemsNow(u);
          setLabelEditId(null);
        };
        return (
          <div className="lbl-popup-ov">
            <div className="lbl-popup" ref={el => { popupEl = el; }}
              style={savedSize ? {width: savedSize.w, height: savedSize.h} : undefined}>
              <div className="lbl-popup-hd">
                <span className="lbl-popup-name">{editPhoto?.name || t('labelPlaceholder')}</span>
                <button className="lbl-popup-close" onClick={discardLabelEdit}>×</button>
              </div>
              <textarea className="lbl-popup-ta" autoFocus
                value={editItem.label || ''}
                placeholder={t('labelPlaceholder')}
                onChange={e => updateLabel(labelEditId, e.target.value)}
              />
              <div style={{display:'flex',justifyContent:'flex-start',flexShrink:0,paddingTop:2}}>
                <button className="btn acc" onClick={closeLabelEdit}>{t('save')}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {importState && (
        <div className="overlay" onClick={() => !importState.busy && setImportState(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('importTitle')}</div>
            <div className="modal-sub" style={{maxWidth:320,lineHeight:1.5}}>
              {importState.conflict
                ? t('importConflict', importState.projectName)
                : t('importConfirmMsg', importState.projectName)}
            </div>
            <div className="modal-row" style={{marginTop:14,flexWrap:'wrap',gap:6}}>
              <button className="btn" onClick={() => setImportState(null)} disabled={importState.busy}>{t('cancel')}</button>
              <button className={`btn${importState.conflict ? '' : ' acc'}`} onClick={() => confirmImport('new')} disabled={importState.busy}>{t('importNew')}</button>
              {importState.conflict && (
                <button className="btn acc" onClick={() => confirmImport('replace')} disabled={importState.busy}>{t('importReplace')}</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
