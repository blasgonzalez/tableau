<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--surf:#161412;--panel:#1c1916;--deep:#111009;
  --border:#2a231a;--border2:#3d3020;
  --acc:#c4894a;--acc-dim:#8a5f2e;--acc-faint:rgba(196,137,74,0.1);
  --text:#e0d4c0;--sub:#b0a090;--dim:#8a7c6e;--muted:#5a4e42;--danger:#c45050;
  --sb-w:252px;
}
html,body,#root{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'IBM Plex Mono',monospace;color:var(--text)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:46px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:200}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--acc);flex-shrink:0}
.vsep{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:7px;flex:1;min-width:0;overflow:hidden}
.bc-seg{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-arrow{color:var(--muted);font-size:11px;flex-shrink:0}
.bc-none{color:var(--muted);font-size:11px;font-style:italic}
.bc-dpi{font-size:9px;color:var(--muted);letter-spacing:.5px;flex-shrink:0}
.btn{padding:5px 12px;font-size:10px;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);color:var(--sub);background:transparent;font-family:'IBM Plex Mono',monospace;transition:all .15s;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center}
.btn:hover{color:var(--text);border-color:var(--acc-dim)}
.btn.acc{border-color:var(--acc-dim);color:var(--acc)}
.btn.acc:hover{background:var(--acc-faint)}
.btn:disabled{opacity:.35;cursor:default}
.update-banner{background:#1e2e0a;border-bottom:1px solid #3a5c14;padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.4px;color:#a8cc60;flex-shrink:0;z-index:300}
.update-banner a{color:#c0e070;text-decoration:underline;cursor:pointer}
.update-banner-close{margin-left:auto;background:transparent;border:none;color:#5a8030;cursor:pointer;font-size:18px;line-height:1;padding:0 4px;font-family:inherit}

/* ── LAYOUT ── */
.main-area{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sb-w);background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:100}
.sb-toggle-strip{height:100%;width:36px;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.sb-toggle-btn{width:24px;height:24px;margin:7px auto 0;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.sb-toggle-btn:hover{color:var(--text);border-color:var(--acc-dim)}
.sb-collapsed-label{writing-mode:vertical-rl;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:12px;user-select:none}
.sb-inner{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* sidebar sections */
.sb-sec{display:flex;flex-direction:column;min-height:0}
.sb-sec.nav{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.sb-sec.info{flex-shrink:0;border-top:1px solid var(--border)}
.sb-sec-hd{height:32px;display:flex;align-items:center;gap:5px;padding:0 8px 0 10px;border-bottom:1px solid var(--border);background:var(--deep);flex-shrink:0}
.sb-sec-title{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);flex:1}
.sb-sec-btn{width:18px;height:18px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .12s;line-height:1}
.sb-sec-btn:hover{color:var(--acc);border-color:var(--acc-dim)}
.sb-scroll{overflow-y:auto;overflow-x:hidden;flex:1}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── NAV TREE ── */
.nav-empty{padding:14px 12px;font-size:9px;color:var(--muted);letter-spacing:.5px;line-height:2}
.nproj{margin-bottom:1px}
.nproj-row{display:flex;align-items:center;padding:6px 8px 6px 8px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.nproj-row:hover{background:var(--panel)}
.nproj-row.active{border-left-color:var(--acc);background:var(--acc-faint)}
.nproj-arrow{font-size:9px;color:var(--dim);margin-right:5px;flex-shrink:0;width:10px}
.nproj-row.active .nproj-arrow{color:var(--acc-dim)}
.nproj-name{font-size:11px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nproj-row.active .nproj-name{color:var(--text)}
.nrow-acts{display:flex;gap:1px;opacity:0;transition:opacity .1s;flex-shrink:0}
.nproj-row:hover .nrow-acts,.nboard-row:hover .nrow-acts{opacity:1}
.nact{width:17px;height:17px;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:color .1s;flex-shrink:0}
.nact.edit:hover{color:var(--sub)}
.nact.del:hover{color:var(--danger)}
.nboards{background:var(--deep)}
.nboard-row{display:flex;align-items:center;padding:5px 8px 5px 22px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.nboard-row:hover{background:var(--panel)}
.nboard-row.active{border-left-color:var(--acc);background:var(--acc-faint)}
.nboard-dash{color:var(--dim);font-size:9px;margin-right:6px;flex-shrink:0}
.nboard-name{font-size:10px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nboard-row.active .nboard-name{color:var(--acc)}
.nboard-add{display:flex;align-items:center;padding:5px 8px 5px 22px;cursor:pointer;color:var(--dim);font-size:9px;letter-spacing:.5px;transition:color .12s}
.nboard-add:hover{color:var(--acc)}
.nboard-drag{color:var(--muted);font-size:10px;margin-right:3px;cursor:grab;flex-shrink:0;opacity:0;line-height:1;user-select:none}
.nboard-row:hover .nboard-drag{opacity:.6}
.nboard-row.drag-over{border-top:2px solid var(--acc)}
.nboard-count{font-size:9px;color:var(--dim);margin-right:4px;flex-shrink:0}
.n-rename{flex:1;background:var(--bg);border:1px solid var(--acc-dim);color:var(--acc);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:1px 6px;outline:none;min-width:0}

/* ── ALIGN TOOLBAR ── */
.align-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border2);display:flex;align-items:center;gap:1px;padding:3px;z-index:300;box-shadow:0 3px 14px rgba(0,0,0,.5);pointer-events:all}
.align-bar-sep{width:1px;height:18px;background:var(--border2);margin:0 3px;flex-shrink:0}
.abt{width:26px;height:26px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;flex-shrink:0}
.abt:hover{color:var(--text);border-color:var(--border2);background:var(--surf)}
.abt:active{background:var(--acc-faint);color:var(--acc)}
.abt:disabled{opacity:.25;cursor:default}
.abt-label{font-size:7px;letter-spacing:1.5px;color:var(--dim);padding:0 6px;text-transform:uppercase;user-select:none;white-space:nowrap}

/* ── INFO PANEL ── */
.info-panel{padding:9px 10px;display:flex;gap:9px;align-items:flex-start}
.info-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:var(--dim);text-align:center;min-height:72px;padding:8px;line-height:1.7}
.info-thumb{width:60px;height:60px;flex-shrink:0;object-fit:cover;border:1px solid var(--border2);display:block;background:var(--deep)}
.info-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.info-name{font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.info-row{font-size:9px;color:var(--dim);letter-spacing:.2px;line-height:1.5}
.info-phys{font-size:9px;color:var(--acc-dim);letter-spacing:.2px}
.info-boards{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.ibd-tag{font-size:7px;letter-spacing:.4px;padding:1px 5px;border:1px solid var(--border2);color:var(--sub)}
.ibd-tag.cur{border-color:var(--acc-dim);color:var(--acc);background:var(--acc-faint)}
.ibd-none{font-size:8px;color:var(--muted);margin-top:2px}
.info-rating{display:flex;align-items:center;gap:1px;font-size:9px;color:var(--border2);margin-top:2px;letter-spacing:1px}
.info-rating .on{color:var(--acc)}
.info-rating .none{font-size:8px;color:var(--muted);letter-spacing:.2px}
.info-color-row{display:flex;align-items:center;gap:5px;margin-top:3px}
.info-color-swatch{width:10px;height:10px;border-radius:2px;border:1px solid rgba(255,255,255,.12);flex-shrink:0}
.info-color-label{font-size:9px;color:var(--dim);letter-spacing:.2px}
.info-bright-bar{width:36px;height:5px;border-radius:2px;background:linear-gradient(to right,#111,#fff);border:1px solid var(--border2);flex-shrink:0;position:relative;overflow:hidden}
.info-bright-bar-fill{position:absolute;top:0;left:0;height:100%;width:2px;background:var(--acc);transform:translateX(-50%)}
.info-tag-list{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.info-tag-chip{font-size:7px;padding:1px 4px;border:1px solid var(--border2);color:var(--dim);letter-spacing:.2px}
.info-exif{margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}
.info-exif-make{font-size:8px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.info-exif-model{font-size:9px;color:var(--text);font-weight:600;letter-spacing:.2px}
.info-exif-lens{font-size:8px;color:var(--dim);letter-spacing:.2px;margin-top:1px}
.info-exif-cam{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.info-exif-cam span{font-size:8px;color:var(--sub);letter-spacing:.2px}
.info-exif-date{font-size:8px;color:var(--muted);margin-top:2px}
.ph-item{width:100%;background:var(--border);border:2px dashed var(--dim);box-sizing:border-box;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;transition:background .15s}
.ph-item:hover{background:var(--border2)}
.ph-icon{color:var(--dim);pointer-events:none;user-select:none;font-size:28px;line-height:1}
.tmpl-pick{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:3px;cursor:pointer;font-size:10px;color:var(--sub);border:1px solid var(--border);transition:background .12s,border-color .12s}
.tmpl-pick:hover{background:var(--hover)}
.tmpl-pick.sel{background:var(--acc-dim);border-color:var(--acc);color:var(--text)}
.tmpl-pick-del{background:none;border:none;cursor:pointer;color:var(--dim);padding:0 2px;font-size:12px;line-height:1;margin-left:auto}
.tmpl-pick-del:hover{color:var(--danger)}

/* ── PRESENTATION MODE ── */
.app.presentation .topbar,.app.presentation .update-banner,.app.presentation .sidebar,.app.presentation .lib-splitter,.app.presentation .library,.app.presentation .zoom-ctrl,.app.presentation .align-bar{display:none !important}
.app.presentation .bitem-bar{display:none !important}
.app.presentation .canvas{background-image:none !important}
.app.presentation .nitem{display:none !important}
.app.presentation .lbl{display:none !important}
.titem{position:absolute;cursor:grab;user-select:none;display:flex;flex-direction:column;outline:1px dashed rgba(128,128,128,.4)}
.titem:active{cursor:grabbing}
.titem.locked{cursor:default}
.titem:hover .bitem-bar,.titem.sel .bitem-bar{opacity:1}
.titem.sel{outline:1px dashed rgba(128,128,128,.75)}
.app.presentation .titem{outline:none !important}
.titem-drag{height:18px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 6px;cursor:grab;flex-shrink:0;gap:6px}
.titem.locked .titem-drag{cursor:default}
.app.presentation .titem-drag{display:none}
.titem-drag-icon{color:var(--muted);font-size:9px;letter-spacing:2px;pointer-events:none}
.titem-drag-label{font-size:7px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;pointer-events:none;flex:1}
.titem-txt{flex:1;background:transparent;border:none;resize:none;outline:none;padding:8px 10px;line-height:1.35;overflow:hidden;cursor:text;color:inherit}
.titem-txt::placeholder{opacity:.25}
.tfmt-panel{position:absolute;top:calc(100% + 4px);left:0;background:var(--panel2);border:1px solid var(--border2);padding:9px 11px;z-index:300;box-shadow:0 4px 14px rgba(0,0,0,.5);display:flex;flex-direction:column;gap:7px;zoom:calc(1 / var(--canvas-zoom,1));min-width:190px}
.tfmt-row{display:flex;align-items:center;gap:4px}
.tfmt-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;width:38px;flex-shrink:0}
.tfmt-btn{font-size:9px;padding:2px 7px;background:var(--panel);border:1px solid var(--border2);color:var(--dim);cursor:pointer;letter-spacing:.2px;line-height:1.6}
.tfmt-btn:hover{color:var(--text)}
.tfmt-btn.on{background:var(--acc-dim);color:var(--acc);border-color:var(--acc-dim)}
.tfmt-swatch{width:20px;height:20px;border:1px solid var(--border2);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.tfmt-swatch input[type=color]{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:calc(100% + 8px);height:calc(100% + 8px)}
.pres-exit{position:fixed;top:14px;right:14px;z-index:2000;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.6px;padding:5px 10px;cursor:pointer;backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;pointer-events:none}
.pres-exit:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.app.presentation:hover .pres-exit{opacity:1;pointer-events:auto}
.pres-title{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-family:'Playfair Display',serif;font-size:13px;padding:5px 16px;letter-spacing:.5px;pointer-events:none;backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;display:flex;align-items:center;gap:10px}
.app.presentation:hover .pres-title{opacity:1}
.pres-dots{display:flex;gap:5px;align-items:center}
.pres-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s}
.pres-dot.active{background:rgba(255,255,255,.75)}
.pres-nav{position:fixed;top:50%;z-index:2000;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);width:32px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;pointer-events:none;transform:translateY(-50%)}
.pres-nav:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.pres-nav.prev{left:12px}
.pres-nav.next{right:12px}
.app.presentation:hover .pres-nav{opacity:1;pointer-events:auto}
.pres-nav.disabled{opacity:0 !important;pointer-events:none}

/* ── WORKSPACE ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;overflow:auto;background:var(--bg)}
.canvas-wrap.lib-expanded .bitem-bar,.canvas-wrap.lib-expanded .dim-tag{display:none !important}
.canvas{position:relative;min-width:3000px;min-height:2200px;z-index:1}
.canvas-drop-hint{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(196,137,74,.06);border:3px dashed var(--acc-dim);font-size:14px;letter-spacing:3px;color:var(--acc);pointer-events:none;z-index:500}

/* ── ROOM VIEW ── */
.room-view{display:flex;flex:1;overflow:hidden}
.room-svg-wrap{flex:1;position:relative;overflow:hidden;background:var(--deep)}
.room-svg-wrap svg{width:100%;height:100%}
.room-toolbar{position:absolute;top:10px;left:10px;display:flex;gap:6px;align-items:center;z-index:2}
.room-toolbar-3d .btn{background:rgba(0,0,0,.55);color:rgba(255,255,255,.78);border-color:rgba(255,255,255,.18);backdrop-filter:blur(4px)}
.room-toolbar-3d .btn:hover{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(0,0,0,.72)}
.room-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.5px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:4px 12px;border-radius:3px;pointer-events:none;white-space:nowrap}
.room-panel{width:260px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.room-panel-hd{padding:12px 14px 8px;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
.room-cfg{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.room-cfg label{font-size:9px;color:var(--dim);letter-spacing:.5px;flex:1}
.room-cfg input[type=number]{width:58px;background:var(--input);border:1px solid var(--border);color:var(--text);font-size:10px;padding:3px 6px;border-radius:3px;font-family:inherit}
.room-cfg span{font-size:9px;color:var(--muted)}
.room-walls{flex:1;overflow-y:auto}
.room-wall-row{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border2);transition:background .1s}
.room-wall-row.hov{background:var(--acc-faint)}
.room-wall-row.hov .room-wall-name{color:var(--acc)}
.room-wall-name{font-size:10px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;cursor:text}
.room-wall-len{font-size:9px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums}
.room-wall-warn{font-size:10px;color:#e87528;flex-shrink:0;cursor:default;line-height:1;user-select:none}
.room-wall-rename{font-size:10px;background:var(--input);border:1px solid var(--acc);color:var(--text);padding:1px 5px;border-radius:2px;font-family:inherit;width:80px}
.room-empty{padding:24px 16px;color:var(--dim);font-size:10px;line-height:1.8;text-align:center}
.room-no-sala{display:flex;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--dim);font-size:10px}
.nsala-row{display:flex;align-items:center;padding:5px 8px 5px 14px;cursor:pointer;color:var(--dim);font-size:9px;letter-spacing:.5px;transition:color .12s;border-left:2px solid transparent}
.nsala-row:hover{color:var(--acc)}.nsala-row.active{color:var(--acc);border-left-color:var(--acc);background:var(--acc-faint)}

/* ── BOARD ITEMS ── */
.bitem{position:absolute;cursor:grab;user-select:none}
.bitem:active{cursor:grabbing}
.bitem.locked{cursor:default}
.lock-badge{position:absolute;top:calc(5px / var(--canvas-zoom,1));left:calc(5px / var(--canvas-zoom,1));width:calc(18px / var(--canvas-zoom,1));height:calc(18px / var(--canvas-zoom,1));display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:15;color:#fff;background:rgba(0,0,0,0.55);border-radius:calc(3px / var(--canvas-zoom,1))}
.lock-badge svg{width:100%;height:100%}
.bitem-img{display:block;pointer-events:none}
.bitem-img-wrap{position:relative;overflow:hidden}
.bitem.sel .bitem-img-wrap{outline:2px dashed var(--acc-dim);outline-offset:2px}
.bitem.sel.anchor .bitem-img-wrap{outline:2px solid var(--acc);outline-offset:2px}
.bitem.replacing .bitem-img-wrap{outline:2px solid #e06060 !important;outline-offset:3px;animation:replacing-pulse 1s ease-in-out infinite}
.bitem-bar{position:absolute;bottom:100%;right:0;display:flex;gap:3px;opacity:0;transition:opacity .12s;zoom:calc(1 / var(--canvas-zoom,1));z-index:250}
.props-panel{position:absolute;top:0;left:0;background:var(--panel2);border:1px solid var(--border2);border-radius:3px;padding:8px 10px;z-index:200;min-width:160px;box-shadow:0 4px 14px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:6px;zoom:calc(1 / var(--canvas-zoom,1))}
.props-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.props-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.props-inp{width:64px;font-size:10px;background:var(--panel);border:1px solid var(--border2);color:var(--text);border-radius:2px;padding:3px 5px;text-align:right}
.bitem:hover .bitem-bar{opacity:1}

.ibc{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:500;background:var(--surf);color:var(--sub)}
.ibc:hover{color:var(--text)}
.ibc.del{background:var(--danger);color:#fff}
.ibc.del:hover{color:#fff}
.ibc.fwd,.ibc.rot{background:var(--border2);color:var(--sub)}
.ibc.fwd:hover,.ibc.rot:hover{color:var(--text)}
.rh{position:absolute;bottom:0;right:0;width:14px;height:14px;background:var(--acc);cursor:se-resize;opacity:0;transition:opacity .12s;zoom:calc(1 / var(--canvas-zoom,1))}
.bitem:hover .rh{opacity:1}
.lbl{position:absolute;left:0;right:0;box-sizing:border-box;font-size:calc(10px / var(--canvas-zoom,1));font-family:'IBM Plex Mono',monospace;color:var(--text);background:var(--panel2);border:none;border-top:1px solid var(--border2);padding:0 calc(6px / var(--canvas-zoom,1));letter-spacing:.3px;z-index:10;cursor:pointer;height:calc(26px / var(--canvas-zoom,1));display:flex;align-items:center;overflow:hidden;white-space:nowrap;user-select:none}
.lbl:hover{border-top-color:var(--acc-dim)}
.lbl-ph{color:var(--muted);font-style:italic}
.lbl-more{color:var(--muted);margin-left:4px;font-style:italic}
/* ── LABEL POPUP ── */
.lbl-popup-ov{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55)}
.lbl-popup{background:var(--panel);border:1px solid var(--border2);padding:16px;display:flex;flex-direction:column;gap:10px;width:300px;min-width:220px;min-height:180px;box-shadow:0 4px 24px rgba(0,0,0,.5);resize:both;overflow:hidden}
.lbl-popup-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.lbl-popup-name{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.lbl-popup-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0}
.lbl-popup-close:hover{color:var(--text)}
.lbl-popup-ta{background:var(--surf);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 10px;outline:none;resize:none;flex:1;min-height:0;overflow-y:auto;line-height:1.6;letter-spacing:.3px;width:100%;box-sizing:border-box}
.lbl-popup-ta:focus{border-color:var(--acc-dim)}
/* dimension tag visible on hover/select */
.dim-tag{position:absolute;bottom:calc(22px / var(--canvas-zoom,1));left:0;background:rgba(13,12,11,.88);color:rgba(255,255,255,.9);font-size:8px;padding:2px 7px;letter-spacing:.4px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;zoom:calc(1 / var(--canvas-zoom,1))}
.bitem:hover .dim-tag{opacity:1}
/* ── NOTE ITEMS ── */
.nitem{position:absolute;cursor:grab;user-select:none}
.nitem-body{width:100%;height:100%;background:var(--panel);border:1px solid var(--border2);border-left:3px solid var(--acc-dim);display:flex;flex-direction:column;box-sizing:border-box}
.nitem.sel .nitem-body{outline:2px dashed var(--acc-dim);outline-offset:2px}
.nitem.anchor .nitem-body{outline:2px solid var(--acc);outline-offset:2px}
.nitem:hover .bitem-bar{opacity:1}
.nitem-txt{flex:1;background:transparent;border:none;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6;padding:8px 10px;resize:none;outline:none;width:100%;box-sizing:border-box}
.nitem-txt::placeholder{color:var(--muted);font-style:italic}
.nitem-rc{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;opacity:0;transition:opacity .12s;background:linear-gradient(135deg,transparent 50%,var(--border2) 50%)}
.nitem:hover .nitem-rc{opacity:1;background:linear-gradient(135deg,transparent 50%,var(--acc-dim) 50%)}
.nitem-link{display:flex;align-items:center;gap:7px;padding:5px 8px;border-top:1px solid var(--border);background:var(--deep);text-decoration:none;cursor:pointer;transition:background .12s;flex-shrink:0}
.nitem-link:hover{background:var(--panel)}
.nitem-link-info{flex:1;min-width:0}
.nitem-link-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nitem-link-domain{font-size:9px;color:var(--muted);margin-top:1px}
.nitem-link-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0}
.nitem-link-rm:hover{color:var(--danger)}
.nitem-link-row{border-top:1px solid var(--border);padding:4px 8px;display:flex;align-items:center;gap:5px;flex-shrink:0;opacity:0;transition:opacity .12s}
.nitem:hover .nitem-link-row{opacity:1}
.nitem-link-inp{flex:1;background:transparent;border:none;color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:10px;outline:none;min-width:0}
.nitem-link-inp::placeholder{color:var(--muted)}
.nitem-link-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:0;font-family:'IBM Plex Mono',monospace}
.nitem-link-btn:hover{color:var(--acc)}
.nitem-link-loading{font-size:9px;color:var(--muted);padding:5px 8px;border-top:1px solid var(--border);letter-spacing:.5px;flex-shrink:0}
.nitem-title{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px 4px;outline:none;flex-shrink:0;letter-spacing:.3px;box-sizing:border-box}
.nitem-title:focus{color:var(--text);border-bottom-color:var(--acc-dim)}
.nitem-title::placeholder{color:var(--muted);font-style:italic}
.nitem.inmem .nitem-body{border-left-color:var(--acc)}
/* ── ZONE ITEMS ── */
.zitem{position:absolute;cursor:grab;user-select:none}
.zitem:hover .bitem-bar{opacity:1}
.zitem.sel .zitem-body{outline:2px dashed var(--acc-dim);outline-offset:3px}
.zitem.anchor .zitem-body{outline:2px solid var(--acc);outline-offset:3px}
.zitem-body{width:100%;height:100%;box-sizing:border-box;border-radius:3px;position:relative}
.zitem-label{position:absolute;top:8px;left:10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;background:transparent;border:none;outline:none;cursor:text;font-family:'IBM Plex Mono',monospace;font-weight:600;max-width:calc(100% - 20px)}
.zitem-label::placeholder{opacity:.35;font-weight:400;text-transform:none;letter-spacing:.3px}
.zrh{position:absolute;opacity:0;transition:opacity .12s;z-index:20}
.zitem:hover .zrh,.zitem.sel .zrh{opacity:1}
.zrh.nw,.zrh.ne,.zrh.sw,.zrh.se{width:10px;height:10px;background:rgba(255,255,255,.75);zoom:calc(1/var(--canvas-zoom,1))}
.zrh.nw{top:calc(-4px / var(--canvas-zoom,1));left:calc(-4px / var(--canvas-zoom,1));cursor:nw-resize}
.zrh.ne{top:calc(-4px / var(--canvas-zoom,1));right:calc(-4px / var(--canvas-zoom,1));cursor:ne-resize}
.zrh.sw{bottom:calc(-4px / var(--canvas-zoom,1));left:calc(-4px / var(--canvas-zoom,1));cursor:sw-resize}
.zrh.se{bottom:calc(-4px / var(--canvas-zoom,1));right:calc(-4px / var(--canvas-zoom,1));cursor:se-resize}
.zrh.n{top:0;left:20%;right:20%;height:8px;cursor:n-resize}
.zrh.s{bottom:0;left:20%;right:20%;height:8px;cursor:s-resize}
.zrh.e{right:0;top:20%;bottom:20%;width:8px;cursor:e-resize}
.zrh.w{left:0;top:20%;bottom:20%;width:8px;cursor:w-resize}
/* ── MEM INFO BLOCK ── */
.mem-info-block{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border2)}
.mem-info-hd{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:1px}
.mem-info-row{display:flex;gap:7px}
.mem-info-input{background:var(--surf);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 8px;outline:none;width:100%;letter-spacing:.3px;box-sizing:border-box;transition:border-color .12s}
.mem-info-input:focus{border-color:var(--acc-dim)}
.mem-info-input::placeholder,.mem-info-ta::placeholder{color:var(--muted)}
.mem-info-ta{background:var(--surf);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 8px;outline:none;width:100%;letter-spacing:.2px;box-sizing:border-box;resize:vertical;min-height:58px;line-height:1.65;transition:border-color .12s}
.mem-info-ta:focus{border-color:var(--acc-dim)}
/* ── MEM FREE SECTIONS ── */
.mem-free-section{margin-bottom:10px;padding-left:9px;border-left:2px solid var(--border2)}
.mem-free-hd{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.mem-free-title{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.8px;text-transform:uppercase;padding:2px 3px;outline:none;flex:1;transition:border-color .12s}
.mem-free-title:focus{border-bottom-color:var(--acc-dim)}
.mem-free-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;font-family:inherit;transition:color .1s}
.mem-free-del:hover{color:var(--danger)}
.mem-free-body{background:var(--surf);border:1px solid var(--border);color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 8px;outline:none;width:100%;letter-spacing:.2px;box-sizing:border-box;resize:vertical;min-height:48px;line-height:1.65;transition:border-color .12s}
.mem-free-body:focus{border-color:var(--acc-dim)}
.mem-add-section-btn{background:none;border:1px dashed var(--border2);color:var(--dim);cursor:pointer;font-size:9px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;transition:all .12s;display:block}
.mem-add-section-btn:hover{border-color:var(--acc-dim);color:var(--acc)}
.mem-boards-sep{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:10px 0 8px;border-top:1px solid var(--border2);margin-top:4px}

/* ── MEM NOTES SECTION ── */
.mem-notes-hd{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:6px 0 4px;border-top:1px solid var(--border2);margin-top:6px}
.mem-note-item{padding:5px 0 5px 8px;border-bottom:1px solid var(--border);border-left:2px solid var(--acc-dim)}
.mem-note-title{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px}
.mem-note-text{font-size:9px;color:var(--dim);white-space:pre-wrap;line-height:1.6}
.mem-note-link{display:inline-block;margin-top:5px;font-size:9px;color:var(--acc);text-decoration:underline;word-break:break-all}
.mem-note-link-domain{color:var(--muted);font-size:8px;margin-left:4px}
.mem-lbl{font-size:8px;color:var(--muted);font-style:italic;margin-top:2px;letter-spacing:.2px;white-space:pre-wrap}

/* ── LIBRARY ── */
.lib-splitter{height:5px;flex-shrink:0;cursor:ns-resize;z-index:101;display:flex;align-items:center;justify-content:center;background:transparent;user-select:none}
.lib-splitter::after{content:'';width:32px;height:2px;background:var(--border2);border-radius:1px;transition:background .15s;pointer-events:none}
.lib-splitter:hover::after,.lib-splitter.active::after{background:var(--acc-dim)}
.library{background:var(--surf);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;overflow:hidden;transition:height .18s ease}
.library.resizing{transition:none !important}
.library.lib-drop-active .lib-body{outline:2px dashed var(--acc-dim);outline-offset:-3px;background:color-mix(in srgb,var(--acc) 6%,transparent)}
.sect-drop-active{background:color-mix(in srgb,var(--acc) 8%,transparent);border-radius:3px}
.sect-drop-active .sect-header{border-bottom-color:var(--acc)}
.lib-snap-btn{width:22px;height:22px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.lib-snap-btn:hover{color:var(--text);border-color:var(--acc-dim)}
.lib-header{height:30px;display:flex;align-items:center;gap:7px;padding:0 10px 0 8px;flex-shrink:0;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
.lib-header:hover{background:var(--panel)}
.lib-toggle-btn{width:22px;height:22px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .15s;font-family:'IBM Plex Mono',monospace}
.lib-toggle-btn:hover{color:var(--text);border-color:var(--acc-dim)}
.lib-sort-icon{font-size:11px;color:var(--muted);flex-shrink:0}
.lib-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--sub);white-space:nowrap}
.lib-count{font-size:11px;color:var(--dim);font-family:'Playfair Display',serif}
.lib-spacer{flex:1}
.lib-sort{font-size:9px;background:var(--surf);border:1px solid var(--border2);color:var(--dim);padding:2px 5px;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;outline:none}
.lib-sort:focus{border-color:var(--acc-dim)}
.lib-sort option{background:var(--panel)}
.lib-search{width:100px;flex-shrink:0;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 4px;outline:none;letter-spacing:.3px}
.lib-search:focus{border-bottom-color:var(--acc-dim)}
.lib-search::placeholder{color:var(--muted)}
.lib-thumb-slider{width:48px;accent-color:var(--acc-dim);cursor:pointer;flex-shrink:0}
.lib-filter{font-size:9px;background:var(--surf);border:1px solid var(--border2);color:var(--dim);padding:2px 6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;outline:none;transition:all .15s}
.lib-filter:hover{border-color:var(--acc-dim);color:var(--text)}
.lib-filter.active{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.lib-filter.active.danger{background:var(--danger);border-color:var(--danger)}
.thumb-rejected{position:absolute;inset:0;background:rgba(196,80,80,.35);display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none}
.thumb-rejected-label{background:rgba(196,80,80,.85);color:#fff;font-size:6px;letter-spacing:1.5px;padding:2px 5px;font-family:'IBM Plex Mono',monospace}
.thumb.rejected-thumb{opacity:.55}
.thumb-reject-btn{position:absolute;bottom:20px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.65);border:1px solid rgba(196,80,80,.5);color:rgba(196,80,80,.8);cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;z-index:6;line-height:1;padding:0}
.thumb:hover .thumb-reject-btn{display:flex}
.thumb-reject-btn:hover{color:#ff7070;border-color:#ff7070}
.lib-star-filter{display:flex;align-items:center;gap:1px;padding:0 2px}
.lib-star-filter button{background:none;border:none;padding:0 1px;font-size:11px;cursor:pointer;line-height:1;color:var(--dim);outline:none;transition:color .1s}
.lib-star-filter button:hover{color:var(--acc)}
.lib-star-filter button.lit{color:var(--acc)}
.lib-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.lib-scroll{flex:1;overflow-x:hidden;overflow-y:auto;display:flex;flex-direction:column;gap:0;padding:7px 12px;min-height:0}
.lib-scroll:has(.lib-empty){align-items:center;justify-content:center}
.lib-scroll > *{flex-shrink:0}
.lib-photo-row{display:flex;flex-wrap:wrap;align-items:flex-start;align-content:flex-start;gap:8px;padding:5px 0 8px 0}
.lib-muted .thumb-stars,.lib-muted .thumb-tag-badge,.lib-muted .thumb-color,.lib-muted .thumb-reject-btn,.lib-muted .thumb-tag,.lib-muted .thumb-x,.lib-muted .thumb-cp,.lib-muted .thumb-rejected{display:none !important}
.lib-muted .thumb.in-board{border-color:var(--border2)}
.lib-muted .thumb.in-board::before{display:none}
.lib-mute-btn{background:none;border:1px solid var(--border2);color:var(--dim);cursor:pointer;font-size:9px;padding:1px 5px;font-family:'IBM Plex Mono',monospace;transition:all .12s;flex-shrink:0;letter-spacing:.3px}
.lib-mute-btn:hover{border-color:var(--acc-dim);color:var(--text)}
.lib-mute-btn.active{background:var(--acc-faint);border-color:var(--acc-dim);color:var(--acc)}
.lib-scroll::-webkit-scrollbar{width:3px}
.lib-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.thumb{flex-shrink:0;width:84px;height:84px;cursor:grab;position:relative;overflow:hidden;border:2px solid var(--border2);transition:border-color .15s}
.thumb:hover{border-color:var(--acc-dim)}
.thumb:active{cursor:grabbing}
.thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
.thumb.in-board{border-color:var(--acc)}
.thumb.lib-sel{outline:3px solid var(--text);outline-offset:-2px}
.thumb.lib-sel::after{content:'✓';position:absolute;top:3px;right:3px;width:15px;height:15px;background:var(--acc);color:var(--bg);border-radius:50%;font-size:9px;font-weight:700;line-height:15px;text-align:center;z-index:10;pointer-events:none}
.lib-sel-bar{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--acc-faint);border-top:1px solid var(--acc-dim);font-size:9px;color:var(--acc);flex-shrink:0;letter-spacing:.3px}
.lib-sel-count{flex:1}
.lib-sel-btn{background:none;border:1px solid var(--acc-dim);color:var(--acc);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;letter-spacing:.3px;transition:background .12s}
.lib-sel-btn:hover{background:var(--acc-faint)}
.lib-sel-btn.danger{border-color:var(--danger);color:var(--danger)}
.lib-sel-btn.danger:hover{background:rgba(196,80,80,.1)}
.sect-header{width:100%;display:flex;align-items:center;gap:5px;padding:3px 4px 3px 2px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;min-height:24px;flex-shrink:0}
.sect-header:hover .sect-actions{opacity:1}
.sect-toggle{font-size:9px;color:var(--dim);width:14px;flex-shrink:0}
.sect-name{font-size:10px;font-weight:700;color:var(--dim);flex:1;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sect-name-input{flex:1;background:var(--surf);border:1px solid var(--acc-dim);color:var(--text);font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;padding:1px 4px;outline:none;letter-spacing:.3px}
.sect-count{font-size:8px;color:var(--muted);flex-shrink:0}
.sect-actions{opacity:0;display:flex;gap:2px;flex-shrink:0;transition:opacity .15s}
.sect-btn{background:none;border:1px solid var(--border2);color:var(--dim);cursor:pointer;font-size:9px;padding:1px 4px;line-height:1;transition:all .12s;font-family:'IBM Plex Mono',monospace}
.sect-btn:hover{border-color:var(--acc-dim);color:var(--text)}
.sect-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.sect-add-btn{background:none;border:1px solid var(--border2);color:var(--dim);cursor:pointer;font-size:9px;padding:1px 5px;font-family:'IBM Plex Mono',monospace;transition:all .12s;flex-shrink:0}
.sect-add-btn:hover{border-color:var(--acc-dim);color:var(--text)}
.sect-ctx{position:fixed;background:var(--panel);border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.4);padding:4px 0;z-index:9999;min-width:140px}
.sect-ctx-item{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-size:11px;padding:5px 14px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.sect-ctx-item:hover{background:var(--acc-faint)}
.sect-ctx-item.active{color:var(--acc)}
.sect-ctx-sep{height:1px;background:var(--border);margin:3px 0}

const getBoardPx = board => {
  if (!board?.fixed || !board.fixedW || !board.fixedH) return null;
  const dpi = board.dpi || 300;
  const u   = board.units || 'cm';
  const toPx = v => u === 'px' ? v : u === 'cm' ? Math.round(v / 2.54 * dpi) : u === 'mm' ? Math.round(v / 25.4 * dpi) : Math.round(v * dpi);
  return { w: Math.max(1, toPx(board.fixedW)), h: Math.max(1, toPx(board.fixedH)) };
};

const fmtExifDate = s => { if (!s) return s; const m = s.match(/^(\d{4}):(\d{2}):(\d{2})\s(\d{2}):(\d{2})/); return m ? `${m[3]}/${m[2]}/${m[1]}  ${m[4]}:${m[5]}` : s; };
const fmtTs = ts => { const d = new Date(ts); return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`; };

const rgbToHsl = (r, g, b) => {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return { h: 0, s: 0, l };
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
  else if (max === g) h = ((b - r) / d + 2) / 6;
  else h = ((r - g) / d + 4) / 6;
  return { h: h * 360, s, l };
};

// Convert canvas px → physical units given DPI
const pxToPhys = (px, dpi, units) => {
  if (!dpi || !units || units === 'px') return null;
  const inches = px / dpi;
  if (units === 'cm') return (inches * 2.54).toFixed(1) + ' cm';
  if (units === 'mm') return (inches * 25.4).toFixed(0) + ' mm';
  if (units === 'in') return inches.toFixed(2) + '"';
  return null;
};

const physToPx = (phys, dpi, units) => {
  if (!phys || !dpi || !units || units === 'px') return Math.round(phys || 0);
  const factor = units === 'cm' ? 2.54 : units === 'mm' ? 25.4 : 1;
  return Math.round((phys / factor) * dpi);
};

const dimLabel = (w, h, dpi, units, frame = 0) => {
  const f = parseFloat(frame) || 0;
  if (dpi && units && units !== 'px') {
    const factor = units === 'cm' ? 2.54 : units === 'mm' ? 25.4 : 1;
    const dec    = units === 'mm' ? 0 : units === 'in' ? 2 : 1;
    const suf    = units === 'in' ? '"' : ` ${units}`;
    const tw = (w / dpi * factor + 2 * f).toFixed(dec);
    const th = (h / dpi * factor + 2 * f).toFixed(dec);
    return `${tw}${suf} × ${th}${suf}`;
  }
  return `${w + 2 * Math.round(f)} × ${h + 2 * Math.round(f)} px`;
};

  // ── place photo ───────────────────────────────────────────────────────────
  const placePhoto = (photo, cx, cy) => {
    pushUndo();
    const board = boardsRef.current.find(b => b.id === bidRef.current);
    let w = board?.defaultW || 320;
    // Inherit width from last placed photo if same aspect ratio (within 3%)
    const photoItems = itemsRef.current.filter(i => i.photoId);
    if (photoItems.length > 0) {
      const lastItem = photoItems.reduce((a, b) => ((a.z||0) > (b.z||0) ? a : b));
      const lastPhoto = photosRef.current.find(p => p.id === lastItem.photoId);
      if (lastPhoto) {
        const norm = (pw, ph) => pw > ph ? pw / ph : ph / pw;
        if (Math.abs(norm(lastPhoto.w, lastPhoto.h) - norm(photo.w, photo.h)) / norm(lastPhoto.w, lastPhoto.h) < 0.03) {
          w = lastItem.w;
        }
      }
    }
    const bp = boardPxRef.current;
    if (bp) w = Math.min(w, bp.w);
    const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
    const h = Math.round(w * photo.h / photo.w);
    let x = Math.round(cx - w / 2);
    let y = Math.round(cy - h / 2);
    if (bp) {
      x = Math.max(0, Math.min(x, bp.w - w));
      y = Math.max(0, Math.min(y, bp.h - h));
    }
    const placedZone = findZoneAt(x, y, w, h);
    const item = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      photoId: photo.id, x, y, w, z: maxZ + 1, label: '', rot: 0,
      frame: boardsRef.current.find(b => b.id === bidRef.current)?.defaultFrame || 0,
      ...(placedZone ? { zoneId: placedZone.id } : {}),
    };
    const nit = [...itemsRef.current, item];
    const norm = applyNormalized(nit);
    selRef.current = [item.id]; setSel([item.id]);
    saveItemsNow(norm);
  };

  const fitBoard = useCallback(() => {
    const bp = boardPxRef.current;
    const wrap = wrapRef.current;
    if (!bp || !wrap) return;
    const avW = wrap.clientWidth  - BOARD_PAD * 2 - 8;
    const avH = wrap.clientHeight - BOARD_PAD * 2 - 8;
    const z = Math.max(0.05, Math.min(4, Math.min(avW / bp.w, avH / bp.h)));
    setZoom(z);
    requestAnimationFrame(() => {
      const bpNow = boardPxRef.current;
      if (!wrap || !bpNow) return;
      const totalW = bpNow.w * z + BOARD_PAD * 2;
      const totalH = bpNow.h * z + BOARD_PAD * 2;
      wrap.scrollLeft = Math.max(0, (totalW - wrap.clientWidth)  / 2);
      wrap.scrollTop  = Math.max(0, (totalH - wrap.clientHeight) / 2);
    });
  }, []);

  const fitWidth = useCallback(() => {
    const wrap = wrapRef.current;
    if (!wrap) return;
    const its = itemsRef.current;
    if (!its.length) { setZoom(1); return; }
    const maxX = Math.max(...its.map(i => i.x + (i.w || 0)));
    const z = Math.max(0.05, Math.min(4, (wrap.clientWidth - 80) / maxX));
    setZoom(z);
  }, []);

    for (let i = 0; i < imageFiles.length; i++) {
      const file = imageFiles[i];
      const existing = photosRef.current.find(ph => ph.name === file.name);
      setUploadProgress({ done: i, total, name: file.name });
      try {
        if (existing && dupAction === 'skip') continue;
        if (existing && dupAction === 'replace') {
          const photo = await api.uploadReplace(`/api/projects/${p}/photos/${existing.id}/file`, file);
          if (photo.error) { showToast(photo.error, true); continue; }
          setPhotos(ps => ps.map(ph => ph.id === existing.id ? photo : ph));
          ok++;
          continue;
        }
        const photo = await api.upload(`/api/projects/${p}/photos`, file);
        if (photo.error) { showToast(photo.error, true); continue; }
        if (sectionId) {
          await api.patch(`/api/projects/${p}/photos/${photo.id}/section`, { sectionId });
          photo.sectionId = sectionId;
        }
        setPhotos(ps => [...ps, photo]);
        if (dropPos && bidRef.current) placePhoto(photo, dropPos.x, dropPos.y);
        ok++;
      } catch { showToast(t('uploadError', file.name), true); }

      ? t('confirmDeletePhotoPlaced', placedBoards.map(b => b.name).join(', '))
      : t('confirmDeletePhoto');
    showConfirm(msg, async () => {
      await api.del(`/api/projects/${pidRef.current}/photos/${id}`);
      setPhotos(ps => ps.filter(p => p.id !== id));
      const nit = itemsRef.current.filter(i => i.photoId !== id);
      setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
      setAllBoardItems(prev => Object.fromEntries(
        Object.entries(prev).map(([bid, its]) => [bid, its.filter(i => i.photoId !== id)])
      ));
    });
  };

  const deleteSelectedPhotos = () => {
    const ids = libSelRef.current;
    if (!ids.length) return;
    const placedCount = ids.filter(id =>
      Object.values(allBoardItemsRef.current).some(its => its.some(i => i.photoId === id))
    ).length;
    const msg = t('confirmDeletePhotos', ids.length) +
      (placedCount > 0 ? t('confirmDeletePhotosPlaced', placedCount) : '');
    showConfirm(msg, async () => {
      for (const id of ids) await api.del(`/api/projects/${pidRef.current}/photos/${id}`);
      setPhotos(ps => ps.filter(p => !ids.includes(p.id)));
      const nit = itemsRef.current.filter(i => !ids.includes(i.photoId));
      setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
      setAllBoardItems(prev => Object.fromEntries(
        Object.entries(prev).map(([bid, its]) => [bid, its.filter(i => !ids.includes(i.photoId))])
      ));
      setLibSelection([]);
      setBatchTagPop(null);
    });
  };

  const addSelectedToCanvas = () => {
    const ids = libSelRef.current;
    if (!ids.length || !bidRef.current) return;
    pushUndo();
    const wrap = wrapRef.current;
    const z = zoomRef.current;
    const pad = boardPxRef.current ? BOARD_PAD : 0;
    const cx = (wrap.scrollLeft + wrap.clientWidth  / 2 - pad) / z;
    const cy = (wrap.scrollTop  + wrap.clientHeight / 2 - pad) / z;
    const board = boardsRef.current.find(b => b.id === bidRef.current);
    const W = board?.defaultW || 320, GAP = 20;
    const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
    const defFrame = board?.defaultFrame || 0;
    const newItems = ids.map((photoId, idx) => {
      const photo = photosRef.current.find(p => p.id === photoId);
      if (!photo) return null;
      const h = Math.round(W * photo.h / photo.w);
      return { id: Date.now().toString(36) + Math.random().toString(36).slice(2,5) + idx,
               photoId, w: W, h, z: maxZ + idx + 1, label: '', rot: 0, frame: defFrame };
    }).filter(Boolean);
    const totalW = newItems.length * W + (newItems.length - 1) * GAP;
    const bp = boardPxRef.current;
    newItems.forEach((item, idx) => {
      item.x = Math.round(cx - totalW / 2 + idx * (W + GAP));
      item.y = Math.round(cy - item.h / 2);
      if (bp) { item.x = Math.max(0, Math.min(item.x, bp.w - W)); item.y = Math.max(0, Math.min(item.y, bp.h - item.h)); }
    });
    const nit = [...itemsRef.current, ...newItems];
    const norm = applyNormalized(nit);
    selRef.current = newItems.map(i => i.id); setSel(selRef.current);
    saveItemsNow(norm);
    setLibSelection([]);
    setBatchTagPop(null);
  };

  // ── grid layout ──────────────────────────────────────────────────────────
  const openGridModal = () => {
    const board = boardsRef.current.find(b => b.id === bidRef.current);
    const units = board?.units || 'px';
    const defaultGap = units === 'mm' ? 5 : units === 'cm' ? 0.5 : units === 'in' ? 0.2 : 20;
    setGridGap(defaultGap);
    setGridModal(true);
  };

  const placeAsGrid = (cols, gapUnits) => {
    const ids = libSelRef.current;
    if (!ids.length || !bidRef.current) return;
    const board = boardsRef.current.find(b => b.id === bidRef.current);
    if (!board) return;
    const dpi = board.dpi || 300;
    const units = board.units || 'px';
    const gapPx = Math.round(physToPx(gapUnits, dpi, units));
    const bPx = boardPxRef.current;
    const selPhotos = ids.map(id => photosRef.current.find(p => p.id === id)).filter(Boolean);
    if (!selPhotos.length) return;

    const cellW = bPx
      ? Math.max(1, Math.round((bPx.w - gapPx * (cols + 1)) / cols))
      : (board.defaultW || 300);
    const rows = Math.ceil(selPhotos.length / cols);
    const rowHeights = [];
    for (let r = 0; r < rows; r++) {
      let maxH = 0;
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        if (idx >= selPhotos.length) break;
        const h = Math.round(cellW * selPhotos[idx].h / selPhotos[idx].w);
        if (h > maxH) maxH = h;
      }
      rowHeights.push(maxH);
    }
    const totalW = cols * cellW + gapPx * (cols - 1);
    const totalH = rowHeights.reduce((s, h) => s + h, 0) + gapPx * (rows - 1);

    let startX, startY;
    if (bPx) {
      startX = gapPx; startY = gapPx;
    } else {
      const wrap = wrapRef.current; const z = zoomRef.current;
      const cx = (wrap.scrollLeft + wrap.clientWidth / 2) / z;
      const cy = (wrap.scrollTop  + wrap.clientHeight / 2) / z;
      startX = Math.round(cx - totalW / 2);
      startY = Math.round(cy - totalH / 2);
    }

    pushUndo();
    const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
    const defFrame = board.defaultFrame || 0;
    const newItems = []; let y = startY;
    for (let r = 0; r < rows; r++) {
      let x = startX;
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        if (idx >= selPhotos.length) break;
        const photo = selPhotos[idx];
        const cellH = Math.round(cellW * photo.h / photo.w);
        const offsetY = Math.round((rowHeights[r] - cellH) / 2);
        newItems.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,5) + idx,
          photoId: photo.id, x: Math.round(x), y: Math.round(y + offsetY),
          w: cellW, z: maxZ + newItems.length + 1, label: '', rot: 0, frame: defFrame });
        x += cellW + gapPx;
      }
      y += rowHeights[r] + gapPx;
    }
    const nit = [...itemsRef.current, ...newItems];
    const norm = applyNormalized(nit);
    selRef.current = newItems.map(i => i.id); setSel(selRef.current);
    saveItemsNow(norm);
    setLibSelection([]);
    setGridModal(false);
  };

  // ── import from repo ──────────────────────────────────────────────────────
  // ── hover info ────────────────────────────────────────────────────────────
  const showPhotoInfo = (photo, status, thumbSrc, itemW = null, itemH = null) =>
    setHoverInfo({ photo, status, thumbSrc, itemW, itemH });
  const clearHoverInfo = () => setHoverInfo(null);

  // ── drag ──────────────────────────────────────────────────────────────────
  const onLibDS = (e, id) => {
    const ids = libSelRef.current.includes(id) && libSelRef.current.length > 1
      ? libSelRef.current : [id];
    e.dataTransfer.setData('tb-photos', JSON.stringify(ids));
    e.dataTransfer.effectAllowed = 'copy';
    if (ids.length > 1) {
      const SZ = 60;
      const wrap = document.createElement('div');
      wrap.style.cssText = `position:fixed;left:-9999px;top:0;width:${SZ+20}px;height:${SZ+20}px;pointer-events:none`;
      const preview = ids.slice(0, 3).reverse();
      const rots = [-7, 0, 7];
      preview.forEach((pid2, i) => {
        const img = document.createElement('img');
        img.src = `/photos/${pidRef.current}/${pid2}/thumb`;
        img.style.cssText = `position:absolute;width:${SZ}px;height:${SZ}px;object-fit:cover;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 10px rgba(0,0,0,.6);transform:rotate(${rots[i]||0}deg);left:${i*5}px;top:${i*3}px`;
        wrap.appendChild(img);
      });
      const badge = document.createElement('div');
      const acc = getComputedStyle(document.documentElement).getPropertyValue('--acc').trim() || '#c4894a';
      badge.textContent = ids.length;
      badge.style.cssText = `position:absolute;bottom:0;right:0;background:${acc};color:#000;border-radius:10px;min-width:18px;height:18px;padding:0 4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:monospace`;
      wrap.appendChild(badge);
      document.body.appendChild(wrap);
      e.dataTransfer.setDragImage(wrap, SZ / 2, SZ / 2);
      setTimeout(() => document.body.removeChild(wrap), 100);
    }
  };

  const onCanvasDrop = async e => {
    e.preventDefault(); setDragOver(false);
    const wrap = wrapRef.current;
    const r = wrap.getBoundingClientRect();
    const z = zoomRef.current;
    const pad = boardPxRef.current ? BOARD_PAD : 0;
    const pos = { x: (e.clientX - r.left + wrap.scrollLeft - pad) / z, y: (e.clientY - r.top + wrap.scrollTop - pad) / z };
    if (e.dataTransfer.files?.length) {
      if (!bidRef.current) return showToast(t('createBoardFirst'), true);
      await uploadFiles(e.dataTransfer.files, pos);
      return;
    }
    const rawPhotos = e.dataTransfer.getData('tb-photos');
    const singleId  = e.dataTransfer.getData('tb-photo');
    const photoIds  = rawPhotos ? JSON.parse(rawPhotos) : singleId ? [singleId] : [];
    if (photoIds.length === 1) {
      const photo = photosRef.current.find(p => p.id === photoIds[0]);
      if (photo) placePhoto(photo, pos.x, pos.y);
    } else if (photoIds.length > 1) {
      pushUndo();
      const board2 = boardsRef.current.find(b => b.id === bidRef.current);
      const W = board2?.defaultW || 320, GAP = 20;
      const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z||0)) : 0;
      const defFrame = board2?.defaultFrame || 0;
      const newItems = photoIds.map((photoId, idx) => {
        const photo = photosRef.current.find(p => p.id === photoId);
        if (!photo) return null;
        const h = Math.round(W * photo.h / photo.w);
        return { id: Date.now().toString(36) + Math.random().toString(36).slice(2,5) + idx,
                 photoId, w: W, h, z: maxZ + idx + 1, label: '', rot: 0, frame: defFrame,
                 x: Math.round(pos.x + idx * (W + GAP)), y: Math.round(pos.y) };
      }).filter(Boolean);
      const nit = [...itemsRef.current, ...newItems];
      const norm = applyNormalized(nit);
      selRef.current = newItems.map(i => i.id); setSel(selRef.current);
      saveItemsNow(norm);
      setLibSelection([]);
    }
  };

  // ── item interactions ─────────────────────────────────────────────────────
  const onItemPD = (e, itemId) => {
    if (e.button !== 0) return;
    if (e.target.closest('.lbl,.ibc,.rh')) return;
    e.stopPropagation(); e.preventDefault();

    const beforeDrag = itemsRef.current.map(i => ({ ...i }));
    // Update selection — preClickSel saves the state before this change
    // so handleItemClick can toggle correctly using the pre-click baseline
    preClickSel.current = [...selRef.current];
    if (e.shiftKey || e.ctrlKey || e.metaKey) {
      // Only add here (never remove) so drag always includes the clicked item.
      // handleItemClick does the proper toggle using preClickSel.
      if (!selRef.current.includes(itemId)) {
        const ns = [...selRef.current, itemId];
        selRef.current = ns; setSel(ns);
      }
    } else {
      if (!selRef.current.includes(itemId)) {
        selRef.current = [itemId]; setSel([itemId]);
      }
    }

    const baseIds = [...selRef.current];
    const expandedIds = (() => {
      const result = new Set(baseIds);
      // group expansion
      baseIds.forEach(id => {
        const it = itemsRef.current.find(i => i.id === id);
        if (it?.groupId) itemsRef.current.filter(i => i.groupId === it.groupId).forEach(i => result.add(i.id));
      });
      // zone expansion — recursive so nested zones bring their members too
      const queue = [...baseIds];
      while (queue.length) {
        const id = queue.shift();
        const it = itemsRef.current.find(i => i.id === id);
        if (it?.type === 'zone') {
          itemsRef.current.filter(i => i.zoneId === id).forEach(i => {
            if (!result.has(i.id)) { result.add(i.id); queue.push(i.id); }
          });
        }
      }
      return [...result];
    })();
    // If any member of a group is locked, the whole group is immovable
    const lockedGroups = new Set(
      expandedIds
        .filter(id => itemsRef.current.find(i => i.id === id)?.locked)
        .flatMap(id => { const it = itemsRef.current.find(i => i.id === id); return it?.groupId ? [it.groupId] : []; })
    );
    const dragIds = expandedIds.filter(id => {
      const it = itemsRef.current.find(i => i.id === id);
      if (!it || it.locked) return false;
      if (it.groupId && lockedGroups.has(it.groupId)) return false;
      return true;
    });
    // Record start positions
    const starts = {};
    dragIds.forEach(id => { const it = itemsRef.current.find(i => i.id === id); if (it) starts[id] = { x: it.x, y: it.y }; });
    const sx = e.clientX, sy = e.clientY;
    let ldx = 0, ldy = 0;

    const clampItem = (i, x, y) => {
      const bp = boardPxRef.current;
      if (!bp) return { x, y };
      const h = getItemH(i);
      return { x: Math.max(0, Math.min(x, bp.w - i.w)), y: Math.max(0, Math.min(y, bp.h - h)) };
    };
    const ELEM_SNAP_THRESH = 8;
    const applySnap = (rawDx, rawDy) => {
      if (!snapGrid) {
        setSnapGuides({ h: [], v: [] });
        return { sdx: rawDx, sdy: rawDy };
      }
      const allItems = itemsRef.current;
      const others = allItems.filter(i => !dragIds.includes(i.id) && !i.locked);
      const thresh = ELEM_SNAP_THRESH / zoomRef.current;
      const gapThresh = thresh * 1.5;
      // Bounding box of dragged group after raw delta
      let bx = Infinity, by = Infinity, bx2 = -Infinity, by2 = -Infinity;
      for (const id of dragIds) {
        const it = allItems.find(i => i.id === id);
        if (!it) continue;
        const nx = starts[id].x + rawDx, ny = starts[id].y + rawDy;
        const ih = getItemH(it);
        bx  = Math.min(bx,  nx);         by  = Math.min(by,  ny);
        bx2 = Math.max(bx2, nx + it.w);  by2 = Math.max(by2, ny + ih);
      }
      const bw = bx2 - bx, bh = by2 - by;
      // ── Edge / center snap ────────────────────────────────────────────────
      let bestDx = null, bestDy = null;
      const newGuides = { h: [], v: [] };
      for (const oi of others) {
        const oh = getItemH(oi);
        const ox2 = oi.x + oi.w, oy2 = oi.y + oh;
        for (const [de, ie] of [
          [bx, oi.x], [bx, ox2], [bx2, oi.x], [bx2, ox2],
          [bx + bw / 2, oi.x + oi.w / 2],
        ]) {
          const diff = de - ie;
          if (Math.abs(diff) < thresh && (bestDx === null || Math.abs(diff) < Math.abs(bestDx))) bestDx = diff;
          if (Math.abs(diff) < thresh)
            newGuides.v.push({ pos: ie, from: Math.min(by, oi.y) - 12, to: Math.max(by2, oy2) + 12 });
        }
        for (const [de, ie] of [
          [by, oi.y], [by, oy2], [by2, oi.y], [by2, oy2],
          [by + bh / 2, oi.y + oh / 2],
        ]) {
          const diff = de - ie;
          if (Math.abs(diff) < thresh && (bestDy === null || Math.abs(diff) < Math.abs(bestDy))) bestDy = diff;
          if (Math.abs(diff) < thresh)
            newGuides.h.push({ pos: ie, from: Math.min(bx, oi.x) - 12, to: Math.max(bx2, ox2) + 12 });
        }
      }
      // ── Gap equality snap ─────────────────────────────────────────────────
      const GAP_COLOR = '#26c9d9';
      let bestGapDx = null, bestGapDy = null;
      const gapGuidesH = [], gapGuidesV = [];
      for (const B of others) {
        const Bh = getItemH(B); const Bx2 = B.x + B.w; const By2 = B.y + Bh;
        const gR = bx  - Bx2; // positive → drag is to the right of B
        const gL = B.x - bx2; // positive → drag is to the left of B
        const gBel = by  - By2; // positive → drag is below B
        const gAbo = B.y - by2; // positive → drag is above B
        for (const C of others) {
          if (C === B) continue;
          const Ch = getItemH(C); const Cx2 = C.x + C.w; const Cy2 = C.y + Ch;
          // H: drag right of B, C left of B — want gR == gap(C→B)
          if (gR > 0) {
            const gCB = B.x - Cx2;
            if (gCB > 0 && Math.abs(gR - gCB) < gapThresh) {
              const corr = gR - gCB;
              if (bestGapDx === null || Math.abs(corr) < Math.abs(bestGapDx)) {
                bestGapDx = corr;
                const midY = (Math.min(B.y, C.y, by) + Math.max(By2, Cy2, by2)) / 2;
                gapGuidesH.length = 0;
                gapGuidesH.push(
                  { pos: midY, from: Cx2,      to: B.x,      color: GAP_COLOR },
                  { pos: midY, from: Bx2,       to: bx - corr, color: GAP_COLOR },
                );
              }
            }
          }
          // H: drag left of B, C right of B — want gL == gap(B→C)
          if (gL > 0) {
            const gBC = C.x - Bx2;
            if (gBC > 0 && Math.abs(gL - gBC) < gapThresh) {
              const corr = gBC - gL;
              if (bestGapDx === null || Math.abs(corr) < Math.abs(bestGapDx)) {
                bestGapDx = corr;
                const midY = (Math.min(B.y, C.y, by) + Math.max(By2, Cy2, by2)) / 2;
                gapGuidesH.length = 0;
                gapGuidesH.push(
                  { pos: midY, from: Bx2,        to: C.x,       color: GAP_COLOR },
                  { pos: midY, from: bx2 - corr,  to: B.x,       color: GAP_COLOR },
                );
              }
            }
          }
          // V: drag below B, C above B — want gBel == gap(C→B)
          if (gBel > 0) {
            const gCB_v = B.y - Cy2;
            if (gCB_v > 0 && Math.abs(gBel - gCB_v) < gapThresh) {
              const corr = gBel - gCB_v;
              if (bestGapDy === null || Math.abs(corr) < Math.abs(bestGapDy)) {
                bestGapDy = corr;
                const midX = (Math.min(B.x, C.x, bx) + Math.max(Bx2, C.x + C.w, bx2)) / 2;
                gapGuidesV.length = 0;
                gapGuidesV.push(
                  { pos: midX, from: Cy2,       to: B.y,        color: GAP_COLOR },
                  { pos: midX, from: By2,        to: by - corr,  color: GAP_COLOR },
                );
              }
            }
          }
          // V: drag above B, C below B — want gAbo == gap(B→C)
          if (gAbo > 0) {
            const gBC_v = C.y - By2;
            if (gBC_v > 0 && Math.abs(gAbo - gBC_v) < gapThresh) {
              const corr = gBC_v - gAbo;
              if (bestGapDy === null || Math.abs(corr) < Math.abs(bestGapDy)) {
                bestGapDy = corr;
                const midX = (Math.min(B.x, C.x, bx) + Math.max(Bx2, C.x + C.w, bx2)) / 2;
                gapGuidesV.length = 0;
                gapGuidesV.push(
                  { pos: midX, from: By2,         to: C.y,        color: GAP_COLOR },
                  { pos: midX, from: by2 - corr,   to: B.y,        color: GAP_COLOR },
                );
              }
            }
          }
        }
      }
      // Combine: edge snap takes priority per axis; gap guides only on unsnapped axes
      const finalDx = bestDx ?? bestGapDx ?? null;
      const finalDy = bestDy ?? bestGapDy ?? null;
      const allH = [...newGuides.h, ...(bestDx === null && bestGapDx !== null ? gapGuidesH : [])];
      const allV = [...newGuides.v, ...(bestDy === null && bestGapDy !== null ? gapGuidesV : [])];
      if (allH.length > 0 || allV.length > 0) {
        setSnapGuides({ h: allH, v: allV });
        return { sdx: rawDx - (finalDx ?? 0), sdy: rawDy - (finalDy ?? 0) };
      }
      setSnapGuides({ h: [], v: [] });
      // ── Fall back to grid snap ─────────────────────────────────────────────
      if (!showGrid || dragIds.length === 0) return { sdx: rawDx, sdy: rawDy };
      const anchor = starts[dragIds[0]];
      const snappedX = snapVal(anchor.x + rawDx, gridCellPx);
      const snappedY = snapVal(anchor.y + rawDy, gridCellPx);
      return { sdx: snappedX - anchor.x, sdy: snappedY - anchor.y };
    };
    const onMM = e => {
      ldx = e.clientX - sx; ldy = e.clientY - sy;
      const z = zoomRef.current;
      const { sdx, sdy } = applySnap(ldx/z, ldy/z);
      setItems(its => its.map(i => {
        if (!dragIds.includes(i.id)) return i;
        const { x, y } = clampItem(i, starts[i.id].x + sdx, starts[i.id].y + sdy);
        return { ...i, x, y };
      }));
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup',   onMU);
      setSnapGuides({ h: [], v: [] });
      const z = zoomRef.current;
      const { sdx, sdy } = applySnap(ldx/z, ldy/z);
      setSnapGuides({ h: [], v: [] }); // clear any guides set by applySnap above
      let nit = itemsRef.current.map(i => {
        if (!dragIds.includes(i.id)) return i;
        let rx = starts[i.id].x + (snapGrid ? sdx : Math.round(ldx/z));
        let ry = starts[i.id].y + (snapGrid ? sdy : Math.round(ldy/z));
        const { x, y } = clampItem(i, rx, ry);
        return { ...i, x, y };
      });
      // Prevent zones from being dropped inside other zones — snap all back
      const movedZones = dragIds.filter(id => nit.find(i => i.id === id)?.type === 'zone');
      if (movedZones.length > 0) {
        const otherZones = nit.filter(i => i.type === 'zone' && !movedZones.includes(i.id));
        const hasConflict = movedZones.some(zid => {
          const z = nit.find(i => i.id === zid);
          const zcx = z.x + z.w / 2, zcy = z.y + (z.h || 320) / 2;
          return otherZones.some(oz => zcx >= oz.x && zcx <= oz.x + oz.w && zcy >= oz.y && zcy <= oz.y + (oz.h || 320));
        });
        if (hasConflict) {
          nit = nit.map(i => dragIds.includes(i.id) ? { ...i, x: starts[i.id].x, y: starts[i.id].y } : i);
          setItems(nit); itemsRef.current = nit;
          return;
        }
      }
      // Update zone membership for moved non-zone items
      const movedNonZone = dragIds.filter(id => nit.find(i => i.id === id)?.type !== 'zone');
      if (movedNonZone.length > 0) {
        const zones = nit.filter(i => i.type === 'zone');
        nit = nit.map(i => {
          if (!movedNonZone.includes(i.id)) return i;

          const stillInCurrent = currentZone && cx >= currentZone.x && cx <= currentZone.x + currentZone.w && cy >= currentZone.y && cy <= currentZone.y + (currentZone.h || 320);
          const match = stillInCurrent ? currentZone : zones.find(zz => cx >= zz.x && cx <= zz.x + zz.w && cy >= zz.y && cy <= zz.y + (zz.h || 320));
          const newZid = match?.id ?? null;
          if (newZid === oldZid) return i;
          if (newZid) return { ...i, zoneId: newZid };
          const { zoneId: _zid, ...rest } = i; return rest;
        });
      }

        wasDragged.current = true;
        undoStack.current = [...undoStack.current.slice(-49), beforeDrag];

  const onResizePD = (e, itemId) => {

    const ow = it.w;
    let rawCw = ow; // accumulates movementX — immune to canvas scroll drift
    let cw = ow;
    const photo = photosRef.current.find(p => p.id === it.photoId);
    const isSwapped = (it.rot || 0) % 180 !== 0;
    const activeMeta = boardsRef.current.find(b => b.id === bidRef.current);
    const rdpi = activeMeta?.dpi || null;
    const runits = activeMeta?.units || 'px';
    const rframe = it.frame || 0;
    const onMM = e => {
      const bp = boardPxRef.current;
      const maxW = bp ? bp.w - it.x : Infinity;
      rawCw = Math.max(80, Math.min(rawCw + e.movementX / zoomRef.current, maxW));
      cw = rawCw;

      // Snap guides during resize (only when snap is on)
      if (snapGrid) {
        const THRESH = 8 / zoomRef.current;
        const others = itemsRef.current.filter(i => i.id !== itemId && i.w);
        const guides = { h: [], v: [] };
        const displayH = photo ? (isSwapped ? Math.round(cw * photo.w / photo.h) : Math.round(cw * photo.h / photo.w)) : cw;
        let snapped = false;
        for (const o of others) {
          const op = photosRef.current.find(p => p.id === o.photoId);
          const oh = op ? (((o.rot||0) % 180 !== 0) ? Math.round(o.w * op.w / op.h) : Math.round(o.w * op.h / op.w)) : o.w;
          // Right-edge alignment: it.x + cw vs o.x or o.x + o.w
          for (const edge of [o.x, o.x + o.w]) {
            if (!snapped && Math.abs(it.x + cw - edge) < THRESH) {
              cw = edge - it.x;
              guides.v.push({ pos: edge, from: Math.min(it.y, o.y), to: Math.max(it.y + displayH, o.y + oh) });
              snapped = true;
            }
          }
          // Width match: cw vs o.w
          if (!snapped && Math.abs(cw - o.w) < THRESH) {
            cw = o.w;
            const bottom = Math.max(it.y + displayH, o.y + oh);
            guides.h.push({ pos: bottom, from: Math.min(it.x, o.x), to: Math.max(it.x + cw, o.x + o.w) });
            snapped = true;
          }
        }
        setSnapGuides(guides);
      }

      setItems(its => its.map(i => i.id === itemId ? { ...i, w: cw } : i));
      const rw = Math.round(cw);
      const rh = photo ? (isSwapped ? Math.round(cw * photo.w / photo.h) : Math.round(cw * photo.h / photo.w)) : rw;
      setResizeDim({ x: e.clientX + 16, y: e.clientY - 44, label: dimLabel(rw, rh, rdpi, runits, rframe) });
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup',   onMU);
      setSnapGuides({ h: [], v: [] });
      setResizeDim(null);
      const nit = itemsRef.current.map(i => i.id === itemId ? { ...i, w: Math.round(cw) } : i);
      if (Math.round(cw) !== ow) {
        undoStack.current = [...undoStack.current.slice(-49), beforeResize];

    window.addEventListener('pointerup',   onMU);

  const onFreeRotatePD = (e, itemId) => {

    const snapDist = roomVboxRef.current.w * 0.018;

    const savedRoom = roomRef.current;
    if (savedRoom) {
      const lastId = verts.length ? verts[verts.length-1].id : null;
      for (const v of savedRoom.vertices) {
        if (v.id === lastId) continue; // don't snap back to where we just came from

        if (d < snapDist) return {x:v.x, y:v.y, nearExisting:true, existingId:v.id, snapped:true, nearClose:false};
      }
    }
    // Snap to first temp vertex to close the polygon
    if (verts.length >= 3) {
      const first = verts[0];
      const d = Math.sqrt((raw.x-first.x)**2 + (raw.y-first.y)**2);
      if (d < snapDist) return {x:first.x, y:first.y, nearClose:true, snapped:false};

        if (diff < 12) {

          return {x:prev.x+len*Math.cos(r), y:prev.y+len*Math.sin(r), nearClose:false, snapped:true};

    const existingIds = new Set(baseVerts.map(v => v.id));
    // Don't re-add vertices that were snapped to existing ones
    const newVerts = verts.filter(v => !existingIds.has(v.id));
    // Find the highest wall number already in use to avoid collisions
    const maxN = baseWalls.reduce((m, w) => {

  const onResizeZonePD = (e, itemId, mode) => {
    e.stopPropagation(); e.preventDefault();
    const before = itemsRef.current.map(i => ({ ...i }));
    const it = itemsRef.current.find(i => i.id === itemId);
    const ox = it.x, oy = it.y, ow = it.w, oh = it.h || 320;
    const sx = e.clientX, sy = e.clientY;
    let cx = ox, cy = oy, cw = ow, ch = oh;
    const onMM = e => {
      const z = zoomRef.current;
      const dx = (e.clientX - sx) / z, dy = (e.clientY - sy) / z;
      const bp = boardPxRef.current;
      let nx = ox, ny = oy, nw = ow, nh = oh;
      if (mode.includes('e')) nw = Math.max(80, ow + dx);
      if (mode.includes('w')) { nw = Math.max(80, ow - dx); nx = ox + ow - nw; }
      if (mode.includes('s')) nh = Math.max(60, oh + dy);
      if (mode.includes('n')) { nh = Math.max(60, oh - dy); ny = oy + oh - nh; }
      if (bp) { nw = Math.min(nw, bp.w - nx); nh = Math.min(nh, bp.h - ny); nx = Math.max(0, nx); ny = Math.max(0, ny); }
      cx = nx; cy = ny; cw = nw; ch = nh;
      setItems(its => its.map(i => i.id === itemId ? { ...i, x: nx, y: ny, w: nw, h: nh } : i));
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup', onMU);
      const rx = Math.round(cx), ry = Math.round(cy), rw = Math.round(cw), rh = Math.round(ch);
      if (rx !== ox || ry !== oy || rw !== ow || rh !== oh) {
        undoStack.current = [...undoStack.current.slice(-49), before];
        redoStack.current = [];
      }
      let nit = itemsRef.current.map(i => i.id === itemId ? { ...i, x: rx, y: ry, w: rw, h: rh } : i);
      // recompute membership, never steal from other zones
      nit = nit.map(i => {
        if (i.type === 'zone') return i;
        const icx = i.x + i.w / 2, icy = i.y + getItemH(i) / 2;
        const inside = icx >= rx && icx <= rx + rw && icy >= ry && icy <= ry + rh;
        const oldZid = i.zoneId ?? null;
        let newZid;
        if (inside && (oldZid === null || oldZid === itemId)) newZid = itemId;
        else if (!inside && oldZid === itemId) newZid = null;
        else newZid = oldZid;
        if (newZid === oldZid) return i;
        if (newZid) return { ...i, zoneId: newZid };

      });

    };

    window.addEventListener('pointerup', onMU);

  const onResizeNotePD = (e, itemId) => {

    const it = itemsRef.current.find(i => i.id === itemId);
    const sx = e.clientX, sy = e.clientY, ow = it.w, oh = it.h || 150;
    let cw = ow, ch = oh;
    const activeMeta = boardsRef.current.find(b => b.id === bidRef.current);
    const rdpi = activeMeta?.dpi || null;
    const runits = activeMeta?.units || 'px';
    const onMM = e => {

          if (i.type === 'zone') return i;
          const cx = i.x + i.w / 2, cy = i.y + getItemH(i) / 2;

  // ── alignment ────────────────────────────────────────────────���────────────
  const findZoneAt = (x, y, w, h) => {

    return zones.find(z => cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + (z.h || 320)) || null;

  const captureZoneContent = (zoneId) => {
    const zone = itemsRef.current.find(i => i.id === zoneId);
    if (!zone) return;
    pushUndo();
    const nit = itemsRef.current.map(i => {
      if (i.type === 'zone') return i;
      const cx = i.x + i.w / 2, cy = i.y + getItemH(i) / 2;
      const inside = cx >= zone.x && cx <= zone.x + zone.w && cy >= zone.y && cy <= zone.y + (zone.h || 320);
      const oldZid = i.zoneId ?? null;
      const newZid = inside ? zoneId : (oldZid === zoneId ? null : oldZid);
      if (newZid === oldZid) return i;
      if (newZid) return { ...i, zoneId: newZid };
      const { zoneId: _z, ...rest } = i; return rest;
    });
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);

  const getItemH = item => {
    if (item.type === 'note' || item.type === 'zone') return item.h || item.w;
    const p = photosRef.current.find(ph => ph.id === item.photoId);
    if (!p) return item.w;
    return (item.rot || 0) % 180 !== 0
      ? Math.round(item.w * p.w / p.h)
      : Math.round(item.w * p.h / p.w);
  };
  const alignItems = type => {
    pushUndo();
    const ids = selRef.current;  // ordered array — ids[0] is the anchor
    const selIt = itemsRef.current.filter(i => ids.includes(i.id));
    if (selIt.length < 2) return;
    const anchor = itemsRef.current.find(i => i.id === ids[0]);
    if (!anchor) return;
    const anchorH = getItemH(anchor);
    const others  = selIt.filter(i => i.id !== ids[0] && !i.locked);
    let nit = [...itemsRef.current];
    const upd = (id, patch) => { nit = nit.map(i => i.id === id ? { ...i, ...patch } : i); };
    switch (type) {
      case 'left':   others.forEach(i => upd(i.id, {x: anchor.x})); break;
      case 'right':  others.forEach(i => upd(i.id, {x: anchor.x + anchor.w - i.w})); break;
      case 'ch':     others.forEach(i => upd(i.id, {x: Math.round(anchor.x + anchor.w/2 - i.w/2)})); break;
      case 'top':    others.forEach(i => upd(i.id, {y: anchor.y})); break;
      case 'bottom': others.forEach(i => upd(i.id, {y: anchor.y + anchorH - getItemH(i)})); break;
      case 'cv':     others.forEach(i => upd(i.id, {y: Math.round(anchor.y + anchorH/2 - getItemH(i)/2)})); break;
      case 'eqw':    others.forEach(i => upd(i.id, {w: anchor.w})); break;
      case 'dh': {
        const sorted = [...selIt].filter(i => !i.locked).sort((a,b)=>a.x-b.x);
        if (sorted.length < 3) return;
        const span = sorted[sorted.length-1].x + sorted[sorted.length-1].w - sorted[0].x;
        const gap  = (span - sorted.reduce((s,i)=>s+i.w,0)) / (sorted.length-1);
        let cx = sorted[0].x + sorted[0].w + gap;
        sorted.slice(1,-1).forEach(i => { upd(i.id,{x:Math.round(cx)}); cx += i.w + gap; });
        break;
      }
      case 'dv': {
        const sorted = [...selIt].filter(i => !i.locked).sort((a,b)=>a.y-b.y);
        if (sorted.length < 3) return;
        const span = sorted[sorted.length-1].y + getItemH(sorted[sorted.length-1]) - sorted[0].y;
        const gap  = (span - sorted.reduce((s,i)=>s+getItemH(i),0)) / (sorted.length-1);
        let cy = sorted[0].y + getItemH(sorted[0]) + gap;
        sorted.slice(1,-1).forEach(i => { upd(i.id,{y:Math.round(cy)}); cy += getItemH(i) + gap; });
        break;
      }
    }
    const norm = applyNormalized(nit);
    saveItemsNow(norm);

  const handleItemClick = (e, item) => {
