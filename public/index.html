<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--surf:#161412;--panel:#1c1916;--deep:#111009;
  --border:#2a231a;--border2:#3d3020;
  --acc:#c4894a;--acc-dim:#8a5f2e;--acc-faint:rgba(196,137,74,0.1);
  --text:#e0d4c0;--sub:#b0a090;--dim:#8a7c6e;--muted:#5a4e42;--danger:#c45050;
  --sb-w:252px;
}
html,body,#root{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'IBM Plex Mono',monospace;color:var(--text)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:46px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:200}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--acc);flex-shrink:0}
.vsep{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:7px;flex:1;min-width:0;overflow:hidden}
.bc-seg{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-arrow{color:var(--muted);font-size:11px;flex-shrink:0}
.bc-none{color:var(--muted);font-size:11px;font-style:italic}
.bc-dpi{font-size:9px;color:var(--muted);letter-spacing:.5px;flex-shrink:0}
.btn{padding:5px 12px;font-size:10px;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);color:var(--sub);background:transparent;font-family:'IBM Plex Mono',monospace;transition:all .15s;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center}
.btn:hover{color:var(--text);border-color:var(--acc-dim)}
.btn.acc{border-color:var(--acc-dim);color:var(--acc)}
.btn.acc:hover{background:var(--acc-faint)}
.btn:disabled{opacity:.35;cursor:default}
.update-banner{background:#1e2e0a;border-bottom:1px solid #3a5c14;padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.4px;color:#a8cc60;flex-shrink:0;z-index:300}
.update-banner a{color:#c0e070;text-decoration:underline;cursor:pointer}
.update-banner-close{margin-left:auto;background:transparent;border:none;color:#5a8030;cursor:pointer;font-size:18px;line-height:1;padding:0 4px;font-family:inherit}

/* ── LAYOUT ── */
.main-area{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sb-w);background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:100}
.sb-toggle-strip{height:100%;width:36px;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.sb-toggle-btn{width:24px;height:24px;margin:7px auto 0;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.sb-toggle-btn:hover{color:var(--text);border-color:var(--acc-dim)}
.sb-collapsed-label{writing-mode:vertical-rl;font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:12px;user-select:none}
.sb-inner{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* sidebar sections */
.sb-sec{display:flex;flex-direction:column;min-height:0}
.sb-sec.nav{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
.sb-sec.info{flex-shrink:0;border-top:1px solid var(--border)}
.sb-sec-hd{height:32px;display:flex;align-items:center;gap:5px;padding:0 8px 0 10px;border-bottom:1px solid var(--border);background:var(--deep);flex-shrink:0}
.sb-sec-title{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);flex:1}
.sb-sec-btn{width:18px;height:18px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .12s;line-height:1}
.sb-sec-btn:hover{color:var(--acc);border-color:var(--acc-dim)}
.sb-scroll{overflow-y:auto;overflow-x:hidden;flex:1}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── NAV TREE ── */
.nav-empty{padding:14px 12px;font-size:9px;color:var(--muted);letter-spacing:.5px;line-height:2}
.nproj{margin-bottom:1px}
.nproj-row{display:flex;align-items:center;padding:6px 8px 6px 8px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.nproj-row:hover{background:var(--panel)}
.nproj-row.active{border-left-color:var(--acc);background:var(--acc-faint)}
.nproj-arrow{font-size:9px;color:var(--muted);margin-right:5px;flex-shrink:0;width:10px}
.nproj-row.active .nproj-arrow{color:var(--acc-dim)}
.nproj-name{font-size:11px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nproj-row.active .nproj-name{color:var(--text)}
.nrow-acts{display:flex;gap:1px;opacity:0;transition:opacity .1s;flex-shrink:0}
.nproj-row:hover .nrow-acts,.nboard-row:hover .nrow-acts{opacity:1}
.nact{width:17px;height:17px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:color .1s;flex-shrink:0}
.nact.edit:hover{color:var(--sub)}
.nact.del:hover{color:var(--danger)}
.nboards{background:var(--deep)}
.nboard-row{display:flex;align-items:center;padding:5px 8px 5px 22px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.nboard-row:hover{background:var(--panel)}
.nboard-row.active{border-left-color:var(--acc);background:var(--acc-faint)}
.nboard-dash{color:var(--muted);font-size:9px;margin-right:6px;flex-shrink:0}
.nboard-name{font-size:10px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nboard-row.active .nboard-name{color:var(--acc)}
.nboard-add{display:flex;align-items:center;padding:5px 8px 5px 22px;cursor:pointer;color:var(--muted);font-size:9px;letter-spacing:.5px;transition:color .12s}
.nboard-add:hover{color:var(--acc-dim)}
.n-rename{flex:1;background:var(--bg);border:1px solid var(--acc-dim);color:var(--acc);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:1px 6px;outline:none;min-width:0}

/* ── ALIGN TOOLBAR ── */
.align-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border2);display:flex;align-items:center;gap:1px;padding:3px;z-index:300;box-shadow:0 3px 14px rgba(0,0,0,.5);pointer-events:all}
.align-bar-sep{width:1px;height:18px;background:var(--border2);margin:0 3px;flex-shrink:0}
.abt{width:26px;height:26px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;flex-shrink:0}
.abt:hover{color:var(--text);border-color:var(--border2);background:var(--surf)}
.abt:active{background:var(--acc-faint);color:var(--acc)}
.abt:disabled{opacity:.25;cursor:default}
.abt-label{font-size:7px;letter-spacing:1.5px;color:var(--muted);padding:0 6px;text-transform:uppercase;user-select:none;white-space:nowrap}

/* ── INFO PANEL ── */
.info-panel{padding:9px 10px;display:flex;gap:9px;align-items:flex-start}
.info-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1px;color:var(--muted);text-align:center;min-height:72px;padding:8px;line-height:1.7}
.info-thumb{width:60px;height:60px;flex-shrink:0;object-fit:cover;border:1px solid var(--border2);display:block;background:var(--deep)}
.info-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.info-name{font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.info-row{font-size:9px;color:var(--dim);letter-spacing:.2px;line-height:1.5}
.info-phys{font-size:9px;color:var(--acc-dim);letter-spacing:.2px}
.info-boards{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.ibd-tag{font-size:7px;letter-spacing:.4px;padding:1px 5px;border:1px solid var(--border2);color:var(--sub)}
.ibd-tag.cur{border-color:var(--acc-dim);color:var(--acc);background:var(--acc-faint)}
.ibd-none{font-size:8px;color:var(--muted);margin-top:2px}

/* ── WORKSPACE ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;overflow:auto;background:var(--bg)}
.canvas{position:relative;min-width:3000px;min-height:2200px;z-index:1}
.canvas-drop-hint{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(196,137,74,.06);border:3px dashed var(--acc-dim);font-size:14px;letter-spacing:3px;color:var(--acc);pointer-events:none;z-index:500}

/* ── BOARD ITEMS ── */
.bitem{position:absolute;cursor:grab;user-select:none}
.bitem:active{cursor:grabbing}
.bitem.locked{cursor:default}
.lock-badge{position:absolute;top:calc(5px / var(--canvas-zoom,1));left:calc(5px / var(--canvas-zoom,1));width:calc(18px / var(--canvas-zoom,1));height:calc(18px / var(--canvas-zoom,1));display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:15;color:#fff;background:rgba(0,0,0,0.55);border-radius:calc(3px / var(--canvas-zoom,1))}
.lock-badge svg{width:100%;height:100%}
.bitem-img{display:block;pointer-events:none}
.bitem-img-wrap{position:relative;overflow:hidden}
.bitem.sel .bitem-img-wrap{outline:2px dashed var(--acc-dim);outline-offset:2px}
.bitem.sel.anchor .bitem-img-wrap{outline:2px solid var(--acc);outline-offset:2px}
.bitem-bar{position:absolute;top:calc(-26px / var(--canvas-zoom,1));right:0;display:flex;gap:3px;opacity:0;transition:opacity .12s;zoom:calc(1 / var(--canvas-zoom,1));z-index:250}
.props-panel{position:absolute;top:0;left:0;background:var(--panel2);border:1px solid var(--border2);border-radius:3px;padding:8px 10px;z-index:200;min-width:160px;box-shadow:0 4px 14px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:6px;zoom:calc(1 / var(--canvas-zoom,1))}
.props-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.props-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.props-inp{width:64px;font-size:10px;background:var(--panel);border:1px solid var(--border2);color:var(--text);border-radius:2px;padding:3px 5px;text-align:right}
.bitem:hover .bitem-bar,.bitem.sel .bitem-bar{opacity:1}
.ibc{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:500}
.ibc.del{background:var(--danger);color:#fff}
.ibc.fwd,.ibc.rot{background:var(--border2);color:var(--sub)}
.ibc.fwd:hover,.ibc.rot:hover{color:var(--text)}
.rh{position:absolute;bottom:calc(-6px / var(--canvas-zoom,1));right:calc(-6px / var(--canvas-zoom,1));width:14px;height:14px;background:var(--acc);cursor:se-resize;opacity:0;transition:opacity .12s;zoom:calc(1 / var(--canvas-zoom,1))}
.bitem:hover .rh,.bitem.sel .rh{opacity:1}
.lbl{position:absolute;left:0;right:0;box-sizing:border-box;font-size:calc(10px / var(--canvas-zoom,1));font-family:'IBM Plex Mono',monospace;color:var(--text);background:var(--panel2);border:none;border-top:1px solid var(--border2);padding:0 calc(6px / var(--canvas-zoom,1));letter-spacing:.3px;z-index:10;cursor:pointer;height:calc(26px / var(--canvas-zoom,1));display:flex;align-items:center;overflow:hidden;white-space:nowrap;user-select:none}
.lbl:hover{border-top-color:var(--acc-dim)}
.lbl-ph{color:var(--muted);font-style:italic}
.lbl-more{color:var(--muted);margin-left:4px;font-style:italic}
/* ── LABEL POPUP ── */
.lbl-popup-ov{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55)}
.lbl-popup{background:var(--panel);border:1px solid var(--border2);padding:16px;display:flex;flex-direction:column;gap:10px;width:300px;min-width:220px;min-height:180px;box-shadow:0 4px 24px rgba(0,0,0,.5);resize:both;overflow:hidden}
.lbl-popup-hd{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.lbl-popup-name{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.lbl-popup-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;flex-shrink:0}
.lbl-popup-close:hover{color:var(--text)}
.lbl-popup-ta{background:var(--surf);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 10px;outline:none;resize:none;flex:1;min-height:0;overflow-y:auto;line-height:1.6;letter-spacing:.3px;width:100%;box-sizing:border-box}
.lbl-popup-ta:focus{border-color:var(--acc-dim)}
/* dimension tag visible on hover/select */
.dim-tag{position:absolute;bottom:calc(22px / var(--canvas-zoom,1));left:0;background:rgba(13,12,11,.88);color:var(--acc);font-size:8px;padding:2px 7px;letter-spacing:.4px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;zoom:calc(1 / var(--canvas-zoom,1))}
.bitem:hover .dim-tag,.bitem.sel .dim-tag{opacity:1}
/* ── NOTE ITEMS ── */
.nitem{position:absolute;cursor:grab;user-select:none}
.nitem-body{width:100%;height:100%;background:var(--panel);border:1px solid var(--border2);border-left:3px solid var(--acc-dim);display:flex;flex-direction:column;box-sizing:border-box}
.nitem.sel .nitem-body{outline:2px dashed var(--acc-dim);outline-offset:2px}
.nitem.anchor .nitem-body{outline:2px solid var(--acc);outline-offset:2px}
.nitem:hover .bitem-bar,.nitem.sel .bitem-bar{opacity:1}
.nitem-txt{flex:1;background:transparent;border:none;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6;padding:8px 10px;resize:none;outline:none;width:100%;box-sizing:border-box}
.nitem-txt::placeholder{color:var(--muted);font-style:italic}
.nitem-rc{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;opacity:0;transition:opacity .12s;background:linear-gradient(135deg,transparent 50%,var(--border2) 50%)}
.nitem:hover .nitem-rc,.nitem.sel .nitem-rc{opacity:1;background:linear-gradient(135deg,transparent 50%,var(--acc-dim) 50%)}
.nitem-link{display:flex;align-items:center;gap:7px;padding:5px 8px;border-top:1px solid var(--border);background:var(--deep);text-decoration:none;cursor:pointer;transition:background .12s;flex-shrink:0}
.nitem-link:hover{background:var(--panel)}
.nitem-link-info{flex:1;min-width:0}
.nitem-link-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nitem-link-domain{font-size:9px;color:var(--muted);margin-top:1px}
.nitem-link-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0}
.nitem-link-rm:hover{color:var(--danger)}
.nitem-link-row{border-top:1px solid var(--border);padding:4px 8px;display:flex;align-items:center;gap:5px;flex-shrink:0;opacity:0;transition:opacity .12s}
.nitem:hover .nitem-link-row,.nitem.sel .nitem-link-row{opacity:1}
.nitem-link-inp{flex:1;background:transparent;border:none;color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:10px;outline:none;min-width:0}
.nitem-link-inp::placeholder{color:var(--muted)}
.nitem-link-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:0;font-family:'IBM Plex Mono',monospace}
.nitem-link-btn:hover{color:var(--acc)}
.nitem-link-loading{font-size:9px;color:var(--muted);padding:5px 8px;border-top:1px solid var(--border);letter-spacing:.5px;flex-shrink:0}
.nitem-title{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px 4px;outline:none;flex-shrink:0;letter-spacing:.3px;box-sizing:border-box}
.nitem-title:focus{color:var(--text);border-bottom-color:var(--acc-dim)}
.nitem-title::placeholder{color:var(--muted);font-style:italic}
.nitem.inmem .nitem-body{border-left-color:var(--acc)}
/* ── MEM NOTES SECTION ── */
.mem-notes-hd{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:6px 0 4px;border-top:1px solid var(--border2);margin-top:6px}
.mem-note-item{padding:5px 0 5px 8px;border-bottom:1px solid var(--border);border-left:2px solid var(--acc-dim)}
.mem-note-title{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:2px}
.mem-note-text{font-size:9px;color:var(--dim);white-space:pre-wrap;line-height:1.6}
.mem-note-link{display:inline-block;margin-top:5px;font-size:9px;color:var(--acc);text-decoration:underline;word-break:break-all}
.mem-note-link-domain{color:var(--muted);font-size:8px;margin-left:4px}
.mem-lbl{font-size:8px;color:var(--muted);font-style:italic;margin-top:2px;letter-spacing:.2px;white-space:pre-wrap}

/* ── LIBRARY ── */
.library{background:var(--surf);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;overflow:hidden;transition:height .18s ease}
.lib-header{height:30px;display:flex;align-items:center;gap:7px;padding:0 10px 0 8px;flex-shrink:0;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
.lib-header:hover{background:var(--panel)}
.lib-toggle-btn{width:22px;height:22px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .15s;font-family:'IBM Plex Mono',monospace}
.lib-toggle-btn:hover{color:var(--text);border-color:var(--acc-dim)}
.lib-sort-icon{font-size:11px;color:var(--muted);flex-shrink:0}
.lib-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--sub);white-space:nowrap}
.lib-count{font-size:11px;color:var(--dim);font-family:'Playfair Display',serif}
.lib-spacer{flex:1}
.lib-sort{font-size:9px;background:var(--surf);border:1px solid var(--border2);color:var(--dim);padding:2px 5px;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;outline:none}
.lib-sort:focus{border-color:var(--acc-dim)}
.lib-sort option{background:var(--panel)}
.lib-search{width:100px;flex-shrink:0;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:1px 4px;outline:none;letter-spacing:.3px}
.lib-search:focus{border-bottom-color:var(--acc-dim)}
.lib-search::placeholder{color:var(--muted)}
.lib-thumb-slider{width:48px;accent-color:var(--acc-dim);cursor:pointer;flex-shrink:0}
.lib-filter{font-size:9px;background:var(--surf);border:1px solid var(--border2);color:var(--dim);padding:2px 6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;outline:none;transition:all .15s}
.lib-filter:hover{border-color:var(--acc-dim);color:var(--text)}
.lib-filter.active{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.lib-body{flex:1;overflow:hidden;display:flex}
.lib-scroll{flex:1;overflow-x:auto;display:flex;align-items:center;gap:8px;padding:7px 12px}
.lib-scroll::-webkit-scrollbar{height:3px}
.lib-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.thumb{flex-shrink:0;width:84px;height:84px;cursor:grab;position:relative;overflow:hidden;border:2px solid var(--border2);transition:border-color .15s}
.thumb:hover{border-color:var(--acc-dim)}
.thumb:active{cursor:grabbing}
.thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
.thumb.in-board{border-color:var(--acc)}

const getBoardPx = board => {
  if (!board?.fixed || !board.fixedW || !board.fixedH) return null;
  const dpi = board.dpi || 300;
  const u   = board.units || 'cm';
  const toPx = v => u === 'px' ? v : u === 'cm' ? Math.round(v / 2.54 * dpi) : u === 'mm' ? Math.round(v / 25.4 * dpi) : Math.round(v * dpi);
  return { w: Math.max(1, toPx(board.fixedW)), h: Math.max(1, toPx(board.fixedH)) };
};

const api = {

  put:    (url, body) => fetch(url, {method:'PUT',  headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}).then(r => r.json()),
  patch:  (url, body) => fetch(url, {method:'PATCH',headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}).then(r => r.json()),
  del:    url         => fetch(url, {method:'DELETE'}).then(r => r.json()),
  upload: (url, file) => { const fd = new FormData(); fd.append('photo', file); return fetch(url, {method:'POST', body:fd}).then(r => r.json()); },
};

const fmtSize = b => b > 1e6 ? (b/1e6).toFixed(1)+' MB' : Math.round(b/1024)+' KB';

// Convert canvas px → physical units given DPI
const pxToPhys = (px, dpi, units) => {
  if (!dpi || !units || units === 'px') return null;
  const inches = px / dpi;
  if (units === 'cm') return (inches * 2.54).toFixed(1) + ' cm';
  if (units === 'mm') return (inches * 25.4).toFixed(0) + ' mm';
  if (units === 'in') return inches.toFixed(2) + '"';
  return null;
};

const physToPx = (phys, dpi, units) => {
  if (!phys || !dpi || !units || units === 'px') return Math.round(phys || 0);
  const factor = units === 'cm' ? 2.54 : units === 'mm' ? 25.4 : 1;
  return Math.round((phys / factor) * dpi);
};

const dimLabel = (w, h, dpi, units, frame = 0) => {
  const f = parseFloat(frame) || 0;
  if (dpi && units && units !== 'px') {
    const factor = units === 'cm' ? 2.54 : units === 'mm' ? 25.4 : 1;
    const dec    = units === 'mm' ? 0 : units === 'in' ? 2 : 1;
    const suf    = units === 'in' ? '"' : ` ${units}`;
    const tw = (w / dpi * factor + 2 * f).toFixed(dec);
    const th = (h / dpi * factor + 2 * f).toFixed(dec);
    return `${tw}${suf} × ${th}${suf}`;
  }
  return `${w + 2 * Math.round(f)} × ${h + 2 * Math.round(f)} px`;
};

function App() {
  const [projects,      setProjects]      = useState([]);
  const [pid,           setPid]           = useState(null);
  const [boards,        setBoards]        = useState([]);
  const [bid,           setBid]           = useState(null);
  const [photos,        setPhotos]        = useState([]);
  const [items,         setItems]         = useState([]);
  const [allBoardItems, setAllBoardItems] = useState({}); // {boardId: items[]}
  const [sel,           setSel]           = useState([]);
  const [zoom,          setZoom]          = useState(1);
  const [ready,         setReady]         = useState(false);
  const [uploading,     setUploading]     = useState(false);
  const [toast,         setToast]         = useState(null);
  const [modal,         setModal]         = useState(null); // 'project'|'board'|'boardcfg'
  const [nameVal,       setNameVal]       = useState('');
  const [dragOver,      setDragOver]      = useState(false);
  const [sbOpen,        setSbOpen]        = useState(true);
  const [libOpen,       setLibOpen]       = useState(() => localStorage.getItem('libOpen') !== 'false');
  const [photoSort,     setPhotoSort]     = useState(() => localStorage.getItem('photoSort') || 'imported');
  const [photoFilter,   setPhotoFilter]   = useState(() => localStorage.getItem('photoFilter') || 'all');
  const [libSearch,     setLibSearch]     = useState('');
  const [thumbSize,     setThumbSize]     = useState(() => parseInt(localStorage.getItem('thumbSize') || '84'));
  const [labelEditId,   setLabelEditId]   = useState(null);
  const labelEditOrigRef = useRef(null);
  const [renaming,      setRenaming]      = useState(null);
  const [hoverInfo,     setHoverInfo]     = useState(null);
  // board config edit state (only live while modal is open)
  const [cfgUnits,      setCfgUnits]      = useState('cm');
  const [cfgDpi,        setCfgDpi]        = useState('300');
  const [cfgFixed,      setCfgFixed]      = useState(false);
  const [cfgBoardW,     setCfgBoardW]     = useState('');
  const [cfgBoardH,     setCfgBoardH]     = useState('');
  const [showGrid,      setShowGrid]      = useState(() => localStorage.getItem('tb-grid') !== 'off');
  const [gridStep,      setGridStep]      = useState(() => parseInt(localStorage.getItem('tb-gridstep')) || 0); // 0 = auto
  const [snapGrid,      setSnapGrid]      = useState(() => localStorage.getItem('tb-snap') === 'on');
  const [linkInputId,   setLinkInputId]   = useState(null);
  const [linkFetching,  setLinkFetching]  = useState(null);
  const [resizeDim,     setResizeDim]     = useState(null);
  const [importState,   setImportState]   = useState(null); // {tempId,projectName,conflict,existingProject,busy}
  const [cfgDefaultFrame, setCfgDefaultFrame] = useState('0');
  const [propsPanelId,  setPropsPanelId]  = useState(null);
  const [noteColorPanelId, setNoteColorPanelId] = useState(null);
  const [copyToMenu,    setCopyToMenu]    = useState(null); // {photoId, x, y}

  const [theme,         setTheme]         = useState(() => localStorage.getItem('tb-theme') || 'dark-amber');
  const [themeOpen,     setThemeOpen]     = useState(false);
  const [appVersion,    setAppVersion]    = useState('');
  const [updateInfo,    setUpdateInfo]    = useState(null);
  const [updateDismissed, setUpdateDismissed] = useState(false);

  useLayoutEffect(() => {
    const th = THEMES[theme];
    if (!th) return;
    Object.entries(th.vars).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
  }, [theme]);

  const applyTheme = id => {
    localStorage.setItem('tb-theme', id);
    setTheme(id);
    setThemeOpen(false);
  };

  const [lang, setLang] = useState(() => localStorage.getItem('tb-lang') || 'es');
  const t = (key, ...args) => {
    const v = (I18N[lang] || I18N.es)[key];
    if (v === undefined) return key;
    return typeof v === 'function' ? v(...args) : v;
  };
  const applyLang = id => { localStorage.setItem('tb-lang', id); setLang(id); setThemeOpen(false); };

  const itemsRef        = useRef([]);
  const selRef          = useRef([]);
  const zoomRef         = useRef(1);
  const pidRef          = useRef(null);
  const bidRef          = useRef(null);
  const photosRef       = useRef([]);
  const allBoardItemsRef= useRef({});
  const boardsRef       = useRef([]);
  const boardPxRef      = useRef(null);
  const wrapRef         = useRef(null);
  const undoStack       = useRef([]);
  const redoStack       = useRef([]);
  const wasDragged      = useRef(false);
  const boardZoom       = useRef({});
  const importInputRef  = useRef(null);
  const clipboardRef    = useRef([]);
  const rotBtnDraggedRef = useRef(false);

  useEffect(() => { itemsRef.current         = items;         }, [items]);
  useEffect(() => { pidRef.current           = pid;           }, [pid]);
  useEffect(() => { bidRef.current           = bid;           }, [bid]);
  useEffect(() => { photosRef.current        = photos;        }, [photos]);
  useEffect(() => { allBoardItemsRef.current = allBoardItems; }, [allBoardItems]);
  useEffect(() => { boardsRef.current        = boards;        }, [boards]);

  // keep allBoardItems in sync with current board mutations
  useEffect(() => {
    if (bid) setAllBoardItems(prev => ({ ...prev, [bid]: items }));
  }, [items, bid]);

  // ── init ──────────────────────────────────────────────────────────────────
  useEffect(() => {
    const hb = () => fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
    hb();
    const hbInterval = setInterval(hb, 30_000);
    const onVisible = () => { if (document.visibilityState === 'visible') hb(); };
    document.addEventListener('visibilitychange', onVisible);
    api.get('/api/version').then(d => setAppVersion(d.version || '')).catch(() => {});
    api.get('/api/update').then(d => { if (d.update) setUpdateInfo(d.update); }).catch(() => {});
    api.get('/api/projects').then(ps => {
      setProjects(ps);
      if (ps.length) setPid(ps[0].id);
      setReady(true);
    }).catch(() => setReady(true));
    return () => { clearInterval(hbInterval); document.removeEventListener('visibilitychange', onVisible); };
  }, []);

  useEffect(() => {
    if (!pid) { setBoards([]); setBid(null); setPhotos([]); setItems([]); setAllBoardItems({}); return; }
    Promise.all([
      api.get(`/api/projects/${pid}/boards`),
      api.get(`/api/projects/${pid}/photos`),
    ]).then(async ([bs, ps]) => {
      setBoards(bs);
      setBid(bs[0]?.id || null);
      setPhotos(ps);
      // Load all board items for cross-board presence
      if (bs.length) {
        const allIt = await Promise.all(bs.map(b => api.get(`/api/boards/${pid}/${b.id}/items`)));
        const map = {};
        bs.forEach((b, i) => { map[b.id] = allIt[i]; });
        setAllBoardItems(map);
      }
    });
  }, [pid]);

  useEffect(() => { setLibSearch(''); }, [pid]);

  useEffect(() => {
    if (!bid || !pid) { setItems([]); itemsRef.current = []; return; }
    api.get(`/api/boards/${pid}/${bid}/items`).then(it => {
      setItems(it); itemsRef.current = it;
    });
    selRef.current = []; setSel([]);
    undoStack.current = []; redoStack.current = [];
  }, [bid, pid]);

  const showToast = (msg, err = false) => {
    setToast({ msg, err });
    setTimeout(() => setToast(null), 3200);
  };

  const langRef = useRef('es');
  useEffect(() => { langRef.current = lang; }, [lang]);
  useEffect(() => {
    zoomRef.current = zoom;
    const b = bidRef.current;
    if (b) {
      boardZoom.current[b] = zoom;
      localStorage.setItem(`tb-zoom-${b}`, String(zoom));
    }
  }, [zoom]);

  const zoomStep = useCallback((dir) => {
    // Find next ZOOM_STEP above/below current zoom, or clamp
    setZoom(z => {
      const above = ZOOM_STEPS.filter(s => dir > 0 ? s > z + 0.001 : s < z - 0.001);
      if (dir > 0) return above.length ? above[0]              : ZOOM_STEPS[ZOOM_STEPS.length - 1];
      else         return above.length ? above[above.length - 1] : ZOOM_STEPS[0];
    });
  }, []);

  useEffect(() => {
    const onWheel = e => {
      if (!e.ctrlKey) return;
      if (!wrapRef.current?.contains(e.target)) return;
      e.preventDefault();
      zoomStep(e.deltaY < 0 ? 1 : -1);
    };
    window.addEventListener('wheel', onWheel, { passive: false });
    return () => window.removeEventListener('wheel', onWheel);
  }, [zoomStep]);

  useEffect(() => {
    const onKey = e => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomStep(1); }
        if (e.key === '-') { e.preventDefault(); zoomStep(-1); }
        if (e.key === '0') { e.preventDefault(); boardPxRef.current ? fitBoard() : fitWidth(); }
      }
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
        if (e.key === 'y') { e.preventDefault(); redo(); }
        if (e.key === 'a') { e.preventDefault(); const ids = itemsRef.current.map(i => i.id); selRef.current = ids; setSel(ids); }
        if (e.key === 'c') {
          e.preventDefault();
          const sel = selRef.current.map(id => itemsRef.current.find(i => i.id === id)).filter(Boolean);
          if (sel.length) { clipboardRef.current = sel.map(i => ({...i})); showToast(t('copied', sel.length)); }
        }
        if (e.key === 'v') {
          e.preventDefault();
          if (!clipboardRef.current.length || !bidRef.current) return;
          pushUndo();
          const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
          let z = maxZ;
          const pfx = Date.now().toString(36);
          const copies = clipboardRef.current.map((it, idx) => ({
            ...it,
            id: pfx + idx.toString(36) + Math.random().toString(36).slice(2, 4),
            x: it.x + 20, y: it.y + 20, z: ++z,
          })).filter(it => it.type === 'note' || photosRef.current.some(p => p.id === it.photoId));
          if (!copies.length) return;
          const nit = [...itemsRef.current, ...copies];
          selRef.current = copies.map(c => c.id); setSel(copies.map(c => c.id));
          setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
          showToast(t('pasted', copies.length));
        }
        if (e.key === 'd') {
          e.preventDefault();
          if (!selRef.current.length) return;
          pushUndo();
          const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
          let z = maxZ;
          const pfx = Date.now().toString(36);
          const copies = selRef.current.map((id, idx) => {
            const it = itemsRef.current.find(i => i.id === id);
            if (!it) return null;
            return { ...it, id: pfx + idx.toString(36) + Math.random().toString(36).slice(2, 4), x: it.x + 20, y: it.y + 20, z: ++z };
          }).filter(Boolean);
          if (!copies.length) return;
          const nit = [...itemsRef.current, ...copies];
          selRef.current = copies.map(c => c.id); setSel(copies.map(c => c.id));
          setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
          showToast(t('duplicated', copies.length));
        }
      }
      if ((e.key === 'Delete' || e.key === 'Backspace') && selRef.current.length) {
        e.preventDefault();
        pushUndo();
        const nit = itemsRef.current.filter(i => !selRef.current.includes(i.id));
        setItems(nit); itemsRef.current = nit;
        selRef.current = []; setSel([]);
        saveItemsNow(nit);
      }
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key) && selRef.current.length) {
        e.preventDefault();
        const step = e.shiftKey ? 10 : 1;
        const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
        const dy = e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0;
        if (!e.repeat) pushUndo();
        const nit = itemsRef.current.map(i =>
          selRef.current.includes(i.id) && !i.locked
            ? { ...i, x: (i.x || 0) + dx, y: (i.y || 0) + dy }
            : i
        );
        setItems(nit); itemsRef.current = nit;
        saveItemsNow(nit);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [zoomStep, fitBoard, undo, redo, pushUndo, saveItemsNow]);

  const saveItemsNow = useCallback((its) => {
    const p = pidRef.current, b = bidRef.current;
    if (!p || !b) return;
    const msg = (I18N[langRef.current] || I18N.es).saveError;
    api.put(`/api/boards/${p}/${b}/items`, its).catch(() => showToast(msg, true));
  }, []);

  const pushUndo = useCallback(() => {
    undoStack.current = [...undoStack.current.slice(-49), itemsRef.current.map(i => ({ ...i }))];
    redoStack.current = [];
  }, []);
  const undo = useCallback(() => {
    if (!undoStack.current.length) return;
    redoStack.current = [...redoStack.current, itemsRef.current.map(i => ({ ...i }))];
    const snap = undoStack.current[undoStack.current.length - 1];
    undoStack.current = undoStack.current.slice(0, -1);
    setItems(snap); itemsRef.current = snap;
    saveItemsNow(snap);
  }, [saveItemsNow]);
  const redo = useCallback(() => {
    if (!redoStack.current.length) return;
    undoStack.current = [...undoStack.current, itemsRef.current.map(i => ({ ...i }))];
    const snap = redoStack.current[redoStack.current.length - 1];
    redoStack.current = redoStack.current.slice(0, -1);
    setItems(snap); itemsRef.current = snap;
    saveItemsNow(snap);
  }, [saveItemsNow]);

  // ── board config ──────────────────────────────────────────────────────────
  const activeBoardMeta = boards.find(b => b.id === bid);
  const boardDpi   = activeBoardMeta?.dpi   || null;
  const boardUnits = activeBoardMeta?.units || 'px';
  const boardPx    = activeBoardMeta ? getBoardPx(activeBoardMeta) : null;
  boardPxRef.current = boardPx;

  // ── grid ──────────────────────────────────────────────────────────────────
  // Compute the actual grid cell size in canvas pixels.
  // gridStep===0 means "auto": physical 1cm for DPI boards, 50px otherwise.
  const gridCellPx = (() => {
    if (gridStep > 0) return gridStep;
    if (boardDpi && boardUnits !== 'px') return Math.round(boardDpi / 2.54); // 1 cm
    return 50;
  })();
  const snapVal = (v, cell) => { const s = Math.round(v / cell) * cell; return Math.abs(v - s) <= Math.min(12, cell / 3) ? s : v; };
  // Possible grid step options for the current board
  const gridOptions = (() => {
    const opts = [];
    opts.push({ v: 0, label: t('gridAuto') });
    if (boardDpi && boardUnits !== 'px') {
      const mm1 = Math.round(boardDpi / 25.4);
      const mm5 = Math.round(5 * boardDpi / 25.4);
      const cm1 = Math.round(boardDpi / 2.54);
      const cm5 = Math.round(5 * boardDpi / 2.54);
      opts.push({ v: mm1, label: '1 mm' });
      opts.push({ v: mm5, label: '5 mm' });
      opts.push({ v: cm1, label: '1 cm' });
      opts.push({ v: cm5, label: '5 cm' });
    } else {
      [10, 25, 50, 100, 200].forEach(px => opts.push({ v: px, label: `${px} px` }));
    }
    return opts;
  })();
  const toggleGrid = () => { const n = !showGrid; setShowGrid(n); localStorage.setItem('tb-grid', n ? 'on' : 'off'); };
  const changeGridStep = v => { setGridStep(v); localStorage.setItem('tb-gridstep', String(v)); };

  const openBoardConfig = () => {
    setCfgUnits(activeBoardMeta?.units || 'cm');
    setCfgDpi(String(activeBoardMeta?.dpi || 300));
    setCfgFixed(activeBoardMeta?.fixed || false);
    setCfgBoardW(activeBoardMeta?.fixedW != null ? String(activeBoardMeta.fixedW) : '');
    setCfgBoardH(activeBoardMeta?.fixedH != null ? String(activeBoardMeta.fixedH) : '');
    setCfgDefaultFrame(String(activeBoardMeta?.defaultFrame || 0));
    setModal('boardcfg');
  };

  const saveBoardConfig = async () => {
    const dpi = parseInt(cfgDpi) || 300;
    let fixedW = null, fixedH = null;
    if (cfgFixed) {
      fixedW = parseFloat(cfgBoardW);
      fixedH = parseFloat(cfgBoardH);
      if (!fixedW || !fixedH || fixedW <= 0 || fixedH <= 0) return showToast(t('invalidDims'), true);
      const newBp = getBoardPx({ fixed: true, fixedW, fixedH, units: cfgUnits, dpi });
      const overflow = itemsRef.current.some(item => {
        const h = item.type === 'note' ? (item.h || item.w) : (() => {
          const p = photosRef.current.find(ph => ph.id === item.photoId);
          if (!p) return item.w;
          return (item.rot || 0) % 180 !== 0 ? Math.round(item.w * p.w / p.h) : Math.round(item.w * p.h / p.w);
        })();
        return item.x + item.w > newBp.w || item.y + h > newBp.h;
      });
      if (overflow && !confirm(t('confirmOverflow'))) return;
    }

  const printMemoria = () => {

        const isSwapped = rot % 180 !== 0;
        const naturalH = isSwapped

      const minXpr = bPx ? 0 : (photoItemsPr.length ? Math.min(...photoItemsPr.map(i => i.x)) : 0);

      rows += previewHtml;
      rows += `<table><thead><tr><th>${hdr[0]}</th><th></th><th>${hdr[1]}</th><th>${hdr[2]}</th><th>${hdr[4]}</th></tr></thead><tbody>`;
      boardIt.forEach((item, i) => {

          ? ((item.rot || 0) % 180 !== 0
            ? Math.round(item.w * photo.w / photo.h)
            : Math.round(item.w * photo.h / photo.w))
          : item.w;
        const physW = hasPhys ? pxToPhys(item.w, dpi, units) : null;
        const physH = hasPhys ? pxToPhys(h, dpi, units) : null;
        rows += `<tr>
          <td class="n">${i + 1}</td>
          <td class="thumb"><img src="/photos/${pid}/${item.photoId}/thumb" alt="" /></td>
          <td>${photo?.name || item.photoId}</td>
          <td class="dim">${dimLabel(item.w, h, dpi, units, item.frame)}${item.frame > 0 ? `<small>(incl. ${item.frame} ${hasPhys ? units : 'px'} ${lang === 'en' ? 'frame' : 'de marco'})</small>` : ''}</td>

      if (memNotes.length) {
        rows += `<div class="notes-section"><div class="notes-hd">${t('notesSectionTitle')}</div>`;
        memNotes.forEach(n => {

          rows += `<div class="note-item">${n.title ? `<div class="note-title">${esc(n.title)}</div>` : ''}<div class="note-text">${esc(n.text).replace(/\n/g,'<br>')}</div>${n.link ? `<div class="note-link-row"><a class="note-link" href="${n.link.url}">${esc(n.link.title||n.link.domain)}</a>${n.link.title ? ` <span class="note-link-domain">${esc(n.link.domain)}</span>` : ''}</div>` : ''}</div>`;
        });
        rows += `</div>`;
      }
      rows += `</section>`;
    });
    const html = `<!DOCTYPE html><html lang="${lang}"><head><meta charset="UTF-8"><title>${proj?.name || ''} — ${t('reportTitle')} — ${date}</title>
<style>

    const w = window.open('', '_blank', 'width=780,height=740');
    if (!w) { showToast(t('allowPopups'), true); return; }
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 400);
  };

  // ── helpers ───────────────────────────────────────────────────────────────
  const photoBoardNames = (photoId) =>
    boardsRef.current
      .filter(b => (allBoardItemsRef.current[b.id] || []).some(i => i.photoId === photoId))
      .map(b => b.name);

  // ── canvas coordinate normalizer (keeps all items ≥ 0) ───────────────────
  const normalizeItems = (its) => {
    if (!its.length) return { items: its, dx: 0, dy: 0 };
    const minX = Math.min(...its.map(i => i.x));
    const minY = Math.min(...its.map(i => i.y));
    const dx = minX < 0 ? -minX : 0;
    const dy = minY < 0 ? -minY : 0;
    if (!dx && !dy) return { items: its, dx: 0, dy: 0 };
    return { items: its.map(i => ({ ...i, x: i.x + dx, y: i.y + dy })), dx, dy };
  };

  const applyNormalized = (its) => {
    if (boardPxRef.current) {
      setItems(its); itemsRef.current = its;
      return its;
    }
    const { items: norm, dx, dy } = normalizeItems(its);
    setItems(norm); itemsRef.current = norm;
    if ((dx || dy) && wrapRef.current) {
      wrapRef.current.scrollLeft -= dx * zoomRef.current;
      wrapRef.current.scrollTop  -= dy * zoomRef.current;
    }
    return norm;
  };

  // ── place photo ───────────────────────────────────────────────────────────
  const placePhoto = (photo, cx, cy) => {
    pushUndo();
    const w = 320;
    const bp = boardPxRef.current;
    const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
    const h = Math.round(w * photo.h / photo.w);
    let x = Math.round(cx - w / 2);
    let y = Math.round(cy - h / 2);
    if (bp) {
      x = Math.max(0, Math.min(x, bp.w - w));
      y = Math.max(0, Math.min(y, bp.h - h));
    }
    const item = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      photoId: photo.id, x, y, w, z: maxZ + 1, label: '', rot: 0,
      frame: boardsRef.current.find(b => b.id === bidRef.current)?.defaultFrame || 0,
    };
    const nit = [...itemsRef.current, item];
    const norm = applyNormalized(nit);
    selRef.current = [item.id]; setSel([item.id]);
    saveItemsNow(norm);
  };

  const fitBoard = useCallback(() => {
    const bp = boardPxRef.current;
    const wrap = wrapRef.current;
    if (!bp || !wrap) return;
    const avW = wrap.clientWidth  - BOARD_PAD * 2 - 8;
    const avH = wrap.clientHeight - BOARD_PAD * 2 - 8;
    const z = Math.max(0.05, Math.min(4, Math.min(avW / bp.w, avH / bp.h)));
    setZoom(z);
    requestAnimationFrame(() => {
      const bpNow = boardPxRef.current;
      if (!wrap || !bpNow) return;
      const totalW = bpNow.w * z + BOARD_PAD * 2;
      const totalH = bpNow.h * z + BOARD_PAD * 2;
      wrap.scrollLeft = Math.max(0, (totalW - wrap.clientWidth)  / 2);
      wrap.scrollTop  = Math.max(0, (totalH - wrap.clientHeight) / 2);
    });
  }, []);

  const fitWidth = useCallback(() => {
    const wrap = wrapRef.current;
    if (!wrap) return;
    const its = itemsRef.current;
    if (!its.length) { setZoom(1); return; }
    const maxX = Math.max(...its.map(i => i.x + (i.w || 0)));
    const z = Math.max(0.05, Math.min(4, (wrap.clientWidth - 80) / maxX));
    setZoom(z);
  }, []);

  // restore saved zoom or auto-fit when switching boards
  useEffect(() => {
    if (!bid) return;
    const saved = boardZoom.current[bid] ?? parseFloat(localStorage.getItem(`tb-zoom-${bid}`));
    if (saved && isFinite(saved)) {
      setZoom(saved);
    } else {
      const bp = boardPxRef.current;
      if (bp) requestAnimationFrame(() => fitBoard());
      else requestAnimationFrame(() => fitWidth());
    }
  }, [bid, fitBoard, fitWidth]);

  const addToCenter = photoId => {
    const photo = photosRef.current.find(p => p.id === photoId);
    if (!photo) return;
    const wrap = wrapRef.current;
    const z = zoomRef.current;
    const bp = boardPxRef.current;
    const pad = bp ? BOARD_PAD : 0;
    placePhoto(photo,
      (wrap.scrollLeft + wrap.clientWidth  / 2 - pad) / z,
      (wrap.scrollTop  + wrap.clientHeight / 2 - pad) / z,
    );
  };

  // ── CRUD ──────────────────────────────────────────────────────────────────
  const createProject = async () => {
    if (!nameVal.trim()) return;
    const p = await api.post('/api/projects', { name: nameVal.trim() });
    setProjects(ps => [...ps, p]);
    setPid(p.id);
    setNameVal(''); setModal(null);
  };

  const createBoard = async () => {
    if (!nameVal.trim() || !pidRef.current) return;
    const b = await api.post(`/api/projects/${pidRef.current}/boards`, { name: nameVal.trim() });
    setBoards(bs => [...bs, b]);
    setBid(b.id);
    setAllBoardItems(prev => ({ ...prev, [b.id]: [] }));
    setNameVal(''); setModal(null);
  };

  const startRename = (type, id, name, e) => {
    e?.stopPropagation();
    setRenaming({ type, id, value: name });
  };

  const submitRename = async () => {
    if (!renaming) return;
    const { type, id, value } = renaming;
    const name = value.trim();
    setRenaming(null);
    if (!name) return;
    if (type === 'project') {
      await api.patch(`/api/projects/${id}`, { name });
      setProjects(ps => ps.map(p => p.id === id ? { ...p, name } : p));
    } else {
      await api.patch(`/api/projects/${pidRef.current}/boards/${id}`, { name });
      setBoards(bs => bs.map(b => b.id === id ? { ...b, name } : b));
    }
  };

  const deleteProject = async (id, e) => {
    e?.stopPropagation();
    if (!confirm(t('confirmDeleteProject'))) return;
    await api.del(`/api/projects/${id}`);
    const nps = projects.filter(p => p.id !== id);
    setProjects(nps);
    if (pidRef.current === id) setPid(nps[0]?.id || null);
  };

  const exportProject = (projId, e) => {
    e.stopPropagation();
    window.location.href = `/api/projects/${projId}/export`;
  };

  const handleImportFile = async file => {
    if (!file) return;
    const fd = new FormData();
    fd.append('zip', file);
    try {
      const r = await fetch('/api/projects/import', { method: 'POST', body: fd });
      const data = await r.json();
      if (!r.ok) { showToast(data.error || t('importErrGeneric'), true); return; }
      setImportState(data);
    } catch {
      showToast(t('importErrGeneric'), true);
    }
  };

  const confirmImport = async mode => {
    if (!importState) return;
    const { tempId, existingProject } = importState;
    const targetPid = mode === 'replace' ? existingProject?.id : undefined;
    setImportState(s => ({ ...s, busy: true }));
    try {
      const r = await fetch(`/api/projects/import/${tempId}/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, targetPid }),
      });
      const data = await r.json();
      if (!r.ok) { showToast(data.error || t('importErrGeneric'), true); setImportState(null); return; }
      const projs = await fetch('/api/projects').then(res => res.json());
      setProjects(projs);
      setPid(data.id);
      setImportState(null);
      showToast(t('importOk', data.name));
    } catch {
      showToast(t('importErrGeneric'), true);
      setImportState(null);
    }
  };

  const deleteBoard = async (id, e) => {
    e?.stopPropagation();
    if (!confirm(t('confirmDeleteBoard'))) return;
    await api.del(`/api/projects/${pidRef.current}/boards/${id}`);
    const nbs = boards.filter(b => b.id !== id);
    setBoards(nbs);
    setAllBoardItems(prev => { const n = {...prev}; delete n[id]; return n; });
    if (bidRef.current === id) setBid(nbs[0]?.id || null);
  };

  const duplicateBoard = async (id, e) => {
    e?.stopPropagation();
    const copy = await api.post(`/api/projects/${pidRef.current}/boards/${id}/duplicate`, {});
    setBoards(bs => {
      const idx = bs.findIndex(b => b.id === id);
      const next = [...bs];
      next.splice(idx + 1, 0, copy);
      return next;
    });
