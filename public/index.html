  // ── upload ────────────────────────────────────────────────────────────────
  const uploadFiles = async (files, dropPos = null) => {
    const p = pidRef.current;
    if (!p) return showToast(t('selectProjectFirst'), true);
    setUploading(true);
    let ok = 0;
    for (const file of Array.from(files)) {
      if (!file.type.startsWith('image/')) continue;
      try {
        const photo = await api.upload(`/api/projects/${p}/photos`, file);
        if (photo.error) { showToast(photo.error, true); continue; }
        setPhotos(ps => [...ps, photo]);
        if (dropPos && bidRef.current) placePhoto(photo, dropPos.x, dropPos.y);
        ok++;
      } catch { showToast(t('uploadError', file.name), true); }
    }
    setUploading(false);
    if (ok) showToast(t('photosAdded', ok));
  };

  const deletePhoto = async id => {
    if (!confirm(t('confirmDeletePhoto'))) return;
    await api.del(`/api/projects/${pidRef.current}/photos/${id}`);
    setPhotos(ps => ps.filter(p => p.id !== id));
    const nit = itemsRef.current.filter(i => i.photoId !== id);
    setItems(nit); saveItemsNow(nit);
  };

  // ── import from repo ──────────────────────────────────────────────────────
  // ── hover info ────────────────────────────────────────────────────────────
  const showPhotoInfo = (photo, status, thumbSrc, itemW = null, itemH = null) =>
    setHoverInfo({ photo, status, thumbSrc, itemW, itemH });
  const clearHoverInfo = () => setHoverInfo(null);

  // ── drag ──────────────────────────────────────────────────────────────────
  const onLibDS = (e, id) => { e.dataTransfer.setData('tb-photo', id); e.dataTransfer.effectAllowed = 'copy'; };

  const onCanvasDrop = async e => {
    e.preventDefault(); setDragOver(false);
    const wrap = wrapRef.current;
    const r = wrap.getBoundingClientRect();
    const z = zoomRef.current;
    const pad = boardPxRef.current ? BOARD_PAD : 0;
    const pos = { x: (e.clientX - r.left + wrap.scrollLeft - pad) / z, y: (e.clientY - r.top + wrap.scrollTop - pad) / z };
    if (e.dataTransfer.files?.length) {
      if (!bidRef.current) return showToast(t('createBoardFirst'), true);
      await uploadFiles(e.dataTransfer.files, pos);
      return;
    }
    const photoId = e.dataTransfer.getData('tb-photo');
    if (photoId) {
      const photo = photosRef.current.find(p => p.id === photoId);
      if (photo) placePhoto(photo, pos.x, pos.y);
    }
  };

  // ── item interactions ─────────────────────────────────────────────────────
  const onItemPD = (e, itemId) => {
    if (e.button !== 0) return;
    if (e.target.closest('.lbl,.ibc,.rh')) return;
    e.stopPropagation(); e.preventDefault();

    const beforeDrag = itemsRef.current.map(i => ({ ...i }));
    // Update selection
    if (e.shiftKey) {
      const ns = selRef.current.includes(itemId)
        ? selRef.current.filter(id => id !== itemId)
        : [...selRef.current, itemId];
      selRef.current = ns; setSel(ns);
    } else {
      if (!selRef.current.includes(itemId)) {
        selRef.current = [itemId]; setSel([itemId]);
      }
    }

    const dragIds = [...selRef.current].filter(id => !itemsRef.current.find(i => i.id === id)?.locked);
    // Bring to front (only unlocked items)
    let z = Math.max(0, ...itemsRef.current.map(i => i.z || 0));
    const fwd = itemsRef.current.map(i => dragIds.includes(i.id) ? { ...i, z: ++z } : i);
    setItems(fwd); itemsRef.current = fwd;

    // Record start positions
    const starts = {};
    dragIds.forEach(id => { const it = fwd.find(i => i.id === id); if (it) starts[id] = { x: it.x, y: it.y }; });
    const sx = e.clientX, sy = e.clientY;
    let ldx = 0, ldy = 0;

    const clampItem = (i, x, y) => {
      const bp = boardPxRef.current;
      if (!bp) return { x, y };
      const h = getItemH(i);
      return { x: Math.max(0, Math.min(x, bp.w - i.w)), y: Math.max(0, Math.min(y, bp.h - h)) };
    };
    const onMM = e => {
      ldx = e.clientX - sx; ldy = e.clientY - sy;
      const z = zoomRef.current;
      setItems(its => its.map(i => {
        if (!dragIds.includes(i.id)) return i;
        let rx = starts[i.id].x + ldx/z, ry = starts[i.id].y + ldy/z;
        if (snapGrid && showGrid) { rx = snapVal(rx, gridCellPx); ry = snapVal(ry, gridCellPx); }
        const { x, y } = clampItem(i, rx, ry);
        return { ...i, x, y };
      }));
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup',   onMU);
      const z = zoomRef.current;
      const nit = itemsRef.current.map(i => {
        if (!dragIds.includes(i.id)) return i;
        let rx = starts[i.id].x + ldx/z, ry = starts[i.id].y + ldy/z;
        if (snapGrid && showGrid) { rx = snapVal(rx, gridCellPx); ry = snapVal(ry, gridCellPx); }
        else { rx = Math.round(rx); ry = Math.round(ry); }
        const { x, y } = clampItem(i, rx, ry);
        return { ...i, x, y };
      });
      if (ldx !== 0 || ldy !== 0) {
        wasDragged.current = true;
        undoStack.current = [...undoStack.current.slice(-49), beforeDrag];
        redoStack.current = [];
      }
      const norm = applyNormalized(nit);
      saveItemsNow(norm);
    };
    window.addEventListener('pointermove', onMM);
    window.addEventListener('pointerup',   onMU);
  };

  const onResizePD = (e, itemId) => {
    e.stopPropagation(); e.preventDefault();
    const it = itemsRef.current.find(i => i.id === itemId);
    if (it?.locked) return;
    const beforeResize = itemsRef.current.map(i => ({ ...i }));
    const sx = e.clientX, ow = it.w;
    let cw = ow;
    const photo = photosRef.current.find(p => p.id === it.photoId);
    const isSwapped = (it.rot || 0) % 180 !== 0;
    const activeMeta = boardsRef.current.find(b => b.id === bidRef.current);
    const rdpi = activeMeta?.dpi || null;
    const runits = activeMeta?.units || 'px';
    const rframe = it.frame || 0;
    const onMM = e => {
      const bp = boardPxRef.current;
      const maxW = bp ? bp.w - it.x : Infinity;
      cw = Math.max(80, Math.min(ow + (e.clientX - sx) / zoomRef.current, maxW));
      setItems(its => its.map(i => i.id === itemId ? { ...i, w: cw } : i));
      const rw = Math.round(cw);
      const rh = photo ? (isSwapped ? Math.round(cw * photo.w / photo.h) : Math.round(cw * photo.h / photo.w)) : rw;
      setResizeDim({ x: e.clientX + 16, y: e.clientY - 44, label: dimLabel(rw, rh, rdpi, runits, rframe) });
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup',   onMU);
      setResizeDim(null);
      const nit = itemsRef.current.map(i => i.id === itemId ? { ...i, w: Math.round(cw) } : i);
      if (Math.round(cw) !== ow) {
        undoStack.current = [...undoStack.current.slice(-49), beforeResize];
        redoStack.current = [];
      }
      setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
    };
    window.addEventListener('pointermove', onMM);
    window.addEventListener('pointerup',   onMU);
  };

  const rotateItem = id => {
    pushUndo();
    const nit = itemsRef.current.map(i => i.id === id ? { ...i, rot: ((i.rot || 0) + 90) % 360 } : i);
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
  };

  const onFreeRotatePD = (e, itemId) => {
    e.stopPropagation();
    const it = itemsRef.current.find(i => i.id === itemId);
    if (it?.locked) return;
    const beforeRot = itemsRef.current.map(i => ({...i}));
    const el = e.currentTarget.closest('.bitem,.nitem');
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const sx = e.clientX, sy = e.clientY;
    const startAngle = Math.atan2(sy - cy, sx - cx) * 180 / Math.PI;
    const startFreeRot = it.freeRot || 0;
    let moved = false;
    let finalRot = startFreeRot;
    const onMM = e => {
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if (!moved && dx*dx + dy*dy < 16) return;
      if (!moved) { moved = true; rotBtnDraggedRef.current = true; }
      const cur = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
      const delta = cur - startAngle;
      finalRot = e.shiftKey
        ? Math.round((startFreeRot + delta) / 15) * 15
        : Math.round(startFreeRot + delta);
      setItems(its => its.map(i => i.id === itemId ? {...i, freeRot: finalRot} : i));
      setResizeDim({ x: e.clientX + 14, y: e.clientY - 36, label: `${((finalRot % 360) + 360) % 360}°` });
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup', onMU);
      setResizeDim(null);
      if (!moved) return;
      const nit = itemsRef.current.map(i => i.id === itemId ? {...i, freeRot: finalRot} : i);
      undoStack.current = [...undoStack.current.slice(-49), beforeRot];
      redoStack.current = [];
      setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
    };
    window.addEventListener('pointermove', onMM);
    window.addEventListener('pointerup', onMU);
  };

  const updateNoteColor = (id, color) => {
    const u = itemsRef.current.map(i => i.id === id ? {...i, noteColor: color} : i);
    itemsRef.current = u; setItems(u); saveItemsNow(u);
    setNoteColorPanelId(null);
  };
  const deleteItem = id => {
    pushUndo();
    const nit = itemsRef.current.filter(i => i.id !== id);
    setItems(nit); itemsRef.current = nit;
    selRef.current = []; setSel([]);
    saveItemsNow(nit);
  };
  const bringFwd = id => {
    pushUndo();
    const maxZ = Math.max(0, ...itemsRef.current.map(i => i.z || 0));
    const nit = itemsRef.current.map(i => i.id === id ? { ...i, z: maxZ + 1 } : i);
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
  };
  const updateLabel     = (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, label: v } : i); itemsRef.current = u; setItems(u); };
  const updateItemFrame  = (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, frame:  v } : i); itemsRef.current = u; setItems(u); };
  const updateItemLocked = (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, locked: v } : i); itemsRef.current = u; setItems(u); saveItemsNow(u); };
  const updateNoteText    = (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, text:    v } : i); itemsRef.current = u; setItems(u); };
  const updateNoteTitle   = (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, title:   v } : i); itemsRef.current = u; setItems(u); };
  const updateNoteInMemory= (id, v) => { const u = itemsRef.current.map(i => i.id === id ? { ...i, inMemory:v } : i); itemsRef.current = u; setItems(u); saveItemsNow(u); };
  const saveLabel      = ()      => saveItemsNow(itemsRef.current);

  const copyPhotoToProject = async (photoId, targetPid) => {
    setCopyToMenu(null);
    try {
      await api.post(`/api/projects/${pidRef.current}/photos/${photoId}/copy-to/${targetPid}`, {});
      showToast(t('photoCopied'));
    } catch { showToast('Error', true); }
  };

  const fetchLinkPreview = async (noteId, rawUrl) => {
    const url = rawUrl.trim();
    if (!url) return;
    pushUndo();
    setLinkFetching(noteId);
    try {
      const data = await api.get(`/api/linkpreview?url=${encodeURIComponent(url)}`);
      if (data.url) {
        const nit = itemsRef.current.map(i => i.id === noteId ? { ...i, link: data } : i);
        setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
      }
    } catch {}
    setLinkFetching(null);
  };

  const removeLinkFromNote = noteId => {
    pushUndo();
    const nit = itemsRef.current.map(i => i.id === noteId ? { ...i, link: null } : i);
    setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
  };

  const addNote = () => {
    if (!bid) return;
    pushUndo();
    const maxZ = itemsRef.current.length ? Math.max(...itemsRef.current.map(i => i.z || 0)) : 0;
    const z = zoomRef.current;
    const wrapEl = wrapRef.current;
    const cx = wrapEl ? Math.round(wrapEl.scrollLeft / z + wrapEl.clientWidth  / z / 2) : 200;
    const cy = wrapEl ? Math.round(wrapEl.scrollTop  / z + wrapEl.clientHeight / z / 2) : 200;
    const w = 220, h = 150;
    const bp = boardPxRef.current;
    let x = Math.round(cx - w / 2), y = Math.round(cy - h / 2);
    if (bp) { x = Math.max(0, Math.min(x, bp.w - w)); y = Math.max(0, Math.min(y, bp.h - h)); }
    const item = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5), type: 'note', text: '', x, y, w, h, z: maxZ + 1 };
    const nit = [...itemsRef.current, item];
    selRef.current = [item.id]; setSel([item.id]);
    saveItemsNow(applyNormalized(nit));
  };

  const onResizeNotePD = (e, itemId) => {
    e.stopPropagation(); e.preventDefault();
    const beforeResizeNote = itemsRef.current.map(i => ({ ...i }));
    const it = itemsRef.current.find(i => i.id === itemId);
    const sx = e.clientX, sy = e.clientY, ow = it.w, oh = it.h || 150;
    let cw = ow, ch = oh;
    const activeMeta = boardsRef.current.find(b => b.id === bidRef.current);
    const rdpi = activeMeta?.dpi || null;
    const runits = activeMeta?.units || 'px';
    const onMM = e => {
      const bp = boardPxRef.current; const z = zoomRef.current;
      cw = Math.max(120, Math.min(ow + (e.clientX - sx) / z, bp ? bp.w - it.x : Infinity));
      ch = Math.max(60,  Math.min(oh + (e.clientY - sy) / z, bp ? bp.h - it.y : Infinity));
      setItems(its => its.map(i => i.id === itemId ? { ...i, w: cw, h: ch } : i));
    };
    const onMU = () => {
      window.removeEventListener('pointermove', onMM);
      window.removeEventListener('pointerup',   onMU);
      setResizeDim(null);
      const nit = itemsRef.current.map(i => i.id === itemId ? { ...i, w: Math.round(cw), h: Math.round(ch) } : i);
      if (Math.round(cw) !== ow || Math.round(ch) !== oh) {
        undoStack.current = [...undoStack.current.slice(-49), beforeResizeNote];
        redoStack.current = [];
      }
      setItems(nit); itemsRef.current = nit; saveItemsNow(nit);
    };
    window.addEventListener('pointermove', onMM);
    window.addEventListener('pointerup',   onMU);
  };

  // ── alignment ────────────────────────────────────────────────���────────────
  const getItemH = item => {
    if (item.type === 'note') return item.h || item.w;
    const p = photosRef.current.find(ph => ph.id === item.photoId);
    if (!p) return item.w;
    return (item.rot || 0) % 180 !== 0
      ? Math.round(item.w * p.w / p.h)
      : Math.round(item.w * p.h / p.w);
  };
  const alignItems = type => {
    pushUndo();
    const ids = selRef.current;  // ordered array — ids[0] is the anchor
    const selIt = itemsRef.current.filter(i => ids.includes(i.id));
    if (selIt.length < 2) return;
    const anchor = itemsRef.current.find(i => i.id === ids[0]);
    if (!anchor) return;
    const anchorH = getItemH(anchor);
    const others  = selIt.filter(i => i.id !== ids[0] && !i.locked);
    let nit = [...itemsRef.current];
    const upd = (id, patch) => { nit = nit.map(i => i.id === id ? { ...i, ...patch } : i); };
    switch (type) {
      case 'left':   others.forEach(i => upd(i.id, {x: anchor.x})); break;
      case 'right':  others.forEach(i => upd(i.id, {x: anchor.x + anchor.w - i.w})); break;
      case 'ch':     others.forEach(i => upd(i.id, {x: Math.round(anchor.x + anchor.w/2 - i.w/2)})); break;
      case 'top':    others.forEach(i => upd(i.id, {y: anchor.y})); break;
      case 'bottom': others.forEach(i => upd(i.id, {y: anchor.y + anchorH - getItemH(i)})); break;
      case 'cv':     others.forEach(i => upd(i.id, {y: Math.round(anchor.y + anchorH/2 - getItemH(i)/2)})); break;
      case 'eqw':    others.forEach(i => upd(i.id, {w: anchor.w})); break;
      case 'dh': {
        const sorted = [...selIt].filter(i => !i.locked).sort((a,b)=>a.x-b.x);
        if (sorted.length < 3) return;
        const span = sorted[sorted.length-1].x + sorted[sorted.length-1].w - sorted[0].x;
        const gap  = (span - sorted.reduce((s,i)=>s+i.w,0)) / (sorted.length-1);
        let cx = sorted[0].x + sorted[0].w + gap;
        sorted.slice(1,-1).forEach(i => { upd(i.id,{x:Math.round(cx)}); cx += i.w + gap; });
        break;
      }
      case 'dv': {
        const sorted = [...selIt].filter(i => !i.locked).sort((a,b)=>a.y-b.y);
        if (sorted.length < 3) return;
        const span = sorted[sorted.length-1].y + getItemH(sorted[sorted.length-1]) - sorted[0].y;
        const gap  = (span - sorted.reduce((s,i)=>s+getItemH(i),0)) / (sorted.length-1);
        let cy = sorted[0].y + getItemH(sorted[0]) + gap;
        sorted.slice(1,-1).forEach(i => { upd(i.id,{y:Math.round(cy)}); cy += getItemH(i) + gap; });
        break;
      }
    }
    const norm = applyNormalized(nit);
    saveItemsNow(norm);
  };

  if (!ready) return (
    <div style={{height:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'IBM Plex Mono',fontSize:11,letterSpacing:3,color:'var(--acc)'}}>
      CARGANDO
    </div>
  );

  const activeProject = projects.find(p => p.id === pid);
  const activeBoard   = boards.find(b => b.id === bid);

  // ── INFO PANEL render helper ──────────────────────────────────────────────
  const InfoPanel = () => {
    if (!hoverInfo) return (
      <div className="info-empty">
        {t('infoEmpty1')}<br/>{t('infoEmpty2')}
      </div>
    );
    const { photo, status, thumbSrc, itemW, itemH } = hoverInfo;
    const boardNames = photo?.id ? photoBoardNames(photo.id) : [];
    return (
      <div className="info-panel">
        <img className="info-thumb"
          src={thumbSrc || (pid && photo?.id ? `/photos/${pid}/${photo.id}/thumb` : '')}
          alt=""
          onError={e => e.target.style.opacity = '.2'}
        />
        <div className="info-meta">
          <div className="info-name" title={photo?.name}>{photo?.name || '—'}</div>
          {photo?.w > 0 && (
            <div className="info-row">{t('original')} {photo.w} × {photo.h} px</div>
          )}
          {photo?.size > 0 && (
            <div className="info-row">{fmtSize(photo.size)}</div>
          )}
          {itemW && (
            <>
              <div className="info-row" style={{marginTop:2}}>
                {t('inTableau')} {itemW} × {itemH} px
              </div>
              {boardDpi && boardUnits !== 'px' && (
                <div className="info-phys">
                  ≈ {pxToPhys(itemW, boardDpi, boardUnits)} × {pxToPhys(itemH, boardDpi, boardUnits)}
                  <span style={{color:'var(--muted)',marginLeft:4}}>@ {boardDpi} dpi</span>
                </div>
              )}
            </>
          )}
          <div className="info-boards">
            {boardNames.length === 0
              ? <div className="ibd-none">{t('notInAnyBoard')}</div>
              : boardNames.map(n => (
                  <span key={n} className={`ibd-tag${n === activeBoard?.name ? ' cur' : ''}`}>{n}</span>
                ))
            }
          </div>
        </div>
      </div>
    );
  };

  // ── CONFIG hint ───────────────────────────────────────────────────────────
  const cfgHint = () => {
    const dpi = parseInt(cfgDpi) || 300;
    if (cfgUnits === 'px') return t('noScaleHint');
    const mm = (25.4 / dpi).toFixed(3);
    const cm = (2.54 / dpi).toFixed(4);
    return t('scaleHint', mm, cm, (dpi/2.54).toFixed(0));
  };

  return (
    <div className="app" onClick={() => { selRef.current = []; setSel([]); renaming && setRenaming(null); setThemeOpen(false); setPropsPanelId(null); }}>

      {updateInfo && !updateDismissed && (
        <div className="update-banner">
          <span>&#9733;</span>
          <span>
            {lang === 'es'
              ? `Nueva versión disponible: v${updateInfo.version}`
              : `New version available: v${updateInfo.version}`}
            {updateInfo.downloadUrl && (<> &mdash; <a href={updateInfo.downloadUrl} target="_blank" rel="noreferrer">{lang === 'es' ? 'Descargar' : 'Download'}</a></>)}
          </span>
          <button className="update-banner-close" onClick={() => setUpdateDismissed(true)}>&#215;</button>
        </div>
      )}

      {/* ── TOPBAR ── */}
      <div className="topbar" onClick={e => e.stopPropagation()}>
        <div className="logo">Tableau</div>
        <div className="vsep"/>
        <div className="breadcrumb">
          {activeProject
            ? <>
                <span className="bc-seg">{activeProject.name}</span>
                {activeBoard && <>
                  <span className="bc-arrow">›</span>
                  <span className="bc-seg">{activeBoard.name}</span>
                  {boardDpi && boardUnits !== 'px' && (
                    <span className="bc-dpi">{boardPx ? '⊡ ' : ''}{boardDpi} dpi · {boardUnits}</span>
                  )}
                </>}
              </>
            : <span className="bc-none">{t('noProjHint')}</span>
          }
        </div>
        <div style={{flex:1}}/>
        {bid && <button className="btn" style={{fontSize:9}} onClick={addNote} title={t('addNote')}>{t('addNote')}</button>}
        {pid && boards.length > 0 && (
          <button className="btn" style={{fontSize:10}} onClick={() => setModal('memoria')} title={t('reportTitle')}>
            {t('report')}
          </button>
        )}
        {bid && <>
          <button className={`btn${showGrid?' acc':''}`} style={{fontSize:10,letterSpacing:.3}} onClick={toggleGrid} title={t('gridToggle')}>
            ▦
          </button>
          {showGrid && (<>
            <select className="btn" style={{fontSize:9,padding:'5px 8px',cursor:'pointer'}}
              value={gridStep}
              onChange={e => changeGridStep(Number(e.target.value))}>
              {gridOptions.map(o => <option key={o.v} value={o.v}>{o.label}</option>)}
            </select>
            <button className={`btn${snapGrid?' acc':''}`} style={{fontSize:11}} title={t('snapGrid')}
              onClick={() => { const n=!snapGrid; setSnapGrid(n); localStorage.setItem('tb-snap',n?'on':'off'); }}>
              ⊕
            </button>
          </>)}
          <button className="btn" style={{fontSize:10}} onClick={openBoardConfig} title={t('boardConfig')}>
            {t('config')}
          </button>
          <a className="btn" style={{fontSize:10}}
            href={`/api/boards/${pid}/${bid}/export`}
            download
            title={t('exportJpeg')}
          >
            {t('exportJpeg')}
          </a>
        </>}
        {!sbOpen && (
          <button className="btn" style={{fontSize:10}} onClick={() => setSbOpen(true)}>{t('showPanel')}</button>
        )}
        <div className="theme-picker" onClick={e => e.stopPropagation()}>
          <button className="btn theme-btn" onClick={() => setThemeOpen(o => !o)} title={t('preferences')}>
            <span className="theme-dot" style={{background: THEMES[theme]?.acc}}/>
          </button>
          {themeOpen && (
            <div className="theme-dropdown">
              <div className="pref-sec-hd">{t('themeLabel')}</div>
              {Object.entries(THEMES).map(([id, th]) => (
                <div key={id} className={`theme-opt${theme === id ? ' active' : ''}`}
                  onClick={() => applyTheme(id)}>
                  <div className="theme-swatches">
                    <div className="theme-sw" style={{background: th.bg, border:'1px solid #8884'}}/>
                    <div className="theme-sw" style={{background: th.acc}}/>
                  </div>
                  <span className="theme-opt-label">{th.label}</span>
                  {theme === id && <span style={{color:'var(--acc)',fontSize:11}}>✓</span>}
                </div>
              ))}
              <div className="pref-divider"/>
              <div className="pref-sec-hd">{t('langLabel')}</div>
              {[['es','Español'],['en','English']].map(([id, label]) => (
                <div key={id} className={`theme-opt${lang === id ? ' active' : ''}`}
                  onClick={() => applyLang(id)}>
                  <span style={{fontSize:13,lineHeight:1}}>{id==='es'?'ES':'EN'}</span>
                  <span className="theme-opt-label">{label}</span>
                  {lang === id && <span style={{color:'var(--acc)',fontSize:11}}>✓</span>}
                </div>
              ))}
              <div className="pref-divider"/>
              <div className="pref-sec-hd">{t('aboutLabel')}</div>
              <div className="pref-about" onClick={e => e.stopPropagation()}>
                <span className="pref-about-name">Tableau{appVersion ? ` · v${appVersion}` : ''}</span>
                <span className="pref-about-ver">{t('authorLabel')}: Blas González</span>
                <a className="pref-about-link"
                  href="https://blasgonzalezfotografia.com"
                  target="_blank"
                  rel="noopener noreferrer">
                  blasgonzalezfotografia.com
                </a>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── MAIN ── */}
      {!pid && !projects.length ? (
        <div className="start">
          <div className="start-logo">Tableau</div>
          <div className="start-sub">
            {t('startSub')}<br/>
            {t('startDesc')}
          </div>
          <button className="btn acc" style={{padding:'11px 30px',fontSize:12}}
            onClick={() => { setNameVal(''); setModal('project'); }}>
            {t('createFirstProject')}
          </button>
        </div>
      ) : (
        <div className="main-area">

          {/* ── SIDEBAR ── */}
          {!sbOpen ? (
            <div className="sidebar" style={{width:36,flexShrink:0}} onClick={e => e.stopPropagation()}>
              <div className="sb-toggle-strip" onClick={() => setSbOpen(true)} title={t('openPanel')}>
                <button className="sb-toggle-btn">▶</button>
                <div className="sb-collapsed-label">{t('panelLabel')}</div>
              </div>
            </div>
          ) : (
            <div className="sidebar" onClick={e => e.stopPropagation()}>
              <div className="sb-inner">

                {/* NAV: Projects & Boards */}
                <div className="sb-sec nav">
                  <div className="sb-sec-hd">
                    <span className="sb-sec-title">{t('projBoards')}</span>
                    <button className="sb-sec-btn" title={t('newProject')}
                      onClick={() => { setNameVal(''); setModal('project'); }}>+</button>
                    <button className="sb-sec-btn" title={t('importProjectBtn')}
                      onClick={() => importInputRef.current?.click()}>⬆</button>
                    <input ref={importInputRef} type="file" accept=".zip" style={{display:'none'}}
                      onChange={e => { handleImportFile(e.target.files[0]); e.target.value = ''; }} />
                    <button className="sb-sec-btn" title={t('collapsePanel')} style={{marginLeft:2}}
                      onClick={() => setSbOpen(false)}>◀</button>
                  </div>
                  <div className="sb-scroll">
                    {projects.length === 0 ? (
                      <div className="nav-empty">
                        {t('noProjectsYet')}<br/>
                        {t('clickToCreate')}
                      </div>
                    ) : projects.map(p => {
                      const isActive = p.id === pid;
                      return (
                        <div key={p.id} className="nproj">
                          <div className={`nproj-row${isActive ? ' active' : ''}`} onClick={() => setPid(p.id)}>
                            <span className="nproj-arrow">{isActive ? '▾' : '›'}</span>
                            {renaming?.type === 'project' && renaming.id === p.id ? (
                              <input className="n-rename" autoFocus value={renaming.value}
                                onChange={e => setRenaming(r => ({ ...r, value: e.target.value }))}
                                onKeyDown={e => { if (e.key==='Enter') submitRename(); if (e.key==='Escape') setRenaming(null); }}
                                onBlur={submitRename} onClick={e => e.stopPropagation()}
                              />
                            ) : (
                              <span className="nproj-name" title={p.name}>{p.name}</span>
                            )}
                            <div className="nrow-acts">
                              <button className="nact edit" title={t('exportProjectBtn')} onClick={e => exportProject(p.id, e)}>↓</button>
                              <button className="nact edit" title={t('renameBtn')} onClick={e => startRename('project', p.id, p.name, e)}>✎</button>
                              <button className="nact del"  title={t('deleteBtn')}  onClick={e => deleteProject(p.id, e)}>×</button>
                            </div>
                          </div>
                          {isActive && (
                            <div className="nboards">
                              {boards.map(b => (
                                <div key={b.id} className={`nboard-row${b.id === bid ? ' active' : ''}`} onClick={() => setBid(b.id)}>
                                  <span className="nboard-dash">└</span>
                                  {renaming?.type === 'board' && renaming.id === b.id ? (
                                    <input className="n-rename" autoFocus value={renaming.value}
                                      onChange={e => setRenaming(r => ({ ...r, value: e.target.value }))}
                                      onKeyDown={e => { if (e.key==='Enter') submitRename(); if (e.key==='Escape') setRenaming(null); }}
                                      onBlur={submitRename} onClick={e => e.stopPropagation()}
                                    />
                                  ) : (
                                    <span className="nboard-name" title={b.name}>{b.name}</span>
                                  )}
                                  <div className="nrow-acts">
                                    <button className="nact edit" title={t('renameBtn')}      onClick={e => startRename('board', b.id, b.name, e)}>✎</button>
                                    <button className="nact edit" title={t('duplicateBoard')} onClick={e => duplicateBoard(b.id, e)}>⧉</button>
                                    <button className="nact del"  title={t('deleteBtn')}      onClick={e => deleteBoard(b.id, e)}>×</button>
                                  </div>
                                </div>
                              ))}
                              <div className="nboard-add" onClick={() => { setNameVal(''); setModal('board'); }}>
                                {t('addBoard')}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* INFO */}
                <div className="sb-sec info">
                  <div className="sb-sec-hd">
                    <span className="sb-sec-title">{t('infoTitle')}</span>
                  </div>
                  <InfoPanel/>
                </div>

              </div>
            </div>
          )}

          {/* ── WORKSPACE ── */}
          <div className="workspace">

            {/* CANVAS */}
            <div ref={wrapRef} className="canvas-wrap"
              style={boardPx ? { background: '#1e1e1e', padding: BOARD_PAD } : {}}
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOver(false); }}
              onDrop={onCanvasDrop}
            >
              {dragOver && <div className="canvas-drop-hint">{t('dropHint')}</div>}
              {sel.length >= 2 && (
                <div className="align-bar" onClick={e => e.stopPropagation()}>
                  <span className="abt-label">{sel.length}</span>
                  <div className="align-bar-sep"/>
                  <button className="abt" title={t('alLeft')}   onClick={() => alignItems('left')}>⊢</button>
                  <button className="abt" title={t('alCH')}     onClick={() => alignItems('ch')}>⋮</button>
                  <button className="abt" title={t('alRight')}  onClick={() => alignItems('right')}>⊣</button>
                  <div className="align-bar-sep"/>
                  <button className="abt" title={t('alTop')}    onClick={() => alignItems('top')}>⊤</button>
                  <button className="abt" title={t('alCV')}     onClick={() => alignItems('cv')}>⋯</button>
                  <button className="abt" title={t('alBottom')} onClick={() => alignItems('bottom')}>⊥</button>
                  {sel.length >= 3 && <>
                    <div className="align-bar-sep"/>
                    <button className="abt" title={t('distH')}  onClick={() => alignItems('dh')}>↔</button>
                    <button className="abt" title={t('distV')}  onClick={() => alignItems('dv')}>↕</button>
                  </>}
                  <div className="align-bar-sep"/>
                  <button className="abt" title={t('eqWidth')}  onClick={() => alignItems('eqw')}>⊟</button>
                  <div className="align-bar-sep"/>
                  <button className="abt" style={{fontSize:10,color:'var(--muted)'}} title={t('clearSel')}
                    onClick={() => { selRef.current = []; setSel([]); }}>✕</button>
                </div>
              )}
              <div className="canvas" style={{
                zoom,
                '--canvas-zoom': zoom,
                backgroundImage: showGrid
                  ? `linear-gradient(${boardPx ? 'rgba(0,0,0,0.09)' : 'var(--border)'} 1px,transparent 1px),linear-gradient(90deg,${boardPx ? 'rgba(0,0,0,0.09)' : 'var(--border)'} 1px,transparent 1px)`
                  : 'none',
                backgroundSize: `${gridCellPx}px ${gridCellPx}px`,
                ...(boardPx ? {
                  width: boardPx.w, height: boardPx.h,
                  minWidth: boardPx.w, minHeight: boardPx.h,
                  backgroundColor: '#fff',
                  boxShadow: '0 8px 48px rgba(0,0,0,.7)',
                  overflow: 'hidden',
                } : {})
              }} onClick={() => { selRef.current = []; setSel([]); }}>
                {!bid && (
                  <div className="hint">
                    <em>{t('noBoard')}</em>
                    {t('createBoardHint')}
                  </div>
                )}
                {bid && items.length === 0 && (
                  <div className="hint">
                    <em>{t('emptyBoard')}</em>
                    {t('dragHint1')}<br/>
                    {t('dragHint2')}<br/>
                    {t('dragHint3')}
                  </div>
                )}

                {[...items].sort((a, b) => (a.z||0)-(b.z||0)).map(item => {
                  if (item.type === 'note') return (
                    <div key={item.id} className={`nitem${sel.includes(item.id)?' sel':''}${sel[0]===item.id?' anchor':''}${item.inMemory?' inmem':''}`}
                      style={{ left: item.x, top: item.y, width: item.w, height: item.h || 150, zIndex: item.z||1, ...(item.freeRot ? {transform:`rotate(${item.freeRot}deg)`,transformOrigin:'center center'} : {}) }}
                      onPointerDown={e => onItemPD(e, item.id)}
                      onClick={e => { e.stopPropagation(); if (wasDragged.current) { wasDragged.current = false; return; } if (!e.shiftKey) { selRef.current = [item.id]; setSel([item.id]); } }}
                    >
                      <div className="bitem-bar">
                        <button className="ibc fwd" title={t('bringFwdBtn')} onClick={e => { e.stopPropagation(); bringFwd(item.id); }}>↑</button>
                        <button className="ibc del" title={t('deleteBtn')}   onClick={e => { e.stopPropagation(); deleteItem(item.id); }}>×</button>
                        <button className="ibc" title={t('noteColor')}
                          onClick={e => { e.stopPropagation(); setNoteColorPanelId(id => id === item.id ? null : item.id); }}
                          style={{background: item.noteColor ? NOTE_COLOR_VALS[item.noteColor]?.[0] : undefined, color: item.noteColor ? 'rgba(255,255,255,.85)' : undefined}}>■</button>
                        <button className="ibc" title={t(item.inMemory ? 'noteExcludeMemBtn' : 'noteInMemoryBtn')}
                          style={{color: item.inMemory ? 'var(--acc)' : undefined}}
                          onClick={e => { e.stopPropagation(); updateNoteInMemory(item.id, !item.inMemory); }}>
                          {item.inMemory ? <SvgMemOn/> : <SvgMemOff/>}
                        </button>
                      </div>
                      {noteColorPanelId === item.id && (
                        <div className="props-panel" style={{top: 'calc(100% + 2px)'}} onPointerDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
                          <div className="props-lbl" style={{marginBottom:6}}>{t('noteColor')}</div>
                          <div style={{display:'flex',gap:5,alignItems:'center'}}>
                            <div title="Default" onClick={() => updateNoteColor(item.id, null)}
                              style={{width:14,height:14,borderRadius:'50%',cursor:'pointer',background:'var(--acc-dim)',border:`2px solid ${!item.noteColor?'var(--acc)':'var(--border2)'}`}}/>
                            {NOTE_COLORS.map(c => (
                              <div key={c} title={c} onClick={() => updateNoteColor(item.id, c)}
                                style={{width:14,height:14,borderRadius:'50%',cursor:'pointer',background:NOTE_COLOR_VALS[c][0],border:`2px solid ${item.noteColor===c?'var(--acc)':'transparent'}`}}/>
                            ))}
                          </div>
                        </div>
                      )}
                      <div className="nitem-body" style={item.noteColor && NOTE_COLOR_VALS[item.noteColor] ? {background:NOTE_COLOR_VALS[item.noteColor][1],borderLeftColor:NOTE_COLOR_VALS[item.noteColor][0]} : undefined}>
                        <input className="nitem-title" value={item.title||''} placeholder={t('noteTitlePh')}
                          onChange={e => updateNoteTitle(item.id, e.target.value)}
                          onFocus={pushUndo}
                          onBlur={saveLabel}
                          onPointerDown={e => e.stopPropagation()}
                          onClick={e => e.stopPropagation()}
                        />
                        <textarea className="nitem-txt" value={item.text||''} placeholder={lang==='es'?'nota…':'note…'}
                          onChange={e => updateNoteText(item.id, e.target.value)}
                          onFocus={pushUndo}
                          onBlur={saveLabel}
                          onPointerDown={e => e.stopPropagation()}
                          onClick={e => e.stopPropagation()}
                        />
                        {item.link ? (
                          <a className="nitem-link" href={item.link.url} target="_blank" rel="noreferrer"
                            onClick={e => e.stopPropagation()} onPointerDown={e => e.stopPropagation()}>
                            <img src={`https://www.google.com/s2/favicons?domain=${item.link.domain}&sz=16`}
                              width={14} height={14} alt="" style={{flexShrink:0}}
                              onError={e => { e.target.style.display='none'; }}/>
                            <div className="nitem-link-info">
                              <div className="nitem-link-title">{item.link.title}</div>
                              <div className="nitem-link-domain">{item.link.domain}</div>
                            </div>
                            <button className="nitem-link-rm"
                              onClick={e => { e.preventDefault(); e.stopPropagation(); removeLinkFromNote(item.id); }}>×</button>
                          </a>
                        ) : linkFetching === item.id ? (
                          <div className="nitem-link-loading">...</div>
                        ) : linkInputId === item.id ? (
                          <div className="nitem-link-row" style={{opacity:1}}>
                            <input className="nitem-link-inp" autoFocus placeholder="https://..."
                              onPointerDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}
                              onKeyDown={e => {
                                if (e.key === 'Enter')  { fetchLinkPreview(item.id, e.target.value); setLinkInputId(null); }
                                if (e.key === 'Escape') { setLinkInputId(null); }
                              }}
                              onBlur={e => { if (e.target.value.trim()) fetchLinkPreview(item.id, e.target.value); setLinkInputId(null); }}
                            />
                          </div>
                        ) : (
                          <div className="nitem-link-row">
                            <button className="nitem-link-btn"
                              onPointerDown={e => e.stopPropagation()}
                              onClick={e => { e.stopPropagation(); setLinkInputId(item.id); }}>+ url</button>
                          </div>
                        )}
                      </div>
                      <div className="nitem-rc" onPointerDown={e => onResizeNotePD(e, item.id)}/>
                    </div>
                  );
                  const photo = photos.find(p => p.id === item.photoId);
                  const rot = item.rot || 0;
                  const isSwapped = rot % 180 !== 0;
                  // naturalW/H: pre-rotation image dimensions at item.w scale
                  const naturalW = isSwapped
                    ? (photo ? Math.round(item.w * photo.w / photo.h) : item.w)
                    : item.w;
                  const naturalH = isSwapped
                    ? item.w
                    : (photo ? Math.round(item.w * photo.h / photo.w) : item.w);
                  // displayH: actual height the item occupies on canvas
                  const displayH = isSwapped ? naturalW : naturalH;
                  // offsets to center the (possibly larger) pre-rotation img in the display box
                  const offX = (item.w  - naturalW) / 2;
                  const offY = (displayH - naturalH) / 2;
                  return (
                    <div key={item.id} className={`bitem${sel.includes(item.id)?' sel':''}${sel[0]===item.id?' anchor':''}${item.locked?' locked':''}`}
                      style={{ left: item.x, top: item.y, width: item.w, zIndex: item.z||1, ...(item.freeRot ? {transform:`rotate(${item.freeRot}deg)`,transformOrigin:'center center'} : {}) }}
                      onPointerDown={e => onItemPD(e, item.id)}
                      onClick={e => { e.stopPropagation(); if (wasDragged.current) { wasDragged.current = false; return; } if (!e.shiftKey) { selRef.current = [item.id]; setSel([item.id]); } }}
                      onMouseEnter={() => photo && showPhotoInfo(photo, 'board', `/photos/${pid}/${photo.id}/thumb`, item.w, displayH)}
                      onMouseLeave={clearHoverInfo}
                    >
                      <div className="bitem-bar">
                        <button className="ibc rot" title={t('rotateBtn')}
                          onPointerDown={e => { e.stopPropagation(); if (!item.locked) onFreeRotatePD(e, item.id); }}
                          onClick={e => { e.stopPropagation(); if (rotBtnDraggedRef.current) { rotBtnDraggedRef.current = false; return; } rotateItem(item.id); }}>↻</button>
                        <button className="ibc fwd" title={t('bringFwdBtn')} onClick={e => { e.stopPropagation(); bringFwd(item.id); }}>↑</button>
                        <button className="ibc del" title={t('deleteBtn')}   onClick={e => { e.stopPropagation(); deleteItem(item.id); }}>×</button>
                        <button className="ibc" title={t('frameLabel')} onClick={e => { e.stopPropagation(); setPropsPanelId(id => id === item.id ? null : item.id); }}>▣</button>
                        <button className="ibc" title={t(item.locked ? 'unlockBtn' : 'lockBtn')} onClick={e => { e.stopPropagation(); updateItemLocked(item.id, !item.locked); }}>{item.locked ? <SvgUnlock/> : <SvgLock/>}</button>
                      </div>
                      {propsPanelId === item.id && (() => {
                        const frameUnit = boardUnits !== 'px' ? boardUnits : 'px';
                        return (
                          <div className="props-panel" onPointerDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()}>
                            <div className="props-row">
                              <span className="props-lbl">{t('frameLabel')} ({frameUnit})</span>
                              <input type="number" className="props-inp" value={item.frame || 0} min="0"
                                step={boardUnits === 'mm' ? 1 : 0.1}
                                onFocus={pushUndo}
                                onChange={e => updateItemFrame(item.id, parseFloat(e.target.value) || 0)}
                                onBlur={saveLabel}
                                onPointerDown={e => e.stopPropagation()}
                              />
                            </div>
                          </div>
                        );
                      })()}
                      {(() => {
                        const frameInPx = item.frame ? physToPx(item.frame, boardDpi, boardUnits) : 0;
                        return (
                      <div className="bitem-img-wrap" style={{ width: item.w, height: displayH,
                        ...(frameInPx > 0 ? { boxShadow: `0 0 0 ${frameInPx}px #fff, 0 0 0 ${frameInPx + 1}px rgba(0,0,0,.15)` } : {}) }}>
                        <img
                          src={`/photos/${pid}/${item.photoId}`}
                          alt={photo?.name || ''}
                          className="bitem-img"
                          width={naturalW}
                          height={naturalH}
                          style={{
                            position: 'absolute',
                            left: offX,
                            top: offY,
                            transform: rot ? `rotate(${rot}deg)` : undefined,
                            transformOrigin: 'center',
                          }}
                          draggable={false}
                          onError={e => e.target.style.opacity = '.3'}
                        />
                      </div>
                        );
                      })()}
                      {item.locked && <div className="lock-badge"><SvgLock/></div>}
                      <div className="dim-tag">{dimLabel(item.w, displayH, boardDpi, boardUnits, item.frame)}</div>
                      <div className="lbl"
                        style={{ top: displayH + (item.frame ? physToPx(item.frame, boardDpi, boardUnits) : 0) }}
                        onPointerDown={e => e.stopPropagation()}
                        onClick={e => { e.stopPropagation(); pushUndo(); labelEditOrigRef.current = item.label || ''; setLabelEditId(item.id); }}
                      >
                        {item.label
                          ? <>{item.label.split('\n')[0]}{item.label.includes('\n') && <span className="lbl-more">…</span>}</>
                          : <span className="lbl-ph">{t('labelPlaceholder')}</span>
                        }
                      </div>
                      {!item.locked && <div className="rh" onPointerDown={e => onResizePD(e, item.id)}/>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* LIBRARY */}
            {(() => {
              const libH = libOpen ? 128 : 30;
              const sortedPhotos = photoSort === 'name'
                ? [...photos].sort((a, b) => a.name.localeCompare(b.name))
                : photos;
              const displayedPhotos = (photoFilter === 'pending'
                ? sortedPhotos.filter(p => photoBoardNames(p.id).length === 0)
                : sortedPhotos)
                .filter(p => !libSearch || p.name.toLowerCase().includes(libSearch.toLowerCase()));
              const toggleLib = () => { const v = !libOpen; setLibOpen(v); localStorage.setItem('libOpen', v); };
              const toggleFilter = (e) => { e.stopPropagation(); const v = photoFilter === 'pending' ? 'all' : 'pending'; setPhotoFilter(v); localStorage.setItem('photoFilter', v); };
              return (
              <div className="library" style={{height: libH}} onClick={e => e.stopPropagation()}>
                <div className="lib-header" onClick={toggleLib}>
                  <button className="lib-toggle-btn" onClick={e => { e.stopPropagation(); toggleLib(); }} title={libOpen ? t('collapsePanel') : t('openPanel')}>{libOpen ? '▼' : '▲'}</button>
                  <span className="lib-title">{t('libTitle')}</span>
                  <span className="lib-count">{displayedPhotos.length < photos.length ? `${displayedPhotos.length}/${photos.length}` : photos.length}</span>
                  <span className="lib-spacer"/>
                  {pid && <>
                    <input className="lib-search" type="text" placeholder={t('libSearchPh')}
                      value={libSearch} onClick={e => e.stopPropagation()}
                      onChange={e => setLibSearch(e.target.value)}/>
                    <button className={`lib-filter${photoFilter === 'pending' ? ' active' : ''}`} onClick={toggleFilter} title={t('filterPending')}>⊘ {t('filterPending')}</button>
                    <span className="lib-sort-icon">⇅</span>
                    <select className="lib-sort" value={photoSort}
                      onClick={e => e.stopPropagation()}
                      onChange={e => { const v = e.target.value; setPhotoSort(v); localStorage.setItem('photoSort', v); }}>
                      <option value="imported">{t('sortImported')}</option>
                      <option value="name">{t('sortName')}</option>
                    </select>
                    <input type="range" min="48" max="160" value={thumbSize}
                      className="lib-thumb-slider"
                      onClick={e => e.stopPropagation()}
                      onChange={e => { const v = parseInt(e.target.value); setThumbSize(v); localStorage.setItem('thumbSize', v); }}
                    />
                    <input type="file" accept="image/*" multiple style={{display:'none'}} id="tb-upload"
                      onChange={e => { uploadFiles(e.target.files); e.target.value = ''; }}
                    />
                    <label htmlFor="tb-upload" className="btn acc" style={{cursor:'pointer',fontSize:9}} onClick={e => e.stopPropagation()}>
                      {t('upload')}
                    </label>
                  </>}
                </div>
                {libOpen && (
                  <div className="lib-body">
                    <div className="lib-scroll">
                      {photos.length === 0 ? (
                        <div className="lib-empty">
                          <label htmlFor="tb-upload" style={{cursor:'pointer',color:'var(--acc-dim)'}}>
                            {t('uploadHint')}
                          </label>
                          <span style={{fontSize:9,color:'var(--muted)'}}>{t('dragFilesHint')}</span>
                        </div>
                      ) : (
                        displayedPhotos.map(p => {
                          const inBoard = items.some(i => i.photoId === p.id);
                          return (
                            <div key={p.id} className={`thumb${inBoard?' in-board':''}`}
                              style={{width:thumbSize,height:thumbSize}}
                              draggable onDragStart={e => onLibDS(e, p.id)}
                              onMouseEnter={() => showPhotoInfo(p, inBoard?'board':'proj', `/photos/${pid}/${p.id}/thumb`)}
                              onMouseLeave={clearHoverInfo}
                              onClick={() => { if (!bid) return showToast(t('createBoardFirst'), true); addToCenter(p.id); }}
                              title={`${p.name}${inBoard?' · '+t('alreadyInTableau'):''}`}
                            >
                              <img src={`/photos/${pid}/${p.id}/thumb`} alt={p.name}/>
                              <button className="thumb-x" onClick={e => { e.stopPropagation(); deletePhoto(p.id); }}>×</button>
                              <button className="thumb-cp" title={t('copyToProject')}
                                onClick={e => { e.stopPropagation(); const r = e.currentTarget.getBoundingClientRect(); setCopyToMenu({ photoId: p.id, x: r.left, y: r.top }); }}>→</button>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                )}
              </div>
              );
            })()}
          </div>
        </div>
      )}

      {bid && (
        <div className="zoom-ctrl" style={{bottom: (libOpen ? 128 : 30) + 20}}>
          <button className="zc-btn" title="Zoom − (Ctrl+−)" onClick={() => zoomStep(-1)}>−</button>
          <span className="zc-pct" style={{cursor: boardPx ? 'pointer' : 'default'}}>
            {boardPx
              ? <span title={t('fitView')} onClick={fitBoard}>{t('fitView')}</span>
              : `${Math.round(zoom*100)}%`}
          </span>
          {!boardPx && <button className="zc-btn" title={t('fitWidth')} onClick={fitWidth} style={{fontSize:13}}>⇔</button>}
          <button className="zc-btn" title="Zoom + (Ctrl++)" onClick={() => zoomStep(1)}>+</button>
        </div>
      )}
      {resizeDim && <div className="resize-tip" style={{left:resizeDim.x, top:resizeDim.y}}>{resizeDim.label}</div>}
      {uploading && <div className="uploading-bar" style={{bottom: libOpen ? 128 : 30}}/>}
      {toast && <div className={`toast${toast.err?' err':''}`} style={{bottom: (libOpen ? 128 : 30) + 8}}>{toast.msg}</div>}

      {copyToMenu && (
        <>
          <div style={{position:'fixed',inset:0,zIndex:599}} onClick={() => setCopyToMenu(null)}/>
          <div className="cp-menu" style={{left:copyToMenu.x, top:copyToMenu.y - 4, transform:'translateY(-100%)'}}>
            <div className="cp-menu-hd">{t('copyToProject')}</div>
            {projects.filter(p => p.id !== pid).length === 0
              ? <div className="cp-menu-empty">{t('noOtherProjects')}</div>
              : projects.filter(p => p.id !== pid).map(proj => (
                <div key={proj.id} className="cp-menu-item" onClick={() => copyPhotoToProject(copyToMenu.photoId, proj.id)}>{proj.name}</div>
              ))
            }
          </div>
        </>
      )}

      {/* ── MODALS ── */}
      {modal === 'project' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('newProjectTitle')}</div>
            <input className="inp" value={nameVal} autoFocus
              onChange={e => setNameVal(e.target.value)}
              onKeyDown={e => e.key==='Enter' && createProject()}
              placeholder={t('projectNamePh')}
            />
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('cancel')}</button>
              <button className="btn acc" onClick={createProject}>{t('create')}</button>
            </div>
          </div>
        </div>
      )}

      {modal === 'board' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('newBoardTitle')}</div>
            <input className="inp" value={nameVal} autoFocus
              onChange={e => setNameVal(e.target.value)}
              onKeyDown={e => e.key==='Enter' && createBoard()}
              placeholder={t('boardNamePh')}
            />
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('cancel')}</button>
              <button className="btn acc" onClick={createBoard}>{t('create')}</button>
            </div>
          </div>
        </div>
      )}

      {modal === 'boardcfg' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('boardConfig')}</div>
            <div className="modal-sub">{activeBoard?.name}</div>
            {/* mode toggle */}
            <div>
              <div className="cfg-label">{t('boardMode')}</div>
              <div style={{display:'flex',gap:6}}>
                <button className={`btn${!cfgFixed?' acc':''}`} style={{flex:1,padding:'7px 0'}} onClick={() => setCfgFixed(false)}>{t('varMode')}</button>
                <button className={`btn${cfgFixed?' acc':''}`}  style={{flex:1,padding:'7px 0'}} onClick={() => setCfgFixed(true)}>{t('fixedMode')}</button>
              </div>
            </div>
            {/* fixed: dimensions */}
            {cfgFixed && (
              <div className="cfg-row">
                <div>
                  <div className="cfg-label">{t('boardW')} ({cfgUnits})</div>
                  <input type="number" className="inp" value={cfgBoardW} min="1" step="0.1"
                    onChange={e => setCfgBoardW(e.target.value)} placeholder="20"/>
                </div>
                <div>
                  <div className="cfg-label">{t('boardH')} ({cfgUnits})</div>
                  <input type="number" className="inp" value={cfgBoardH} min="1" step="0.1"
                    onChange={e => setCfgBoardH(e.target.value)} placeholder="30"/>
                </div>
              </div>
            )}
            {/* units + dpi */}
            <div className="cfg-row">
              <div>
                <div className="cfg-label">{t('unitsLabel')}</div>
                <select className="inp" value={cfgUnits} onChange={e => setCfgUnits(e.target.value)}>
                  <option value="px">{t('unitPx')}</option>
                  <option value="cm">{t('unitCm')}</option>
                  <option value="mm">{t('unitMm')}</option>
                  <option value="in">{t('unitIn')}</option>
                </select>
              </div>
              <div>
                <div className="cfg-label">{t('resolutionLabel')}</div>
                <select className="inp" value={cfgDpi} onChange={e => setCfgDpi(e.target.value)}>
                  <option value="72">{t('dpi72')}</option>
                  <option value="96">{t('dpi96')}</option>
                  <option value="150">{t('dpi150')}</option>
                  <option value="300">{t('dpi300')}</option>
                  <option value="600">{t('dpi600')}</option>
                </select>
              </div>
            </div>
            <div className="cfg-row">
              <div>
                <div className="cfg-label">{t('frameDefault')} {cfgUnits !== 'px' ? `(${cfgUnits})` : '(px)'}</div>
                <input type="number" className="inp" value={cfgDefaultFrame} min="0"
                  step={cfgUnits === 'mm' ? 1 : 0.1}
                  onChange={e => setCfgDefaultFrame(e.target.value)} placeholder="0"/>
              </div>
            </div>
            {cfgUnits !== 'px' && (
              <div className="cfg-hint">{cfgHint()}</div>
            )}
            {cfgFixed && cfgBoardW && cfgBoardH && (() => {
              const px = getBoardPx({ fixed: true, fixedW: parseFloat(cfgBoardW), fixedH: parseFloat(cfgBoardH), units: cfgUnits, dpi: parseInt(cfgDpi)||300 });
              return px ? <div className="cfg-hint" style={{color:'var(--acc)'}}>{t('pxPreview', px.w, px.h)}</div> : null;
            })()}
            <div style={{fontSize:9,color:'var(--muted)',lineHeight:1.8}}>
              {t('boardConfigNote').split('\n').map((s,i,a) => <React.Fragment key={i}>{s}{i<a.length-1&&<br/>}</React.Fragment>)}
            </div>
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('cancel')}</button>
              <button className="btn acc" onClick={saveBoardConfig}>{t('save')}</button>
            </div>
          </div>
        </div>
      )}
      {modal === 'memoria' && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal mem-modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('reportTitle')}</div>
            <div className="modal-sub">{activeProject?.name}</div>
            <div className="mem-scroll">
              {boards.length === 0 ? (
                <div style={{color:'var(--muted)',fontSize:10,padding:'8px 0'}}>{t('noBoardsInProject')}</div>
              ) : boards.map(board => {
                const boardIt = allBoardItems[board.id] || [];
                const dpi = board.dpi || null;
                const units = board.units || 'px';
                const hasPhys = dpi && units !== 'px';
                return (
                  <div key={board.id} className="mem-board">
                    <div className="mem-board-hd">
                      <span className="mem-board-name">{board.name}</span>
                      <span className="mem-board-cfg" style={hasPhys ? {} : {color:'var(--muted)'}}>
                        {hasPhys ? `${dpi} dpi · ${units}` : t('noPhysScale')}
                      </span>
                    </div>
                    {boardIt.length === 0 ? (
                      <div className="mem-board-empty">{t('emptyBoardMem')}</div>
                    ) : (() => {
                      const bPx = getBoardPx(board);
                      const photoItems = boardIt.filter(i => i.type !== 'note').map(item => {
                        const photo = photos.find(p => p.id === item.photoId);
                        const rot = item.rot || 0;
                        const isSwapped = rot % 180 !== 0;
                        const naturalH = isSwapped
                          ? (photo ? Math.round(item.w * photo.w / photo.h) : item.w)
                          : (photo ? Math.round(item.w * photo.h / photo.w) : item.w);
                        return { ...item, displayH: isSwapped ? item.w : naturalH };
                      });
                      const minX = bPx ? 0 : (photoItems.length ? Math.min(...photoItems.map(i => i.x)) : 0);
                      const minY = bPx ? 0 : (photoItems.length ? Math.min(...photoItems.map(i => i.y)) : 0);
                      const bW = bPx?.w ?? (photoItems.length ? Math.max(...photoItems.map(i => i.x + i.w)) - minX : 0);
                      const bH = bPx?.h ?? (photoItems.length ? Math.max(...photoItems.map(i => i.y + i.displayH)) - minY : 0);
                      const sc = bW && bH ? Math.min(560 / bW, 200 / bH, 1) : 1;
                      const pW = Math.round(bW * sc);
                      const pH = Math.round(bH * sc);
                      return (
                        <React.Fragment>
                          {bW > 0 && bH > 0 && (
                            <div className="mem-preview-wrap">
                              <div className="mem-preview" style={{
                                width: pW, height: pH,
                                background: bPx ? '#f5f5f5' : 'var(--deep)',
                                border: bPx ? '1px solid var(--border2)' : '1px dashed var(--border2)',
                              }}>
                                {photoItems.map(item => {
                                  const fPx = item.frame > 0 ? Math.max(1, Math.round(physToPx(item.frame, dpi, units) * sc)) : 0;
                                  return (
                                  <img key={item.id}
                                    src={`/photos/${pid}/${item.photoId}/thumb`}
                                    alt=""
                                    style={{
                                      position: 'absolute',
                                      left: Math.round((item.x - minX) * sc),
                                      top: Math.round((item.y - minY) * sc),
                                      width: Math.round(item.w * sc),
                                      height: Math.round(item.displayH * sc),
                                      objectFit: 'cover',
                                      ...(fPx > 0 ? { outline: `${fPx}px solid #c8c8c8` } : {}),
                                    }}
                                  />
                                  );
                                })}
                              </div>
                              <div className="mem-preview-dim">{dimLabel(bW, bH, dpi, units)}</div>
                            </div>
                          )}
                          {boardIt.filter(i => i.type !== 'note').map((item, idx) => {
                            const photo = photos.find(p => p.id === item.photoId);
                            const h = photo
                              ? ((item.rot || 0) % 180 !== 0
                                ? Math.round(item.w * photo.w / photo.h)
                                : Math.round(item.w * photo.h / photo.w))
                              : item.w;
                            const dimStr = dimLabel(item.w, h, dpi, units, item.frame);
                            return (
                              <div key={item.id} className="mem-item">
                                <div className="mem-idx">{idx + 1}.</div>
                                <img className="mem-thumb" src={`/photos/${pid}/${item.photoId}/thumb`} alt="" />
                                <div className="mem-info">
                                  <div className="mem-iname">{photo?.name || item.photoId}</div>
                                  <div className="mem-dims">
                                    {dimStr}
                                    {(item.frame > 0) && <span style={{color:'var(--muted)',marginLeft:6,fontSize:8}}>({t('frameNote', item.frame, hasPhys ? units : 'px')})</span>}
                                  </div>
                                  {item.label && <div className="mem-lbl">"{item.label}"</div>}
                                </div>
                              </div>
                            );
                          })}
                          {boardIt.filter(i => i.type === 'note' && i.inMemory).length > 0 && (
                            <>
                              <div className="mem-notes-hd">{t('notesSectionTitle')}</div>
                              {boardIt.filter(i => i.type === 'note' && i.inMemory).map(item => (
                                <div key={item.id} className="mem-note-item">
                                  {item.title && <div className="mem-note-title">{item.title}</div>}
                                  <div className="mem-note-text">{item.text || ''}</div>
                                  {item.link && (
                                    <div style={{marginTop:5}}>
                                      <a className="mem-note-link" href={item.link.url} target="_blank" rel="noreferrer"
                                        onClick={e => e.stopPropagation()}>
                                        {item.link.title || item.link.domain}
                                      </a>
                                      {item.link.title && <span className="mem-note-link-domain">{item.link.domain}</span>}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </>
                          )}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:9,color:'var(--muted)',lineHeight:1.8}}>
              {t('reportConfigNote')}
            </div>
            <div className="modal-row">
              <button className="btn" onClick={() => setModal(null)}>{t('close')}</button>
              <button className="btn acc" onClick={printMemoria}>{t('printPdf')}</button>
            </div>
          </div>
        </div>
      )}

      {labelEditId && (() => {
        const editItem = items.find(i => i.id === labelEditId);
        if (!editItem) return null;
        const editPhoto = photos.find(p => p.id === editItem.photoId);
        const sizeKey = `lbl-popup-size-${labelEditId}`;
        const savedSize = JSON.parse(localStorage.getItem(sizeKey) || 'null');
        let popupEl = null;
        const saveSize = () => { if (popupEl) localStorage.setItem(sizeKey, JSON.stringify({w: popupEl.offsetWidth, h: popupEl.offsetHeight})); };
        const closeLabelEdit = () => { saveSize(); saveLabel(); setLabelEditId(null); };
        const discardLabelEdit = () => {
          saveSize();
          const u = itemsRef.current.map(i => i.id === labelEditId ? {...i, label: labelEditOrigRef.current} : i);
          itemsRef.current = u; setItems(u); saveItemsNow(u);
          setLabelEditId(null);
        };
        return (
          <div className="lbl-popup-ov">
            <div className="lbl-popup" ref={el => { popupEl = el; }}
              style={savedSize ? {width: savedSize.w, height: savedSize.h} : undefined}>
              <div className="lbl-popup-hd">
                <span className="lbl-popup-name">{editPhoto?.name || t('labelPlaceholder')}</span>
                <button className="lbl-popup-close" onClick={discardLabelEdit}>×</button>
              </div>
              <textarea className="lbl-popup-ta" autoFocus
                value={editItem.label || ''}
                placeholder={t('labelPlaceholder')}
                onChange={e => updateLabel(labelEditId, e.target.value)}
              />
              <div style={{display:'flex',justifyContent:'flex-start',flexShrink:0,paddingTop:2}}>
                <button className="btn acc" onClick={closeLabelEdit}>{t('save')}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {importState && (
        <div className="overlay" onClick={() => !importState.busy && setImportState(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-h">{t('importTitle')}</div>
            <div className="modal-sub" style={{maxWidth:320,lineHeight:1.5}}>
              {importState.conflict
                ? t('importConflict', importState.projectName)
                : t('importConfirmMsg', importState.projectName)}
            </div>
            <div className="modal-row" style={{marginTop:14,flexWrap:'wrap',gap:6}}>
              <button className="btn" onClick={() => setImportState(null)} disabled={importState.busy}>{t('cancel')}</button>
              <button className={`btn${importState.conflict ? '' : ' acc'}`} onClick={() => confirmImport('new')} disabled={importState.busy}>{t('importNew')}</button>
              {importState.conflict && (
                <button className="btn acc" onClick={() => confirmImport('replace')} disabled={importState.busy}>{t('importReplace')}</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
